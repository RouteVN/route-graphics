      id: fighter-1
      type: spritesheet-animation
      x: 200
      "y": 150
      width: 100
      height: 100
      src: fighter-spritesheet
      atlas:
        frames:
          idle-0:
            x: 0
            y: 0
            width: 32
            height: 32
          idle-1:
            x: 32
            y: 0
            width: 32
            height: 32
      clips:
        idle:
          - idle-0
