case: Test parsing structured burst particles with radial movement and custom bounds
in:
  - state:
      id: burst
      type: particles
      width: 400
      height: 300
      seed: 999
      modules:
        emission:
          mode: burst
          burstCount: 12
          maxActive: 24
          duration: 0.1
          particleLifetime: 0.75
          source:
            kind: circle
            data:
              x: 200
              y: 150
              radius: 12
              innerRadius: 4
              affectRotation: true
        movement:
          velocity:
            kind: radial
            angle:
              min: -30
              max: 30
            speed:
              min: 150
              max: 250
              distribution:
                kind: bias
                toward: max
                strength: 0.75
          faceVelocity: true
        appearance:
          texture:
            shape: rect
            width: 6
            height: 18
            color: "#ffffff"
          scale:
            mode: single
            value: 0.5
          alpha:
            mode: single
            value: 0.8
          color:
            mode: gradient
            keys:
              - time: 0
                value: "#ffffff"
              - time: 1
                value: "#4d4d4d"
          rotation:
            mode: none
        bounds:
          mode: recycle
          source: custom
          custom:
            x: -25
            y: -25
            width: 450
            height: 350
out:
  id: burst
  type: particles
  count: 24
  width: 400
  height: 300
  x: 0
  "y": 0
  alpha: 1
  texture:
    shape: rect
    width: 6
    height: 18
    color: "#ffffff"
  behaviors:
    - type: spawnShape
      config:
        type: circle
        data:
          x: 200
          y: 150
          radius: 12
          innerRadius: 4
          affectRotation: true
    - type: movement
      config:
        velocity:
          kind: radial
          angle:
            min: -30
            max: 30
          speed:
            min: 150
            max: 250
            distribution:
              kind: bias
              toward: max
              strength: 0.75
        maxSpeed: 0
        faceVelocity: true
    - type: scaleStatic
      config:
        min: 0.5
        max: 0.5
    - type: alphaStatic
      config:
        alpha: 0.8
    - type: color
      config:
        list:
          - time: 0
            value: "#ffffff"
          - time: 1
            value: "#4d4d4d"
  emitter:
    lifetime:
      min: 0.75
      max: 0.75
    frequency: 0
    particlesPerWave: 12
    maxParticles: 24
    emitterLifetime: 0.1
    seed: 999
    spawnBounds:
      x: -25
      y: -25
      width: 450
      height: 350
    recycleOnBounds: true
