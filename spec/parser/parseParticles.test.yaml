file: ../../src/plugins/elements/particles/parseParticles.js
group: parser
suites:
  - parseParticles
---
suite: parseParticles
exportName: parseParticles
---
case: Test parsing particles with structured modules
in:
  - state:
      id: snow
      type: particles
      width: 1280
      height: 720
      seed: 12345
      modules:
        emission:
          mode: continuous
          rate: 40
          maxActive: 180
          duration: infinite
          particleLifetime:
            min: 4
            max: 8
          source:
            kind: rect
            data:
              x: 0
              y: -20
              width: 1280
              height: 10
        movement:
          velocity:
            kind: directional
            direction: 90
            speed:
              min: 50
              max: 150
        appearance:
          texture: snowflake
          scale:
            mode: range
            min: 0.3
            max: 1
          rotation:
            mode: spin
            start:
              min: 0
              max: 360
            speed:
              min: -45
              max: 45
        bounds:
          mode: recycle
          source: area
          padding: 50
out:
  id: snow
  type: particles
  count: 180
  width: 1280
  height: 720
  x: 0
  "y": 0
  alpha: 1
  texture: snowflake
  behaviors:
    - type: spawnShape
      config:
        type: rect
        data:
          x: 0
          y: -20
          w: 1280
          h: 10
    - type: movement
      config:
        velocity:
          kind: directional
          direction:
            min: 90
            max: 90
          speed:
            min: 50
            max: 150
        maxSpeed: 0
        faceVelocity: false
    - type: scaleStatic
      config:
        min: 0.3
        max: 1
    - type: rotation
      config:
        minStart: 0
        maxStart: 360
        minSpeed: -45
        maxSpeed: 45
        accel: 0
  emitter:
    lifetime:
      min: 4
      max: 8
    frequency: 0.025
    particlesPerWave: 1
    maxParticles: 180
    emitterLifetime: -1
    seed: 12345
    spawnBounds:
      x: -50
      y: -50
      width: 1380
      height: 820
    recycleOnBounds: true
---
case: Test parsing structured particles throws when modules mix with legacy raw fields
in:
  - state:
      id: invalid-structured
      type: particles
      width: 100
      height: 100
      texture: circle
      modules:
        emission:
          mode: burst
          burstCount: 1
          particleLifetime: 1
          source:
            kind: point
            data:
              x: 50
              y: 50
        appearance:
          texture: circle
throws: "Input Error: Structured particles cannot mix 'modules' with legacy texture/behaviors/emitter fields"
---
case: Test parsing structured particles throws on conflicting faceVelocity and rotation ownership
in:
  - state:
      id: invalid-face-velocity
      type: particles
      width: 100
      height: 100
      modules:
        emission:
          mode: burst
          burstCount: 4
          particleLifetime:
            min: 0.5
            max: 1
          source:
            kind: point
            data:
              x: 50
              y: 50
        movement:
          velocity:
            kind: directional
            direction: 90
            speed:
              min: 10
              max: 20
          faceVelocity: true
        appearance:
          texture: circle
          rotation:
            mode: fixed
            value: 90
throws: "Input Error: modules.appearance.rotation cannot be combined with modules.movement.faceVelocity"
