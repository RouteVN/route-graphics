case: Test parsing structured particles with selector texture and acceleration-only movement
in:
  - state:
      id: selector
      type: particles
      width: 320
      height: 240
      seed: 4242
      modules:
        emission:
          mode: continuous
          rate: 6
          particleLifetime:
            min: 1
            max: 2
            distribution:
              kind: normal
              mean: 1.4
              deviation: 0.2
          source:
            kind: line
            data:
              x1: 10
              y1: 20
              x2: 310
              y2: 20
        movement:
          acceleration:
            x: 0
            y: 20
          maxSpeed: 120
        appearance:
          texture:
            mode: cycle
            pick: perWave
            items:
              - src: spark-a
              - shape: circle
                radius: 3
                color: "#d9d9d9"
          rotation:
            mode: random
            min: -20
            max: 20
            distribution:
              kind: bias
              toward: center
              strength: 0.9
        bounds:
          mode: none
out:
  id: selector
  type: particles
  count: 100
  width: 320
  height: 240
  x: 0
  "y": 0
  alpha: 1
  texture:
    mode: cycle
    pick: perWave
    items:
      - src: spark-a
      - shape: circle
        radius: 3
        color: "#d9d9d9"
  behaviors:
    - type: spawnShape
      config:
        type: line
        data:
          x1: 10
          y1: 20
          x2: 310
          y2: 20
    - type: movement
      config:
        acceleration:
          x: 0
          y: 20
        maxSpeed: 120
        faceVelocity: false
    - type: rotationStatic
      config:
        min: -20
        max: 20
        distribution:
          kind: bias
          toward: center
          strength: 0.9
  emitter:
    lifetime:
      min: 1
      max: 2
      distribution:
        kind: normal
        mean: 1.4
        deviation: 0.2
    frequency: 0.16666666666666666
    particlesPerWave: 1
    maxParticles: 100
    emitterLifetime: -1
    seed: 4242
