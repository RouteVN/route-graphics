      autofocus: true
      debugVisible: true
      maxLength: 32
      inputMode: text
      enterKeyHint: done
      tabIndex: 4
      textStyle:
        fontSize: 20
        fill: white
      placeholderStyle:
        fill: "#999999"
      padding:
        top: 8
        right: 9
        bottom: 10
        left: 11
      background:
        fill: "#101010"
      selectionStyle:
        alpha: 0.5
      caretStyle:
        width: 3
      focusRing:
        strokeColor: "#FF0000"
      change:
        payload:
          source: change
out:
