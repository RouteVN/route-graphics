file: ../../src/plugins/elements/input/parseInput.js
group: parser
suites:
  - parseInput
---
suite: parseInput
exportName: parseInput
---
case: Test parsing input with defaults
in:
  - state:
      id: player-name
      type: input
      x: 120
      "y": 80
      width: 240
      height: 44
out:
  id: player-name
  type: input
  x: 120
  "y": 80
  width: 240
  height: 44
  alpha: 1
  value: ""
  placeholder: ""
  multiline: false
  disabled: false
  textStyle:
    fill: black
    fontFamily: Arial
    fontSize: 16
    align: left
    lineHeight: 19
    wordWrap: false
    breakWords: false
    whiteSpace: pre
    strokeColor: transparent
    strokeWidth: 0
    wordWrapWidth: 0
  padding:
    top: 10
    right: 12
    bottom: 10
    left: 12
  fill: "#FFFFFF"
  border:
    color: "#2E2E2E"
    width: 1
    alpha: 1
  focusRing:
    color: "#4A89FF"
    width: 2
    alpha: 1
---
case: Test parsing input with custom props
in:
  - state:
      id: secret
      type: input
      x: 200
      "y": 100
      width: 180
      height: 40
      value: hunter2
      placeholder: Password
      multiline: true
      submitOnEnter: false
      secure: true
      readOnly: true
      disabled: true
      autofocus: true
      debugVisible: true
      maxLength: 32
      inputMode: text
      enterKeyHint: done
      tabIndex: 4
      textStyle:
        fontSize: 20
        fill: white
      placeholderStyle:
        fill: "#999999"
      padding:
        top: 8
        right: 9
        bottom: 10
        left: 11
      fill: "#101010"
      border:
        width: 1.7
        color: "#30363D"
        alpha: 0.65
      selectionStyle:
        alpha: 0.5
      caretStyle:
        width: 3
      focusRing:
        width: 3
        color: "#FF0000"
        alpha: 0.9
      change:
        payload:
          source: change
out:
  id: secret
  type: input
  x: 200
  "y": 100
  width: 180
  height: 40
  alpha: 1
  value: hunter2
  placeholder: Password
  multiline: true
  submitOnEnter: false
  disabled: true
  maxLength: 32
  textStyle:
    fill: white
    fontFamily: Arial
    fontSize: 20
    align: left
    lineHeight: 24
    wordWrap: false
    breakWords: false
    whiteSpace: pre
    strokeColor: transparent
    strokeWidth: 0
    wordWrapWidth: 0
  padding:
    top: 8
    right: 9
    bottom: 10
    left: 11
  fill: "#101010"
  border:
    color: "#30363D"
    width: 2
    alpha: 0.65
  focusRing:
    color: "#FF0000"
    width: 3
    alpha: 0.9
  change:
    payload:
      source: change
---
case: Test parsing input with disabled chrome and gradient fill
in:
  - state:
      id: styled
      type: input
      x: 24
      "y": 32
      width: 320
      height: 64
      fill:
        type: linear-gradient
        start: { x: 0, y: 0 }
        end: { x: 1, y: 0 }
        stops:
          - offset: 0
            color: "#101820"
          - offset: 1
            color: "#243B55"
      border:
        width: 0
      focusRing:
        width: -4
      textStyle:
        fill: "#FFFFFF"
out:
  id: styled
  type: input
  x: 24
  "y": 32
  width: 320
  height: 64
  alpha: 1
  value: ""
  placeholder: ""
  multiline: false
  disabled: false
  textStyle:
    fill: "#FFFFFF"
    fontFamily: Arial
    fontSize: 16
    align: left
    lineHeight: 19
    wordWrap: false
    breakWords: false
    whiteSpace: pre
    strokeColor: transparent
    strokeWidth: 0
    wordWrapWidth: 0
  padding:
    top: 10
    right: 12
    bottom: 10
    left: 12
  fill:
    type: linear-gradient
    start: { x: 0, y: 0 }
    end: { x: 1, y: 0 }
    stops:
      - offset: 0
        color: "#101820"
      - offset: 1
        color: "#243B55"
  border:
    color: "#2E2E2E"
    width: 0
    alpha: 1
  focusRing:
    color: "#4A89FF"
    width: 0
    alpha: 1
