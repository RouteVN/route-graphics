file: ../../src/plugins/elements/text-revealing/parseTextRevealing.js
group: parser
suites:
  - parseTextRevealing
---
suite: parseTextRevealing
exportName: parseTextRevealing
---
case: Test parsing simple text-revealing object with single content
in:
  - state:
      id: tr1
      type: text-revealing
      content:
        - text: This is a simple text revealing example
      x: 100
      'y': 100
      textStyle:
        fontSize: 24
        fill: '#333333'
        fontFamily: Arial
        breakWords: false
out:
  id: tr1
  type: text-revealing
  width: 500
  height: 29
  x: 100
  'y': 100
  originX: 0
  originY: 0
  alpha: 1
  content:
    - lineParts:
        - text: This is a simple text revealing example
          textStyle:
            fill: '#333333'
            fontFamily: Arial
            fontSize: 24
            align: left
            lineHeight: 29
            wordWrap: true
            breakWords: false
            strokeColor: transparent
            strokeWidth: 0
            wordWrapWidth: 500
          x: 0
          'y': 0
      'y': 0
      lineMaxHeight: 29
  textStyle:
    fill: '#333333'
    fontFamily: Arial
    fontSize: 24
    align: left
    lineHeight: 1.2
    wordWrap: true
    breakWords: false
    strokeColor: transparent
    strokeWidth: 0
    wordWrapWidth: 0
  speed: 50
  revealEffect: typewriter
