file: ../../src/util/normalizeRenderState.js
group: parser
suites:
  - normalizeRenderState
---
suite: normalizeRenderState
exportName: normalizeRenderState
---
case: Normalize missing arrays to defaults
in:
  - id: state-1
out:
  id: state-1
  elements: []
  animations: []
  audio: []
---
case: Preserve provided arrays
in:
  - id: state-2
    elements:
      - id: text-1
        type: text
    animations:
      - id: anim-1
        targetId: text-1
        type: update
        tween:
          x:
            keyframes:
              - duration: 100
                value: 20
    audio:
      - id: sound-1
        type: sound
out:
  id: state-2
  elements:
    - id: text-1
      type: text
  animations:
    - id: anim-1
      targetId: text-1
      type: update
      tween:
        x:
          keyframes:
            - duration: 100
              value: 20
              easing: linear
  audio:
    - id: sound-1
      type: sound
---
case: Normalize transition animation with mask defaults
in:
  - id: state-2-replace
    animations:
      - id: anim-transition
        targetId: scene-root
        type: transition
        mask:
          kind: single
          texture: masks/wipe.png
out:
  id: state-2-replace
  elements: []
  animations:
    - id: anim-transition
      targetId: scene-root
      type: transition
      mask:
        kind: single
        texture: masks/wipe.png
        progress:
          initialValue: 0
          keyframes:
            - duration: 0
              value: 1
              easing: linear
  audio: []
