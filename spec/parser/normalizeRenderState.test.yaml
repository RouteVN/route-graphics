---
case: Throw when transitions field is provided
in:
  - id: state-3
    transitions: []
throws: "Input error: `transitions` is no longer supported. Use `animations` instead."
---
case: Throw when animation type is missing
in:
  - id: state-3a
    animations:
      - id: anim-1
        targetId: text-1
        tween:
          x:
            keyframes:
              - duration: 100
                value: 20
throws: animations[0].type must be a non-empty string.
---
case: Throw when transition shader is provided
in:
  - id: state-3b
    animations:
      - id: anim-1
        targetId: scene-root
        type: transition
        shader:
          name: burn-dissolve
throws: animations[0].shader is not supported.
---
case: Throw when update animation defines prev
in:
  - id: state-3b-prev
    animations:
      - id: anim-1
        targetId: text-1
        type: update
        tween:
          x:
            keyframes:
              - duration: 100
                value: 20
        prev:
          tween:
            alpha:
              keyframes:
                - duration: 100
                  value: 0
throws: animations[0].prev is only valid for transition animations.
---
case: Throw when update animation defines next
in:
  - id: state-3b-next
    animations:
      - id: anim-1
        targetId: text-1
        type: update
        tween:
          x:
            keyframes:
              - duration: 100
                value: 20
        next:
          tween:
            alpha:
              keyframes:
                - duration: 100
                  value: 1
throws: animations[0].next is only valid for transition animations.
---
case: Throw when update animation defines mask
in:
  - id: state-3b-mask
    animations:
      - id: anim-1
        targetId: text-1
        type: update
        tween:
          x:
            keyframes:
              - duration: 100
                value: 20
        mask:
          kind: single
          texture: masks/wipe.png
throws: animations[0].mask is only valid for transition animations.
---
case: Throw when transition animation defines tween
in:
  - id: state-3b-tween
    animations:
      - id: anim-1
        targetId: scene-root
        type: transition
        tween:
          alpha:
            keyframes:
              - duration: 100
                value: 1
throws: animations[0].tween is not valid for transition animations.
---
case: Throw when easing is unsupported
in:
  - id: state-3c
    animations:
      - id: anim-1
        targetId: text-1
        type: update
        tween:
          x:
            keyframes:
              - duration: 100
                value: 20
                easing: easeInHexagon
throws: "animations[0].tween.x.keyframes[0].easing must be one of:"
---
case: Throw when auto tween defines initialValue
in:
  - id: state-3c-auto-initial
    animations:
      - id: anim-auto-initial
        targetId: text-1
        type: update
        tween:
          x:
            initialValue: 10
            auto:
              duration: 100
throws: animations[0].tween.x.initialValue is not valid when auto is defined.
---
case: Throw when auto tween and keyframes are both defined
in:
  - id: state-3c-auto-keyframes
    animations:
      - id: anim-auto-keyframes
        targetId: text-1
        type: update
        tween:
          x:
            auto:
              duration: 100
            keyframes:
              - duration: 100
                value: 20
throws: animations[0].tween.x cannot define both keyframes and auto.
---
case: Throw when auto tween duration is missing
in:
  - id: state-3c-auto-duration
    animations:
      - id: anim-auto-duration
        targetId: text-1
        type: update
        tween:
          x:
            auto:
              easing: linear
throws: animations[0].tween.x.auto.duration must be a number.
---
case: Throw when auto tween easing is unsupported
in:
  - id: state-3c-auto-easing
    animations:
      - id: anim-auto-easing
        targetId: text-1
        type: update
        tween:
          x:
            auto:
              duration: 100
              easing: easeInHexagon
throws: "animations[0].tween.x.auto.easing must be one of:"
---
case: Throw when playback continuity is unsupported
in:
  - id: state-3c-playback
    animations:
      - id: anim-playback
        targetId: text-1
        type: update
        playback:
          continuity: looping
        tween:
          x:
            keyframes:
              - duration: 100
                value: 20
throws: "animations[0].playback.continuity must be one of: render, persistent."
---
case: Throw when target mixes update and transition types
in:
  - id: state-3d
    animations:
      - id: anim-update
        targetId: scene-root
        type: update
        tween:
          x:
            keyframes:
              - duration: 100
                value: 20
      - id: anim-transition
        targetId: scene-root
        type: transition
        next:
          tween:
            alpha:
              keyframes:
                - duration: 100
                  value: 1
throws: 'Animations targeting "scene-root" cannot mix update and transition types in the same state.'
---
case: Throw when animations is not an array
in:
  - id: state-4
    animations: {}
throws: "Input error: `animations` must be an array."
---
case: Throw when state is not an object
in:
  - invalid
throws: "Input error: render state must be an object."
