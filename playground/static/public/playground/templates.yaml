          fill: "#FFFFFF"
          fontSize: 30
      - id: slider-horizontal
        type: slider
        direction: horizontal
        thumbSrc: horizontal-idle-thumb
        barSrc: horizontal-idle-bar
        width: 400
        height: 24
        x: 40
        y: 120
        min: 0
        max: 100
        step: 1
        initialValue: 30
