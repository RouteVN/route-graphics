- id: interactive-elements
  name: Interactive Elements
  description: Hover and click interactions with text style changes in grayscale.
  content:
    elements:
      - id: stage-bg
        type: rect
        x: 0
        y: 0
        width: 1280
        height: 720
        fill: "#000000"
      - id: title
        type: text
        x: 40
        y: 36
        content: "Interactive Text"
        textStyle:
          fill: "#FFFFFF"
          fontSize: 30
      - id: panel
        type: rect
        x: 40
        y: 96
        width: 540
        height: 200
        fill: "#4D4D4D"
      - id: interactive-label
        type: text
        x: 80
        y: 172
        content: "Hover then click this text"
        textStyle:
          fill: "#A6A6A6"
          fontSize: 26
          fontFamily: "Verdana"
        hover:
          textStyle:
            fill: "#FFFFFF"
            fontSize: 26
            fontFamily: "Verdana"
            lineHeight: 26
            align: left
            wordWrap: false
            breakWords: false
            wordWrapWidth: 540
            strokeColor: "transparent"
            strokeWidth: 0
          cursor: pointer
          payload:
            interaction: hover
        click:
          textStyle:
            fill: "#737373"
            fontSize: 30
            fontFamily: "Verdana"
            lineHeight: 30
            align: left
            wordWrap: false
            breakWords: false
            wordWrapWidth: 540
            strokeColor: "transparent"
            strokeWidth: 0
          payload:
            interaction: click
      - id: note
        type: text
        x: 40
        y: 328
        content: "Events are recorded in the playground event log"
        textStyle:
          fill: "#D9D9D9"
          fontSize: 14

- id: text-revealing
  name: Text Revealing
  description: Grayscale text-revealing flow; colored indicator assets are intentional (asset-based exception).
  content:
    elements:
      - id: stage-bg
        type: rect
        x: 0
        y: 0
        width: 1280
        height: 720
        fill: "#000000"
      - id: showcase-text
        type: text-revealing
        x: 40
        y: 60
        width: 640
        alpha: 1
        content:
          - text: "Route-Graphics"
            textStyle:
              fontSize: 34
              fill: "#FFFFFF"
              fontFamily: "Arial"
              fontWeight: bold
          - text: " text revealing "
            textStyle:
              fontSize: 30
              fill: "#D9D9D9"
              fontFamily: "Arial"
          - text: "with deterministic grayscale output."
            textStyle:
              fontSize: 24
              fill: "#A6A6A6"
              fontFamily: "Georgia"
              lineHeight: 1.35
            furigana:
              text: "stable"
              textStyle:
                fontSize: 12
                fill: "#737373"
                fontFamily: "Arial"
        indicator:
          revealing:
            src: circle-red
            width: 14
            height: 14
          complete:
            src: circle-green
            width: 14
            height: 14
          offset: 12
      - id: instructions
        type: text
        x: 40
        y: 360
        content: "Watch the reveal cursor move from red to green"
        textStyle:
          fill: "#D9D9D9"
          fontSize: 16

