- id: video-demo
  name: Video Demo
  description: Video playback with a non-looping intro followed by a looping ambient clip.
  content:
    - elements:
        - id: stage-bg
          type: rect
          x: 0
          y: 0
          width: 1280
          height: 720
          fill: "#000000"
        - id: title
          type: text
          x: 40
          y: 36
          content: "Video Demo"
          textStyle:
            fill: "#FFFFFF"
            fontSize: 30
        - id: video-preview
          type: video
          x: 40
          y: 92
          width: 720
          height: 405
          src: video-sample
          volume: 0
          loop: false
        - id: caption
          type: text
          x: 40
          y: 530
          content: "State 1 tracks a non-looping sample and should emit renderComplete after playback ends."
          textStyle:
            fill: "#D9D9D9"
            fontSize: 16
    - elements:
        - id: stage-bg
          type: rect
          x: 0
          y: 0
          width: 1280
          height: 720
          fill: "#000000"
        - id: title
          type: text
          x: 40
          y: 36
          content: "Video Demo"
          textStyle:
            fill: "#FFFFFF"
            fontSize: 30
        - id: video-preview
          type: video
          x: 40
          y: 92
          width: 720
          height: 405
          src: video-sample-2
          volume: 0
          loop: true
        - id: caption
          type: text
          x: 40
          y: 530
          content: "State 2 swaps to a looping clip so renderComplete fires immediately after render."
          textStyle:
            fill: "#D9D9D9"
            fontSize: 16

- id: animations-showcase
  name: Animation Showcase
  description: Live animation checkpoints with grayscale visuals.
  content:
    elements:
      - id: stage-bg
        type: rect
        x: 0
        y: 0
        width: 1280
        height: 720
        fill: "#000000"
      - id: title
        type: text
        x: 40
        y: 36
        content: "Animation Showcase"
        textStyle:
          fill: "#FFFFFF"
          fontSize: 30
      - id: animated-rect
        type: rect
        x: 40
        y: 180
        width: 120
        height: 120
        fill: "#FFFFFF"
        alpha: 1
    animations:
      - id: glide-and-fade
        targetId: animated-rect
        type: live
        tween:
          x:
            initialValue: -160
            keyframes:
              - duration: 600
                value: 280
                easing: linear
              - duration: 600
                value: 40
                easing: linear
          alpha:
            initialValue: 0
            keyframes:
              - duration: 600
                value: 1
                easing: linear
              - duration: 600
                value: 1
                easing: linear

