- id: particles-demo
  name: Particles Demo
  description: Particle behavior samples in grayscale.
  content:
    - elements:
        - id: stage-bg
          type: rect
          x: 0
          y: 0
          width: 1280
          height: 720
          fill: "#000000"
        - id: particles-rise
          type: particles
          width: 900
          height: 500
          x: 20
          y: 40
          modules:
            emission:
              mode: continuous
              rate: 66.67
              maxActive: 120
              duration: infinite
              particleLifetime:
                min: 0.8
                max: 1.6
              source:
                kind: rect
                data:
                  x: 200
                  y: 320
                  width: 80
                  height: 12
            movement:
              velocity:
                kind: directional
                direction: -90
                speed:
                  min: 40
                  max: 120
              acceleration:
                x: 0
                y: -180
            appearance:
              texture:
                shape: circle
                radius: 5
                color: "#FFFFFF"
              scale:
                mode: curve
                keys:
                  - value: 1
                    time: 0
                  - value: 0.4
                    time: 1
              alpha:
                mode: curve
                keys:
                  - value: 1
                    time: 0
                  - value: 0
                    time: 1
              color:
                mode: gradient
                keys:
                  - value: "#FFFFFF"
                    time: 0
                  - value: "#A6A6A6"
                    time: 0.5
                  - value: "#4D4D4D"
                    time: 1
    - elements:
        - id: stage-bg
          type: rect
          x: 0
          y: 0
          width: 1280
          height: 720
          fill: "#000000"
        - id: particles-fall
          type: particles
          width: 1280
          height: 720
          modules:
            emission:
              mode: continuous
              rate: 60
              maxActive: 220
              duration: infinite
              particleLifetime:
                min: 3
                max: 6
              source:
                kind: rect
                data:
                  x: 0
                  y: -20
                  width: 1280
                  height: 10
            movement:
              velocity:
                kind: directional
                direction: 90
                speed:
                  min: 50
                  max: 130
            appearance:
              texture:
                shape: rect
                width: 3
                height: 12
                color: "#FFFFFF"
              scale:
                mode: range
                min: 0.7
                max: 1
              alpha:
                mode: curve
                keys:
                  - value: 0
                    time: 0
                  - value: 0.75
                    time: 0.1
                  - value: 0.75
                    time: 0.8
                  - value: 0
                    time: 1
            bounds:
              mode: recycle
              source: area
              padding: 50
    - elements:
        - id: stage-bg
          type: rect
          x: 0
          y: 0
          width: 1280
          height: 720
          fill: "#000000"
        - id: particles-drift
          type: particles
          width: 1280
          height: 720
          modules:
            emission:
              mode: continuous
              rate: 50
              maxActive: 200
              duration: infinite
              particleLifetime:
                min: 4
                max: 7
              source:
                kind: rect
                data:
                  x: 0
                  y: -20
                  width: 1280
                  height: 10
            movement:
              velocity:
                kind: directional
                direction: 90
                speed:
                  min: 35
                  max: 90
            appearance:
              texture:
                shape: circle
                radius: 4
                color: "#FFFFFF"
              alpha:
                mode: curve
                keys:
                  - value: 0
                    time: 0
                  - value: 0.85
                    time: 0.2
                  - value: 0.85
                    time: 0.75
                  - value: 0
                    time: 1
              color:
                mode: gradient
                keys:
                  - value: "#FFFFFF"
                    time: 0
                  - value: "#D9D9D9"
                    time: 0.5
                  - value: "#737373"
                    time: 1
            bounds:
              mode: recycle
              source: area
              padding: 50

- id: spritesheet-animation-demo
  name: Spritesheet Animation Demo
  description: Spritesheet-animation support using a local grayscale atlas texture.
  content:
    elements:
      - id: stage-bg
        type: rect
        x: 0
        y: 0
        width: 1280
        height: 720
        fill: "#000000"
      - id: title
        type: text
        x: 40
        y: 36
        content: "Spritesheet Animation Demo"
        textStyle:
          fill: "#FFFFFF"
          fontSize: 30
      - id: animated-bar
        type: spritesheet-animation
        x: 60
        y: 140
        width: 520
        height: 28
        src: slider
        atlas:
          frames:
            frame-0.png: { x: 0, y: 0, width: 218, height: 16 }
            frame-1.png: { x: 218, y: 0, width: 218, height: 16 }
          width: 436
          height: 16
        clips:
          pulse: [frame-0.png, frame-1.png]
        playback:
          clip: pulse
          fps: 10.8
          loop: true
      - id: subtitle
        type: text
        x: 40
        y: 200
        content: "Using two atlas frames from slider.png"
        textStyle:
          fill: "#D9D9D9"
          fontSize: 16

- id: global-config-demo
  name: Global Config Demo
  description: Demonstrates global cursor styles and keyboard bindings with deterministic grayscale visuals.
  content:
    global:
      cursorStyles:
        default: crosshair
        hover: pointer
      keyboard:
        r:
          payload:
            shortcut: reset-demo
            source: global-keyboard
    elements:
      - id: stage-bg
        type: rect
        x: 0
        y: 0
        width: 1280
        height: 720
        fill: "#000000"
      - id: title
        type: text
        x: 40
        y: 36
        content: "Global Config Demo"
        textStyle:
          fill: "#FFFFFF"
          fontSize: 30
      - id: hoverable-text
        type: text
        x: 40
        y: 124
        content: "Hover + click this text, then press R"
        textStyle:
          fill: "#A6A6A6"
          fontSize: 24
          fontFamily: "Verdana"
        hover:
          textStyle:
            fill: "#FFFFFF"
            fontSize: 24
            fontFamily: "Verdana"
            lineHeight: 24
            align: left
            wordWrap: false
            breakWords: false
            wordWrapWidth: 900
            strokeColor: "transparent"
            strokeWidth: 0
          cursor: pointer
          payload:
            source: hoverable-text
            event: hover
        click:
          textStyle:
            fill: "#737373"
            fontSize: 24
            fontFamily: "Verdana"
            lineHeight: 24
            align: left
            wordWrap: false
            breakWords: false
            wordWrapWidth: 900
            strokeColor: "transparent"
            strokeWidth: 0
          payload:
            source: hoverable-text
            event: click
      - id: console-note
        type: text
        x: 40
        y: 176
        content: "Keyboard and interaction payloads are logged in the event log"
        textStyle:
          fill: "#D9D9D9"
          fontSize: 14
