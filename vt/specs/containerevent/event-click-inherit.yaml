---
title: Container Click Inherits to Descendants
description: Test container click inheritance applying descendant pressed visuals even when pressing an empty area inside the container; sprite texture swap and text fill changes are intentional visual-state exceptions.
specs:
  - pressing an empty area inside the container should not affect children before click inheritance is enabled
  - enabling click inheritance should apply pressed visuals to direct and nested descendants
  - releasing the pointer should restore the idle descendant visuals
steps:
  - action: move
    x: 30
    "y": 30
  - action: wait
    ms: 50
  - action: move
    x: 250
    "y": 150
  - action: wait
    ms: 50
  - action: mouseDown
  - action: screenshot
  - action: mouseUp
  - action: keypress
    key: "n"
  - action: wait
    ms: 50
  - action: move
    x: 30
    "y": 30
  - action: wait
    ms: 50
  - action: move
    x: 250
    "y": 150
  - action: wait
    ms: 50
  - action: mouseDown
  - action: screenshot
  - action: mouseUp
  - action: wait
    ms: 50
  - action: screenshot
---
states:
  - elements:
      - id: click-container
        type: container
        x: 100
        "y": 80
        width: 360
        height: 140
        children:
          - id: click-sprite
            type: sprite
            x: 20
            "y": 30
            width: 60
            height: 60
            src: circle-blue
            click:
              src: circle-red
          - id: nested-click-container
            type: container
            x: 220
            "y": 30
            children:
              - id: click-label
                type: text
                x: 0
                "y": 0
                content: Nested press
                textStyle:
                  fontFamily: Arial
                  fontSize: 34
                  fill: "#737373"
                click:
                  textStyle:
                    fontFamily: Arial
                    fontSize: 34
                    fill: "#FFFFFF"
  - elements:
      - id: click-container
        type: container
        x: 100
        "y": 80
        width: 360
        height: 140
        click:
          inheritToChildren: true
        children:
          - id: click-sprite
            type: sprite
            x: 20
            "y": 30
            width: 60
            height: 60
            src: circle-blue
            click:
              src: circle-red
          - id: nested-click-container
            type: container
            x: 220
            "y": 30
            children:
              - id: click-label
                type: text
                x: 0
                "y": 0
                content: Nested press
                textStyle:
                  fontFamily: Arial
                  fontSize: 34
                  fill: "#737373"
                click:
                  textStyle:
                    fontFamily: Arial
                    fontSize: 34
                    fill: "#FFFFFF"
