---
title: Container Hover Inherits to Descendants
description: Test container hover inheritance applying descendant hover visuals, including nested descendants and updates while hovered; sprite texture swap and text fill changes are intentional visual-state exceptions.
specs:
  - hovering an empty area inside the container should not affect children before inheritance is enabled
  - enabling hover inheritance should apply hover visuals to direct and nested descendants
  - descendants added while the container is already hovered should appear in their inherited hover state
steps:
  - action: move
    x: 30
    "y": 30
  - action: wait
    ms: 50
  - action: move
    x: 280
    "y": 150
  - action: wait
    ms: 50
  - action: screenshot
  - action: keypress
    key: "n"
  - action: wait
    ms: 50
  - action: move
    x: 30
    "y": 30
  - action: wait
    ms: 50
  - action: move
    x: 280
    "y": 150
  - action: wait
    ms: 50
  - action: screenshot
  - action: keypress
    key: "n"
  - action: wait
    ms: 50
  - action: screenshot
---
states:
