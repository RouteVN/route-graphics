---
title: Rect Mask Absolute Position
description: A masked transition with an absolute x tween that moves outside the original snapshot bounds
specs:
  - masked transitions should size their offscreen frame to include absolute position tween extents
  - the incoming rect should be visible at 500ms while it is outside the original rect bounds
  - replace should finish on the next rect state after 1000ms
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
---
states:
  - id: mask-position-start
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 220
        width: 180
        height: 180
        fill: "#F2F2F2"
        alpha: 1
  - id: mask-position-end
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 220
        width: 180
        height: 180
        fill: "#4D4D4D"
        alpha: 1
    animations:
      - id: rect-mask-position
        targetId: rect1
        type: transition
        next:
          tween:
            x:
              initialValue: 760
              keyframes:
                - duration: 1000
                  value: 160
                  easing: linear
        mask:
          kind: single
          texture: mask-full
          channel: red
          progress:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
