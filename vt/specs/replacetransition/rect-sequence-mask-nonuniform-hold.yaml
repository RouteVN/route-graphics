---
title: Rect Sequence Mask Nonuniform Hold
description: A same-id rect transition using hold sampling with nonuniform sequence frame positions
specs:
  - hold sampling should keep the first frame until progress reaches the next authored at value
  - nonuniform frame positions should delay the center-band reveal until late progress
  - the transition should settle on the next rect fill after progress reaches 1
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 350
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 150
  - action: screenshot
---
states:
  - id: sequence-hold-nonuniform-start
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#F2F2F2"
        alpha: 1
  - id: sequence-hold-nonuniform-end
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#4D4D4D"
        alpha: 1
    animations:
      - id: rect-sequence-hold-nonuniform
        targetId: rect1
        type: transition
        mask:
          kind: sequence
          frames:
            - at: 0
              texture: mask-empty
            - at: 0.8
              texture: mask-center-band
            - at: 1
              texture: mask-full
          channel: alpha
          progress:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
