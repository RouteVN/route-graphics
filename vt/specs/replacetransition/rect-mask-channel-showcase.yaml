---
states:
  - id: channel-base
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#F2F2F2"
        alpha: 1
  - id: channel-red
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#4D4D4D"
        alpha: 1
    animations:
      - id: rect-mask-channel-red
        targetId: rect1
        type: transition
        mask:
          kind: single
          texture: mask-rgba-channels
          channel: red
          softness: 0.02
          progress:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
  - id: channel-green
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#F2F2F2"
        alpha: 1
    animations:
      - id: rect-mask-channel-green
        targetId: rect1
        type: transition
        mask:
          kind: single
          texture: mask-rgba-channels
          channel: green
          softness: 0.02
          progress:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
  - id: channel-blue
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#4D4D4D"
        alpha: 1
    animations:
      - id: rect-mask-channel-blue
