---
title: Rect Mask Channel Showcase
description: A multi-state showcase for single-mask channel selection and invert using one RGBA mask texture
specs:
  - single masks should honor red, green, blue, and alpha channel selection
  - invert should reverse the chosen channel reveal field
  - each transition should still settle on the next rect fill after 1000ms
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
