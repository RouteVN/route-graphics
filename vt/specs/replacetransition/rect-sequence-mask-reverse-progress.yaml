---
title: Rect Sequence Mask Reverse Progress
description: A same-id rect transition whose mask progress moves forward, backward, then forward again
specs:
  - sequence progress should select later frames while moving forward
  - sequence progress should select earlier frames again when the timeline value decreases
  - the transition should still finalize to the next rect fill after the final forward segment
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: screenshot
---
states:
  - id: sequence-reverse-start
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#F2F2F2"
        alpha: 1
  - id: sequence-reverse-end
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#4D4D4D"
        alpha: 1
    animations:
      - id: rect-sequence-reverse-progress
        targetId: rect1
        type: transition
        mask:
          kind: sequence
          frames:
            - at: 0
              texture: mask-empty
            - at: 0.5
              texture: mask-center-band
            - at: 1
              texture: mask-full
          channel: alpha
          progress:
            initialValue: 0
            keyframes:
              - duration: 500
                value: 1
                easing: linear
              - duration: 500
                value: 0
                easing: linear
              - duration: 500
                value: 1
                easing: linear
