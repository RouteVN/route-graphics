---
title: Rect Tween Exit
description: A prev-only rect transition using subject tweens while tolerating an unused next side.
specs:
  - prev-only transitions should ignore next tween config when there is no next subject
  - the rect should be partially offscreen at 500ms
  - the rect should fully clear by 1000ms
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
---
states:
  - id: tween-exit-start
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#D9D9D9"
        alpha: 1
  - id: tween-exit-end
    elements: []
    animations:
      - id: rect-tween-exit
        targetId: rect1
        type: transition
        prev:
          tween:
            translateX:
              initialValue: 0
              keyframes:
                - duration: 1000
                  value: -1
                  easing: linear
        next:
          tween:
            alpha:
              initialValue: 0
              keyframes:
                - duration: 1000
                  value: 1
                  easing: linear
