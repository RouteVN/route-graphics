---
title: Rect Sequence Mask Nonuniform Linear
description: A same-id rect transition using linear sampling between nonuniform sequence frame positions
specs:
  - linear sampling should interpolate from left to center over the short first span
  - linear sampling should interpolate from center to right over the longer second span
  - the transition should settle on the next rect fill after progress reaches 1
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 375
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 375
  - action: screenshot
---
states:
  - id: sequence-linear-nonuniform-start
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#F2F2F2"
        alpha: 1
  - id: sequence-linear-nonuniform-end
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#4D4D4D"
        alpha: 1
    animations:
      - id: rect-sequence-linear-nonuniform
        targetId: rect1
        type: transition
        mask:
          kind: sequence
          frames:
            - at: 0
              texture: mask-left-band
            - at: 0.25
              texture: mask-center-band
            - at: 1
              texture: mask-right-band
          channel: alpha
          sample: linear
          softness: 0.001
          progress:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
