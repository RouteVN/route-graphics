---
title: Rect Replace Push Left
description: A same-id rect replace animation using subject transforms for a push-left handoff
specs:
  - replace should keep the same target id while animating prev and next subjects separately
  - the outgoing rect should move left while the incoming rect moves in from the right
  - replace should finish on the next rect state after 1000ms
steps:
  - action: keypress
    key: "n"
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
---
states:
  - id: push-start
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#F2F2F2"
        alpha: 1
  - id: push-end
    elements:
      - id: rect1
        type: rect
        x: 160
        "y": 120
        width: 960
        height: 480
        fill: "#4D4D4D"
        alpha: 1
    animations:
      - id: rect-push-left
        targetId: rect1
        type: replace
        prev:
          tween:
            translateX:
              initialValue: 0
              keyframes:
                - duration: 1000
                  value: -1
                  easing: linear
        next:
          tween:
            translateX:
              initialValue: 1
              keyframes:
                - duration: 1000
                  value: 0
                  easing: linear
