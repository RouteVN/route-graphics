---
title: Sprite Replace Mask With Asymmetric Fixtures
description: A same-id fullscreen sprite replace using deliberately asymmetric in/out fixtures so UV drift or scaling errors are easy to spot.
specs:
  - same-id sprite replace should preserve asymmetric fixture geometry during a masked reveal
  - multiple intermediate frames should partially reveal the incoming sprite without stretching its landmarks
  - the final frame should settle on the incoming sprite at the authored 1280x720 layout after a slower wipe
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 1000
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 1000
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 1000
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 1000
  - action: screenshot
---
states:
  - id: sprite-mask-asym-start
    elements:
      - id: sample-bg
        type: sprite
        src: sprite-mask-asym-outgoing
        x: 0
        "y": 0
        width: 1280
        height: 720
        alpha: 1
  - id: sprite-mask-asym-end
    elements:
      - id: sample-bg
        type: sprite
        src: sprite-mask-asym-incoming
        x: 0
        "y": 0
        width: 1280
        height: 720
        alpha: 1
    animations:
      - id: sample-mask-asym-replace
        targetId: sample-bg
        type: transition
        mask:
          kind: single
          texture: sprite-mask-asym-red
          channel: red
          softness: 0.08
          progress:
            initialValue: 0
            keyframes:
              - duration: 4000
                value: 1
                easing: linear
