---
title: Replace Transition Waits for Previous Plugin Delete
description: |
  Exercises a cross-type transition whose previous plugin cleanup returns a
  manually released Promise.
specs:
  - no next live object or transition overlay should be installed before cleanup settles
  - renderComplete should remain pending during cleanup and transition playback
  - the final live object should be owned by the next element plugin
skipInitialScreenshot: true
useBrowserScreenshot: true
steps:
  - action: customEvent
    name: clearEvents
  - action: keypress
    key: "n"
  - action: wait
    ms: 50
  - action: assert
    type: js
    fn: vtAssert.pendingDeferredRectDeleteIds
    value:
      - transition-target
  - action: assert
    type: js
    fn: vtAssert.mountedVtElementType
    args:
      - transition-target
    value: vt-deferred-rect
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - renderComplete
      - all
    value: []
  - action: customEvent
    name: vtResolveDeferredRectDelete
    detail:
      elementId: transition-target
  - action: wait
    ms: 50
  - action: assert
    type: js
    fn: vtAssert.pendingDeferredRectDeleteIds
    value: []
  - action: assert
    type: js
    fn: vtAssert.mountedVtElementType
    args:
      - transition-target
    value: vt-strict-rect
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - renderComplete
      - all
    value: []
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - renderComplete
      - all
    value: []
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - renderComplete
      - all
    value:
      - id: transition-latest
        aborted: false
  - action: assert
    type: js
    fn: vtAssert.pluginDispatchMismatches
    value: []
---
states:
  - id: transition-baseline
    elements:
      - id: stage-background
        type: rect
        x: 0
        "y": 0
        width: 1280
        height: 720
        fill: "#111827"
      - id: state-heading
        type: text
        x: 80
        "y": 64
        content: "Baseline: previous plugin A is live"
        textStyle:
          fontSize: 30
          fill: "#F8FAFC"
      - id: transition-target
        type: vt-deferred-rect
        x: 180
        "y": 220
        width: 300
        height: 220
        fill: "#EF4444"
  - id: transition-latest
    elements:
      - id: stage-background
        type: rect
        x: 0
        "y": 0
        width: 1280
        height: 720
        fill: "#111827"
      - id: state-heading
        type: text
        x: 80
        "y": 64
        content: "Latest: transition waits, then installs plugin B"
        textStyle:
          fontSize: 30
          fill: "#F8FAFC"
      - id: transition-target
        type: vt-strict-rect
        x: 760
        "y": 220
        width: 300
        height: 220
        fill: "#3B82F6"
    animations:
      - id: deferred-delete-transition
        targetId: transition-target
        type: transition
        prev:
          tween:
            translateX:
              initialValue: 0.2
              keyframes:
                - duration: 1000
                  value: -0.2
                  easing: linear
            alpha:
              initialValue: 1
              keyframes:
                - duration: 1000
                  value: 0
                  easing: linear
        next:
          tween:
            translateX:
              initialValue: -0.2
              keyframes:
                - duration: 1000
                  value: 0
                  easing: linear
            alpha:
              initialValue: 0
              keyframes:
                - duration: 1000
                  value: 1
                  easing: linear
