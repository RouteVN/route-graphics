---
title: Persistent Deferred Transition Parent Rebuild
description: |
  Exercises a persistent same-id cross-type transition whose previous delete
  remains pending while a newer render rebuilds its scrolling content parent.
specs:
  - the pending transition should survive the superseding render
  - cleanup should retry against the rebuilt physical parent
  - the overlay and next object should install in the rebuilt content parent
  - plugin lifecycle dispatch should always match the live object type
skipInitialScreenshot: true
useBrowserScreenshot: true
steps:
  - action: customEvent
    name: clearEvents
  - action: keypress
    key: "n"
  - action: assert
    type: js
    fn: vtAssert.pendingDeferredRectDeleteIds
    value:
      - persistent-target
  - action: keypress
    key: "n"
  - action: wait
    ms: 50
  - action: assert
    type: js
    fn: vtAssert.pendingDeferredRectDeleteIds
    value:
      - persistent-target
  - action: assert
    type: js
    fn: vtAssert.mountedVtElementType
    args:
      - persistent-target
    value: vt-deferred-rect
  - action: screenshot
  - action: customEvent
    name: vtResolveDeferredRectDelete
    detail:
      elementId: persistent-target
  - action: wait
    ms: 50
  - action: assert
    type: js
    fn: vtAssert.pendingDeferredRectDeleteIds
    value: []
  - action: assert
    type: js
    fn: vtAssert.mountedVtElementType
    args:
      - persistent-target
    value: vt-strict-rect
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.mountedVtElementType
    args:
      - persistent-target
    value: vt-strict-rect
  - action: assert
    type: js
    fn: vtAssert.pluginDispatchMismatches
    value: []
---
states:
  - id: persistent-baseline
    elements:
      - id: stage-background
        type: rect
        x: 0
        "y": 0
        width: 1280
        height: 720
        fill: "#111827"
      - id: state-heading
        type: text
        x: 80
        "y": 64
        content: "Baseline: plugin A is mounted"
        textStyle:
          fontSize: 30
          fill: "#F8FAFC"
      - id: panel-background
        type: rect
        x: 80
        "y": 150
        width: 420
        height: 300
        fill: "#1F2937"
      - id: persistent-scroll-panel
        type: container
        x: 100
        "y": 170
        width: 380
        height: 260
        scroll: true
        children:
          - id: persistent-target
            type: vt-deferred-rect
            x: 20
            "y": 20
            width: 320
            height: 300
            fill: "#EF4444"
  - id: persistent-pending
    elements:
      - id: stage-background
        type: rect
        x: 0
        "y": 0
        width: 1280
        height: 720
        fill: "#111827"
      - id: state-heading
        type: text
        x: 80
        "y": 64
        content: "Pending: persistent transition waits for cleanup"
        textStyle:
          fontSize: 30
          fill: "#F8FAFC"
      - id: panel-background
        type: rect
        x: 80
        "y": 150
        width: 420
        height: 300
        fill: "#1F2937"
      - id: persistent-scroll-panel
        type: container
        x: 100
        "y": 170
        width: 380
        height: 260
        scroll: true
        children:
          - id: persistent-target
            type: vt-strict-rect
            x: 20
            "y": 20
            width: 320
            height: 300
            fill: "#3B82F6"
    animations: &persistentAnimations
      - id: persistent-target-transition
        targetId: persistent-target
        type: transition
        playback:
          continuity: persistent
        prev:
          tween:
            alpha:
              initialValue: 1
              keyframes:
                - duration: 1000
                  value: 0
                  easing: linear
        next:
          tween:
            alpha:
              initialValue: 0
              keyframes:
                - duration: 1000
                  value: 1
                  easing: linear
  - id: persistent-rebuilt
    elements:
      - id: stage-background
        type: rect
        x: 0
        "y": 0
        width: 1280
        height: 720
        fill: "#111827"
      - id: state-heading
        type: text
        x: 80
        "y": 64
        content: "Latest: rebuilt parent retains transition B"
        textStyle:
          fontSize: 30
          fill: "#F8FAFC"
      - id: panel-background
        type: rect
        x: 80
        "y": 150
        width: 460
        height: 300
        fill: "#1F2937"
      - id: persistent-scroll-panel
        type: container
        x: 100
        "y": 170
        width: 420
        height: 260
        scroll: true
        children:
          - id: persistent-target
            type: vt-strict-rect
            x: 20
            "y": 20
            width: 320
            height: 300
            fill: "#3B82F6"
    animations: *persistentAnimations
