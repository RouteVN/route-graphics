---
title: Rect Replace Burn Dissolve
description: A same-id rect replace animation using the burn-dissolve shader styling path
specs:
  - "shader-backed replace should tint the transition edge during the dissolve"
  - "burn dissolve should still use the same-id replace handoff"
  - "replace should finish on the next rect state after 1000ms"
steps:
  - action: keypress
    key: n
  - customEvent snapShotKeyFrame deltaMS=500
  - action: screenshot
  - customEvent snapShotKeyFrame deltaMS=500
  - action: screenshot
---
states:
  - id: "burn-start"
    elements:
      - id: "rect1"
        type: "rect"
        x: 160
        y: 120
        width: 960
        height: 480
        fill: "#F2F2F2"
        alpha: 1
  - id: "burn-end"
    elements:
      - id: "rect1"
        type: "rect"
        x: 160
        y: 120
        width: 960
        height: 480
        fill: "#4D4D4D"
        alpha: 1
    animations:
      - id: "rect-burn-replace"
        targetId: "rect1"
        operation: "replace"
        mask:
          kind: "single"
          texture: "mask-diagonal"
          channel: "red"
          softness: 0.06
          progress:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
        shader:
          name: "burn-dissolve"
          uniforms:
            lowColor: [0.12, 0.03, 0.02]
            highColor: [1.0, 0.55, 0.08]
