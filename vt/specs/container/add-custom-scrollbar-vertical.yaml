---
title: Custom Vertical Scrollbar
specs:
  - overflowing containers should render custom vertical scrollbar chrome
  - configured scrollbars should hide when the container does not overflow
  - scrollbar hover styles should apply to the thumb and arrow buttons
steps:
  - action: screenshot
  - action: move
    x: 292
    "y": 122
  - action: wait
    ms: 100
  - action: screenshot
  - action: move
    x: 292
    "y": 88
  - action: wait
    ms: 100
  - action: screenshot
