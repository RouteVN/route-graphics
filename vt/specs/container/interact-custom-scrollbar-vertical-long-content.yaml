---
title: Custom Vertical Scrollbar Long Content
specs:
  - very long containers should keep the custom scrollbar visible and usable
  - the thumb should stay synchronized during deep wheel scrolling
  - dragging the thumb on long content should jump the viewport through a large range
steps:
  - action: screenshot
  - action: move
    x: 180
    "y": 190
  - action: scroll
    deltaX: 0
    deltaY: 360
  - action: wait
    ms: 120
  - action: screenshot
  - action: scroll
    deltaX: 0
    deltaY: 720
  - action: wait
    ms: 120
  - action: screenshot
  - action: move
    x: 292
    "y": 150
  - action: mouseDown
  - action: move
    x: 292
    "y": 270
  - action: wait
    ms: 120
  - action: screenshot
  - action: mouseUp
