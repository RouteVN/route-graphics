      - id: frame
        type: rect
        x: 72
        "y": 72
        width: 236
        height: 236
        fill: "#23262B"
      - id: instructions
        type: text
        content: Long content stress case
        x: 80
        "y": 32
        textStyle:
          fontSize: 24
          fill: "#F3F5F7"
          fontFamily: Arial
      - id: long-container
        type: container
        x: 80
        "y": 80
        width: 220
        height: 220
        direction: vertical
        gapX: 6
