---
title: Anchor To Bottom Viewport Parity
specs:
  - anchorToBottom containers should pin visible content to the viewport bottom
  - anchored and non-anchored containers should remain visually distinct under scroll
  - scrolling should preserve bottom alignment for the anchored container
steps:
  - action: screenshot
  - action: keypress
    key: "n"
  - action: screenshot
  - action: move
    x: 350
    "y": 150
  - action: scroll
    deltaX: 0
    deltaY: -100
  - action: wait
    ms: 100
  - action: screenshot
