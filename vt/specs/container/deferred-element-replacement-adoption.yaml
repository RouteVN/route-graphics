---
title: Deferred Element Replacement Adoption
description: |
  Exercises a same-id type replacement whose previous plugin delete remains pending
  while a newer render rebuilds the scrolling content parent and retains the desired type.
specs:
  - a superseding render should adopt a pending same-id replacement
  - cleanup should retarget to the rebuilt scrolling content parent
  - renderComplete should wait for both deferred cleanup and the mounted update animation
  - deferred mounting should explicitly present a new browser frame
skipInitialScreenshot: true
useBrowserScreenshot: true
steps:
  - action: customEvent
    name: clearEvents
  - action: keypress
    key: "n"
  - action: assert
    type: js
    fn: vtAssert.pendingDeferredRectDeleteIds
    value:
      - adoption-target
  - action: keypress
    key: "n"
  - action: wait
    ms: 50
  - action: assert
    type: js
    fn: vtAssert.pendingDeferredRectDeleteIds
    value:
      - adoption-target
  - action: assert
    type: js
    fn: vtAssert.mountedVtElementType
    args:
      - adoption-target
    value: vt-deferred-rect
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - renderComplete
      - all
    value:
      - id: adoption-pending
        aborted: true
  - action: customEvent
    name: vtResolveDeferredRectDelete
    detail:
      elementId: adoption-target
  - action: wait
    ms: 50
  - action: assert
    type: js
    fn: vtAssert.pendingDeferredRectDeleteIds
    value: []
  - action: assert
    type: js
    fn: vtAssert.mountedVtElementType
    args:
      - adoption-target
    value: vt-strict-rect
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - renderComplete
      - all
    value:
      - id: adoption-pending
        aborted: true
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - renderComplete
      - all
    value:
      - id: adoption-pending
        aborted: true
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 500
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - renderComplete
      - all
    value:
      - id: adoption-pending
        aborted: true
      - id: adoption-latest
        aborted: false
  - action: assert
    type: js
    fn: vtAssert.pluginDispatchMismatches
    value: []
---
states:
  - id: adoption-baseline
    elements:
      - id: stage-background
        type: rect
        x: 0
        "y": 0
        width: 1280
        height: 720
        fill: "#111827"
      - id: state-heading
        type: text
        x: 80
        "y": 64
        content: "Baseline: deferred plugin A is mounted"
        textStyle:
          fontSize: 30
          fill: "#F8FAFC"
      - id: panel-background
        type: rect
        x: 80
        "y": 150
        width: 420
        height: 300
        fill: "#1F2937"
      - id: adoption-scroll-panel
        type: container
        x: 100
        "y": 170
        width: 380
        height: 260
        scroll: true
        children:
          - id: adoption-target
            type: vt-deferred-rect
            x: 20
            "y": 20
            width: 320
            height: 300
            fill: "#EF4444"
  - id: adoption-pending
    elements:
      - id: stage-background
        type: rect
        x: 0
        "y": 0
        width: 1280
        height: 720
        fill: "#111827"
      - id: state-heading
        type: text
        x: 80
        "y": 64
        content: "Pending: state requests plugin B"
        textStyle:
          fontSize: 30
          fill: "#F8FAFC"
      - id: panel-background
        type: rect
        x: 80
        "y": 150
        width: 420
        height: 300
        fill: "#1F2937"
      - id: adoption-scroll-panel
        type: container
        x: 100
        "y": 170
        width: 380
        height: 260
        scroll: true
        children:
          - id: adoption-target
            type: vt-strict-rect
            x: 20
            "y": 20
            width: 320
            height: 300
            fill: "#3B82F6"
  - id: adoption-latest
    elements:
      - id: stage-background
        type: rect
        x: 0
        "y": 0
        width: 1280
        height: 720
        fill: "#111827"
      - id: state-heading
        type: text
        x: 80
        "y": 64
        content: "Latest: rebuilt scroll parent retains plugin B"
        textStyle:
          fontSize: 30
          fill: "#F8FAFC"
      - id: panel-background
        type: rect
        x: 80
        "y": 150
        width: 460
        height: 300
        fill: "#1F2937"
      - id: adoption-scroll-panel
        type: container
        x: 100
        "y": 170
        width: 420
        height: 260
        scroll: true
        children:
          - id: adoption-target
            type: vt-strict-rect
            x: 20
            "y": 20
            width: 320
            height: 300
            fill: "#3B82F6"
    animations:
      - id: adoption-target-fade
        targetId: adoption-target
        type: update
        tween:
          alpha:
            initialValue: 0.25
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
