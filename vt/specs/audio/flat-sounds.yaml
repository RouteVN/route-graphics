---
title: Audio Manual - Flat Sounds
description: Manual fixture for flat sound compatibility, continuing same-id sounds, source replacement, and one-shot replay ids. Use the state pager or n/b keys.
skipScreenshot: true
specs:
  - state 1 is silent so pressing n starts audio from a user gesture
  - state 2 should play bgm-1 as a flat looping sound
  - state 3 should keep the same id and source, changing volume without replaying
  - state 4 should keep the same id but replace the source with bgm-2
  - states 5 and 6 should replay sfx-1 because the one-shot ids change
---
states:
  - id: flat-ready
    audio: []
  - id: flat-bgm-start
    audio:
      - id: flat-bgm
        type: sound
        src: bgm-1
        loop: true
        volume: 60
    audioEffects:
      - id: flat-bgm-enter
        type: audio-transition
        targetId: flat-bgm
        properties:
          volume:
            enter:
              from: 0
              duration: 1000
              easing: linear
  - id: flat-bgm-continue-quieter
    audio:
      - id: flat-bgm
        type: sound
        src: bgm-1
        loop: true
        volume: 25
    audioEffects:
      - id: flat-bgm-update
        type: audio-transition
        targetId: flat-bgm
        properties:
          volume:
            update:
              duration: 800
              easing: linear
            exit:
              to: 0
              duration: 1000
              easing: linear
  - id: flat-bgm-replace-source
    audio:
      - id: flat-bgm
        type: sound
        src: bgm-2
        loop: true
        volume: 55
    audioEffects:
      - id: flat-bgm-replace-enter
        type: audio-transition
        targetId: flat-bgm
        properties:
          volume:
            enter:
              from: 0
              duration: 1000
              easing: linear
            exit:
              to: 0
              duration: 1000
              easing: linear
  - id: flat-one-shot-first
    audio:
      - id: flat-bgm
        type: sound
        src: bgm-2
        loop: true
        volume: 45
      - id: one-shot-1
        type: sound
        src: sfx-1
        volume: 100
  - id: flat-one-shot-second
    audio:
      - id: flat-bgm
        type: sound
        src: bgm-2
        loop: true
        volume: 45
      - id: one-shot-2
        type: sound
        src: sfx-1
        volume: 100
