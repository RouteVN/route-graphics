---
title: Audio Manual - Source Replacement by Src
description: Isolated fixture proving that changing src crossfades a same-id sound through overlapping replacement instances.
skipScreenshot: true
specs:
  - state 1 is silent so pressing n or clicking Next starts audio from a user gesture
  - state 2 should start looping bgm-1
  - state 3 should crossfade it to bgm-2 even though the public sound id is unchanged
  - state 4 should fade out and stop the sound
---
states:
  - id: replacement-src-ready
    audio: []
  - id: replacement-src-first
    audio:
      - id: replacement-src-bgm
        type: sound
        src: bgm-1
        loop: true
        volume: 80
    audioEffects:
      - id: replacement-src-first-exit
        type: audio-transition
        targetId: replacement-src-bgm
        properties:
          volume:
            exit:
              keyframes:
                - { value: 0, duration: 1200, easing: linear }
  - id: replacement-src-second
    audio:
      - id: replacement-src-bgm
        type: sound
        src: bgm-2
        loop: true
        volume: 80
    audioEffects:
      - id: replacement-src-second-enter-exit
        type: audio-transition
        targetId: replacement-src-bgm
        properties:
          volume:
            enter:
              initialValue: 0
              keyframes:
                - { value: 80, duration: 1200, easing: linear }
            exit:
              keyframes:
                - { value: 0, duration: 1200, easing: linear }
  - id: replacement-src-stopped
    audio: []
