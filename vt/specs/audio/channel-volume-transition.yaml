---
title: Audio Manual - Channel Volume Transition
description: Isolated fixture for channel-volume enter, update, and exit automation.
skipScreenshot: true
specs:
  - state 1 is silent so pressing n or clicking Next starts audio from a user gesture
  - state 2 should fade the channel in from silence over two seconds
  - state 3 should fade the continuing channel down to volume 25 over two seconds
  - state 4 should fade it out over two seconds and then stop it
---
states:
  - id: channel-volume-transition-ready
    audio: []
  - id: channel-volume-transition-enter
    audio:
      - id: music
        type: audio-channel
        volume: 80
        children:
          - id: channel-volume-transition-bgm
            type: sound
            src: bgm-1
            loop: true
    audioEffects:
      - id: channel-volume-enter
        type: audio-transition
        targetId: music
        properties:
          volume:
            enter: { from: 0, duration: 2000, easing: linear }
  - id: channel-volume-transition-update
    audio:
      - id: music
        type: audio-channel
        volume: 25
        children:
          - id: channel-volume-transition-bgm
            type: sound
            src: bgm-1
            loop: true
    audioEffects:
      - id: channel-volume-update-exit
        type: audio-transition
        targetId: music
        properties:
          volume:
            update: { duration: 2000, easing: linear }
            exit: { to: 0, duration: 2000, easing: linear }
  - id: channel-volume-transition-exit
    audio: []
