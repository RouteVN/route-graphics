---
title: Audio Manual - Channel Mixer
description: Manual fixture for channel volume, channel and sound mute, channel and sound pan, and moving a continuing sound between channels. Use the state pager or n/b keys.
skipScreenshot: true
specs:
  - state 1 is silent so pressing n starts audio from a user gesture
  - state 2 should play bgm-1 through the music channel at moderate level
  - state 3 should raise channel gain without restarting the same sound
  - state 4 should immediately mute the music channel
  - state 5 should unmute the channel and resume the continuing sound
  - state 6 should immediately mute only the child sound
  - state 7 should unmute the child and pan the channel fully left
  - state 8 should center the channel and pan the child fully right
  - state 9 should move the same sound id to a second channel without restarting
---
states:
  - id: channel-ready
    audio: []
  - id: channel-music-moderate
    audio:
      - id: music
        type: audio-channel
        volume: 45
        children:
          - id: bgm-bed
            type: sound
            src: bgm-1
            loop: true
            volume: 80
  - id: channel-music-louder
    audio:
      - id: music
        type: audio-channel
        volume: 90
        children:
          - id: bgm-bed
            type: sound
            src: bgm-1
            loop: true
            volume: 80
    audioEffects:
      - id: music-volume-update
        type: audio-transition
        targetId: music
        properties:
          volume:
            update:
              duration: 1200
              easing: linear
  - id: channel-muted
    audio:
      - id: music
        type: audio-channel
        volume: 90
        muted: true
        children:
          - id: bgm-bed
            type: sound
            src: bgm-1
            loop: true
            volume: 80
  - id: channel-unmuted
    audio:
      - id: music
        type: audio-channel
        volume: 90
        children:
          - id: bgm-bed
            type: sound
            src: bgm-1
            loop: true
            volume: 80
  - id: channel-child-muted
    audio:
      - id: music
        type: audio-channel
        volume: 90
        children:
          - id: bgm-bed
            type: sound
            src: bgm-1
            loop: true
            volume: 80
            muted: true
  - id: channel-left-pan
    audio:
      - id: music
        type: audio-channel
        volume: 70
        pan: -1
        children:
          - id: bgm-bed
            type: sound
            src: bgm-1
            loop: true
            volume: 80
  - id: channel-child-right-pan
    audio:
      - id: music
        type: audio-channel
        volume: 70
        pan: 0
        children:
          - id: bgm-bed
            type: sound
            src: bgm-1
            loop: true
            volume: 80
            pan: 1
  - id: channel-move-continuing-sound
    audio:
      - id: music
        type: audio-channel
        volume: 70
        children: []
      - id: effects
        type: audio-channel
        volume: 70
        children:
          - id: bgm-bed
            type: sound
            src: bgm-1
            loop: true
            volume: 80
            pan: 0
