---
title: Audio Manual - Legacy AudioTransition Compatibility
description: Isolated backward-compatibility fixture for the legacy audioTransition effect type spelling.
skipScreenshot: true
specs:
  - state 1 is silent so pressing n or clicking Next starts audio from a user gesture
  - state 2 should fade bgm-1 in over two seconds using the legacy effect type name
  - state 3 should fade it out over two seconds and then stop it
---
states:
  - id: legacy-audio-transition-ready
    audio: []
  - id: legacy-audio-transition-enter
    audio:
      - id: legacy-transition-bgm
        type: sound
        src: bgm-1
        loop: true
        volume: 80
    audioEffects:
      - id: legacy-transition
        type: audioTransition
        targetId: legacy-transition-bgm
        properties:
          volume:
            enter: { from: 0, duration: 2000, easing: linear }
            exit: { to: 0, duration: 2000, easing: linear }
  - id: legacy-audio-transition-exit
    audio: []
