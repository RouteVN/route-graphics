---
title: Global Keyboard Events
description: Test global keyboard event handling
specs:
  - global keyboard handlers should emit payloads for configured keys
  - state changes should swap the active keyboard mapping
  - modified key combinations should remain distinct from plain key presses
steps:
  - action: customEvent
    name: clearEvents
  - action: keypress
    key: a
  - action: screenshot
  - action: keypress
    key: b
  - action: screenshot
  - action: keypress
    key: "n"
  - action: keypress
    key: Shift+c
  - action: screenshot
  - action: keypress
    key: c
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - keydown
    value:
      - _event:
          key: a
        action: keyA_Pressed
      - _event:
          key: b
        action: keyB_Pressed
      - _event:
          key: shift+c
        action: shift_c_Pressed
      - _event:
          key: c
        action: keyC_Pressed
---
states:
  - elements:
      - id: rect-keyboard-test
        type: rect
        x: 150
        "y": 100
        width: 500
        height: 400
        fill: "#A6A6A6"
        alpha: 1
    global:
      keyboard:
        a:
          payload:
            action: keyA_Pressed
        b:
          payload:
            action: keyB_Pressed
  - elements:
      - id: rect-keyboard-test
        type: rect
        x: 150
        "y": 100
        width: 500
        height: 400
        fill: "#A6A6A6"
        alpha: 1
    global:
      keyboard:
        c:
          payload:
            action: keyC_Pressed
        shift+c:
          payload:
            action: shift_c_Pressed
