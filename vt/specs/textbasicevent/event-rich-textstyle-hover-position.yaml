---
title: Rich Text Position on Hover
description: Verifies that a fully resolved hover text style keeps parsed rich-text line metrics and visual placement stable.
specs:
  - ratio-based hover line height should remain normalized to pixels
  - changing font weight and fill should not shift rich text vertically
  - pointer out should restore the base style without moving the text
steps:
  - action: move
    x: 20
    "y": 20
  - action: wait
    ms: 50
  - action: screenshot
  - action: move
    x: 360
    "y": 160
  - action: wait
    ms: 50
  - action: screenshot
  - action: move
    x: 20
    "y": 20
  - action: wait
    ms: 50
  - action: screenshot
---
states:
  - elements:
      - id: top-guide
        type: rect
        x: 180
        "y": 129
        width: 360
        height: 2
        fill: "#737373"
      - id: anchor-guide
        type: rect
        x: 359
        "y": 104
        width: 2
        height: 112
        fill: "#4D4D4D"
      - id: rich-hover-text
        type: text
        x: 360
        "y": 160
        anchorX: 0.5
        anchorY: 0.5
        content:
          - text: Rich hover text
        textStyle:
          fontFamily: Arial
          fontSize: 40
          fontWeight: "700"
          lineHeight: 1.5
          fill: "#A6A6A6"
        hover:
          cursor: pointer
          textStyle:
            fontFamily: Arial
            fontSize: 40
            fontWeight: "400"
            lineHeight: 1.5
            fill: "#FFFFFF"
