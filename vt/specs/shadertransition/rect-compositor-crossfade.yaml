---
title: Rect Shader Compositor Crossfade
description: transition compositor should receive previous and next surfaces plus uProgress
specs:
  - compositor should satisfy the transition handoff without prev, next, or mask
  - at 500ms the previous and next rect colors should be mixed by uProgress
  - at 1000ms the transition should complete on the next rect
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
---
states:
  - elements:
      - id: compositor-rect
        type: rect
        x: 170
        "y": 120
        width: 760
        height: 420
        fill: "#C64C3B"
  - elements:
      - id: compositor-rect
        type: rect
        x: 170
        "y": 120
        width: 760
        height: 420
        fill: "#2F7ED8"
    animations:
      - id: shader-crossfade
        targetId: compositor-rect
        type: transition
        tween:
          uProgress:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
        compositor:
          type: shader
          mesh:
            grid: [4, 2]
          uniforms:
            vignette: 0.18
          source:
            webgl:
              fragment: |
                precision mediump float;

                in vec2 vTextureCoord;
                out vec4 finalColor;

                uniform sampler2D uTexture;
                uniform sampler2D uNextTexture;
                uniform float uProgress;
                uniform float uVignette;

                void main(void)
                {
                    vec4 prevColor = texture(uTexture, vTextureCoord);
                    vec4 nextColor = texture(uNextTexture, vTextureCoord);
                    float dist = distance(vTextureCoord, vec2(0.5));
                    float edge = smoothstep(0.15, 0.72, dist) * uVignette;
                    vec4 mixedColor = mix(prevColor, nextColor, clamp(uProgress, 0.0, 1.0));
                    finalColor = vec4(mixedColor.rgb * (1.0 - edge), mixedColor.a);
                }
            webgpu:
              source: |
                struct GlobalFilterUniforms {
                  uInputSize: vec4<f32>,
                  uInputPixel: vec4<f32>,
                  uInputClamp: vec4<f32>,
                  uOutputFrame: vec4<f32>,
                  uGlobalFrame: vec4<f32>,
                  uOutputTexture: vec4<f32>,
                };

                struct ShaderUniforms {
                  uProgress: f32,
                  uResolution: vec2<f32>,
                  uVignette: f32,
                };

                @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                @group(0) @binding(1) var uTexture: texture_2d<f32>;
                @group(0) @binding(2) var uSampler: sampler;
                @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;
                @group(1) @binding(1) var uNextTexture: texture_2d<f32>;

                struct VSOutput {
                  @builtin(position) position: vec4<f32>,
                  @location(0) uv: vec2<f32>,
                };

                fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                {
                  var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                  position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                  position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                  return vec4<f32>(position, 0.0, 1.0);
                }

                fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                {
                  return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                }

                @vertex
                fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                {
                  return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                }

                @fragment
                fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                {
                  let prevColor = textureSample(uTexture, uSampler, uv);
                  let nextColor = textureSample(uNextTexture, uSampler, uv);
                  let dist = distance(uv, vec2<f32>(0.5, 0.5));
                  let edge = smoothstep(0.15, 0.72, dist) * shaderUniforms.uVignette;
                  let mixedColor = mix(prevColor, nextColor, clamp(shaderUniforms.uProgress, 0.0, 1.0));
                  return vec4<f32>(mixedColor.rgb * (1.0 - edge), mixedColor.a);
                }
