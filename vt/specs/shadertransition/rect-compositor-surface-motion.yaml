---
title: Rect Shader Compositor Surface Motion
description: Transition compositors should receive prev and next surfaces after their own tweens have been applied.
specs:
  - prev.tween should move and fade the outgoing surface before compositor sampling
  - next.tween should move and scale the incoming surface before compositor sampling
  - top-level tween.uProgress should drive only the compositor reveal
  - the near-end frame should already match the final target closely enough to avoid a handoff jump
  - the post-completion frame should match the final compositor frame
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 400
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 360
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 40
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 16
  - action: screenshot
---
states:
  - elements:
      - id: motion-compositor-rect
        type: rect
        x: 230
        "y": 150
        width: 650
        height: 360
        fill: "#D75A35"
  - elements:
      - id: motion-compositor-rect
        type: rect
        x: 230
        "y": 150
        width: 650
        height: 360
        fill: "#287CD8"
    animations:
      - id: compositor-motion
        targetId: motion-compositor-rect
        type: transition
        prev:
          tween:
            translateX:
              initialValue: 0
              keyframes:
                - duration: 760
                  value: -0.35
                  easing: linear
            alpha:
              initialValue: 1
              keyframes:
                - duration: 760
                  value: 0.35
                  easing: linear
        next:
          tween:
            translateY:
              initialValue: 0.45
              keyframes:
                - duration: 760
                  value: 0
                  easing: easeOutCubic
            scaleX:
              initialValue: 0.7
              keyframes:
                - duration: 760
                  value: 1
                  easing: easeOutCubic
        tween:
          uProgress:
            initialValue: 0
            keyframes:
              - duration: 760
                value: 1
                easing: linear
              - duration: 40
                value: 1
                easing: linear
        compositor:
          type: shader
          uniforms:
            feather: 0.08
          source:
            webgl:
              fragment: |
                precision mediump float;

                in vec2 vTextureCoord;
                out vec4 finalColor;

                uniform sampler2D uTexture;
                uniform sampler2D uNextTexture;
                uniform mat3 uNextTextureMatrix;
                uniform float uProgress;
                uniform float uFeather;
                uniform vec4 uNextTextureClamp;

                void main(void)
                {
                    vec2 nextUv = clamp((uNextTextureMatrix * vec3(vTextureCoord, 1.0)).xy, uNextTextureClamp.xy, uNextTextureClamp.zw);
                    vec4 prevColor = texture(uTexture, vTextureCoord);
                    vec4 nextColor = texture(uNextTexture, nextUv);
                    float progress = clamp(uProgress / 0.96, 0.0, 1.0);
                    if (progress >= 1.0) {
                        finalColor = vec4(nextColor.rgb * nextColor.a, nextColor.a);
                        return;
                    }
                    float edge = mix(-uFeather, 1.0 + uFeather, progress);
                    float reveal = 1.0 - smoothstep(edge - uFeather, edge + uFeather, vTextureCoord.x);
                    vec4 color = mix(prevColor, nextColor, reveal);
                    finalColor = vec4(color.rgb * color.a, color.a);
                }
            webgpu:
              source: |
                struct GlobalFilterUniforms {
                  uInputSize: vec4<f32>,
                  uInputPixel: vec4<f32>,
                  uInputClamp: vec4<f32>,
                  uOutputFrame: vec4<f32>,
                  uGlobalFrame: vec4<f32>,
                  uOutputTexture: vec4<f32>,
                };

                struct ShaderUniforms {
                  uProgress: f32,
                  uResolution: vec2<f32>,
                  uNextTextureMatrix: mat3x3<f32>,
                  uNextTextureClamp: vec4<f32>,
                  uFeather: f32,
                };

                @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                @group(0) @binding(1) var uTexture: texture_2d<f32>;
                @group(0) @binding(2) var uSampler: sampler;
                @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;
                @group(1) @binding(1) var uNextTexture: texture_2d<f32>;

                struct VSOutput {
                  @builtin(position) position: vec4<f32>,
                  @location(0) uv: vec2<f32>,
                };

                fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                {
                  var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                  position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                  position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                  return vec4<f32>(position, 0.0, 1.0);
                }

                fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                {
                  return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                }

                @vertex
                fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                {
                  return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                }

                @fragment
                fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                {
                  let nextUv = clamp(
                    (shaderUniforms.uNextTextureMatrix * vec3<f32>(uv, 1.0)).xy,
                    shaderUniforms.uNextTextureClamp.xy,
                    shaderUniforms.uNextTextureClamp.zw,
                  );
                  let prevColor = textureSample(uTexture, uSampler, uv);
                  let nextColor = textureSample(uNextTexture, uSampler, nextUv);
                  let progress = clamp(shaderUniforms.uProgress / 0.96, 0.0, 1.0);
                  if (progress >= 1.0) {
                    return vec4<f32>(nextColor.rgb * nextColor.a, nextColor.a);
                  }
                  let edge = mix(-shaderUniforms.uFeather, 1.0 + shaderUniforms.uFeather, progress);
                  let reveal = 1.0 - smoothstep(edge - shaderUniforms.uFeather, edge + shaderUniforms.uFeather, uv.x);
                  let color = mix(prevColor, nextColor, reveal);
                  return vec4<f32>(color.rgb * color.a, color.a);
                }
