                void main(void)
                {
                    vec4 prevColor = texture(uTexture, vTextureCoord);
                    vec4 nextColor = texture(uNextTexture, vTextureCoord);
                    vec4 mixedColor = mix(prevColor, nextColor, clamp(uProgress, 0.0, 1.0));
                    finalColor = vec4(mixedColor.rgb + (mixedColor.rgb - 0.5) * uContrast, mixedColor.a);
                }
            webgpu:
              source: |
                struct GlobalFilterUniforms {
                  uInputSize: vec4<f32>,
                  uInputPixel: vec4<f32>,
                  uInputClamp: vec4<f32>,
                  uOutputFrame: vec4<f32>,
