---
title: Container Update Scale Transition
description: A container scaling during update
specs:
  - container should scale from 1 to 1.5 on both axes
  - children should scale with container
  - animation should take 1 second
  - returning to the previous state should restore the unscaled container
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: keypress
    key: "b"
  - action: screenshot
---
states:
  - elements:
      - id: container1
        type: container
        x: 300
        "y": 200
        direction: vertical
        gap: 5
        scaleX: 1
        scaleY: 1
        children:
          - id: rect1
            type: rect
            width: 100
            height: 50
            fill: "#FFFFFF"
  - elements:
      - id: container1
        type: container
        x: 300
        "y": 200
        direction: vertical
        gap: 5
        scaleX: 1.5
        scaleY: 1.5
        children:
          - id: rect1
            type: rect
            width: 100
            height: 50
            fill: "#FFFFFF"
    animations:
      - id: container-scale
        targetId: container1
        type: update
        tween:
          scaleX:
            keyframes:
              - duration: 1000
                value: 1.5
                easing: linear
          scaleY:
            keyframes:
              - duration: 1000
                value: 1.5
                easing: linear
