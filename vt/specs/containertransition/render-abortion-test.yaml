---
title: Container Render Abortion Test
description: Test abortion callback during container render with 3 keyframes
specs:
  - container should render with 3 keyframe animation
  - abortion callback should be testable during render
  - element props differ from animation final state
steps:
  - action: keypress
    key: 'n'
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 1000
  - action: screenshot
  - action: keypress
    key: 'n'
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 1000
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 1000
  - action: screenshot
---
states:
  - elements: []
  - elements:
      - id: container-render-test
        type: container
        x: 100
        'y': 100
        width: 300
        height: 200
        direction: vertical
        alpha: 1
        children:
          - id: child-rect-1
            type: rect
            width: 250
            height: 60
            fill: '#FFFFFF'
    animations:
      - id: container-render-abortion
        targetId: container-render-test
        type: transition
        next:
          tween:
            alpha:
              initialValue: 0
              keyframes:
                - duration: 1000
                  value: 0.5
                  easing: linear
                - duration: 1000
                  value: 1
                  easing: linear
            translateX:
              initialValue: -0.0390625
              keyframes:
                - duration: 1000
                  value: 0.0390625
                  easing: linear
                - duration: 1000
                  value: 0.1171875
                  easing: linear
            translateY:
              initialValue: -0.06944444444444445
              keyframes:
                - duration: 1000
                  value: 0.06944444444444445
                  easing: linear
                - duration: 1000
                  value: 0.20833333333333334
                  easing: linear
  - elements:
      - id: container-render-test
        type: container
        x: 400
        'y': 300
        width: 400
        height: 300
        direction: horizontal
        alpha: 1
        children:
          - id: child-rect-1
            type: rect
            width: 100
            height: 200
            fill: '#FFFFFF'
          - id: child-rect-2
            type: rect
            width: 100
            height: 200
            fill: '#FFFFFF'
    animations:
      - id: container-render-abortion-2
        targetId: container-render-test
        type: update
        tween:
          x:
            initialValue: 250
            keyframes:
              - duration: 1000
                value: 350
                easing: linear
              - duration: 1000
                value: 400
                easing: linear
          alpha:
            initialValue: 0.3
            keyframes:
              - duration: 1000
                value: 0.7
                easing: linear
              - duration: 1000
                value: 1
                easing: linear
