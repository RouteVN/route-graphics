---
title: Animated Sprite Blur
description: Uses the existing fighter spritesheet asset intentionally to verify blur on animated sprite textures.
specs:
  - animated sprite blur should apply to the selected frame texture
  - sharp and blurred animated sprites should render independently
steps:
  - action: customEvent
    name: "snapShotAnimatedSpriteFrame"
    detail:
      frameIndex: 0
      elementId: "animated-crisp"
  - action: customEvent
    name: "snapShotAnimatedSpriteFrame"
    detail:
      frameIndex: 0
      elementId: "animated-blurred"
  - action: screenshot
---
