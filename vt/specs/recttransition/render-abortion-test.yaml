---
title: Rect Render Abortion Test
description: Test abortion callback during rect render with 3 keyframes
specs:
  - rect should render with 3 keyframe animation
  - abortion callback should be testable during render
  - element props differ from animation final state
steps:
  - action: keypress
    key: 'n'
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 1200
  - action: screenshot
  - action: keypress
    key: 'n'
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 800
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 1500
---
states:
  - elements: []
  - elements:
      - id: rect-render-test
        type: rect
        x: 100
        'y': 100
        width: 200
        height: 200
        fill: '#FFFFFF'
        alpha: 1
    animations:
      - id: rect-render-abortion
        targetId: rect-render-test
        type: transition
        next:
          tween:
            alpha:
              initialValue: 0
              keyframes:
                - duration: 1000
                  value: 0.5
                  easing: linear
                - duration: 1000
                  value: 1
                  easing: linear
            translateX:
              initialValue: -0.0390625
              keyframes:
                - duration: 1000
                  value: 0.0390625
                  easing: linear
                - duration: 1000
                  value: 0.1171875
                  easing: linear
            translateY:
              initialValue: -0.06944444444444445
              keyframes:
                - duration: 1000
                  value: 0.06944444444444445
                  easing: linear
                - duration: 1000
                  value: 0.20833333333333334
                  easing: linear
  - elements:
      - id: rect-render-test
        type: rect
        x: 400
        'y': 300
        width: 300
        height: 250
        fill: '#FFFFFF'
        alpha: 1
    animations:
      - id: rect-render-abortion-2
        targetId: rect-render-test
        type: update
        tween:
          x:
            initialValue: 250
            keyframes:
              - duration: 1000
                value: 350
                easing: linear
              - duration: 1000
                value: 400
                easing: linear
          alpha:
            initialValue: 0.3
            keyframes:
              - duration: 1000
                value: 0.7
                easing: linear
              - duration: 1000
                value: 1
                easing: linear
