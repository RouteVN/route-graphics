---
title: Rect Update Scale Transition
description: A rect scaling up during update
specs:
  - rect should scale from 1 to 1.5 on both axes
  - animation should take 800ms
  - uses scaleX and scaleY properties
  - returning to the first state should reset scale so the transition runs again
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 400
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 400
  - action: screenshot
  - action: keypress
    key: "b"
  - action: screenshot
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 400
  - action: screenshot
---
states:
  - id: initial
    elements:
      - id: rect1
        type: rect
        x: 300
        "y": 200
        width: 200
        height: 200
        fill: "#737373"
        scaleX: 1
        scaleY: 1
  - id: rect-scale-up-state
    elements:
      - id: rect1
        type: rect
        x: 300
        "y": 200
        width: 200
        height: 200
        fill: "#737373"
        scaleX: 1.5
        scaleY: 1.5
    animations:
      - id: rect-scale
        targetId: rect1
        type: live
        tween:
          scaleX:
            keyframes:
              - duration: 800
                value: 1.5
                easing: linear
          scaleY:
            keyframes:
              - duration: 800
                value: 1.5
                easing: linear
