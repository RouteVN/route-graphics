---
title: Rect Update Enter Exit
description: A rect using update animations when it is first added and before it is removed.
specs:
  - newly added rect should fade in through an update animation
  - removed rect should fade out through an update animation before being destroyed
  - final state should contain no rect
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
---
states:
  - id: empty
    elements: []
  - id: rect-entered
    elements:
      - id: rect1
        type: rect
        x: 320
        "y": 180
        width: 360
        height: 240
        fill: "#FFFFFF"
        alpha: 1
    animations:
      - id: rect-update-enter
        targetId: rect1
        type: update
        tween:
          alpha:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
  - id: rect-removed
    elements: []
    animations:
      - id: rect-update-exit
        targetId: rect1
        type: update
        tween:
          alpha:
            keyframes:
              - duration: 1000
                value: 0
                easing: linear
