---
title: Slider Elements
specs:
  - single-track sliders should render with and without hover configuration in horizontal and vertical layouts
  - split-track sliders should render with and without hover configuration in horizontal and vertical layouts
  - split-track hover styles should keep active and inactive regions visually distinct when hover assets are configured
---
states:
  - elements:
      - id: heading-hover
        type: text
        content: Hover Configured
        x: 50
        "y": 16
        textStyle:
          fontSize: 24
          fill: "#f1f1f1"
          fontFamily: Arial
      - id: heading-no-hover
        type: text
        content: No Hover Block
        x: 650
        "y": 16
        textStyle:
          fontSize: 24
          fill: "#f1f1f1"
          fontFamily: Arial
      - id: horizontal-hover-label
        type: text
        content: Horizontal
        x: 50
        "y": 48
        textStyle:
          fontSize: 20
          fill: "#d0d0d0"
          fontFamily: Arial
      - id: horizontal-no-hover-label
        type: text
        content: Horizontal
        x: 650
        "y": 48
        textStyle:
          fontSize: 20
          fill: "#d0d0d0"
          fontFamily: Arial
      - id: vertical-hover-label
        type: text
        content: Vertical
        x: 50
        "y": 298
        textStyle:
          fontSize: 20
          fill: "#d0d0d0"
          fontFamily: Arial
      - id: vertical-no-hover-label
        type: text
        content: Vertical
        x: 650
        "y": 298
        textStyle:
          fontSize: 20
          fill: "#d0d0d0"
          fontFamily: Arial
      - id: slider-horizontal-single-track-hover-label
        type: text
        content: Single Track
        x: 50
        "y": 88
        textStyle:
          fontSize: 18
          fill: "#9aa1ad"
          fontFamily: Arial
      - id: slider-horizontal-split-hover-label
        type: text
        content: Split
        x: 50
        "y": 168
        textStyle:
          fontSize: 18
          fill: "#9aa1ad"
          fontFamily: Arial
      - id: slider-horizontal-single-track-hover
        type: slider
        direction: horizontal
        thumbSrc: horizontal-idle-thumb
        barSrc: horizontal-idle-bar
        width: 200
        height: 20
        x: 200
        "y": 86
        alpha: 1
        anchorX: 0
        anchorY: 0
        zIndex: 1
        min: 0
        max: 100
        step: 1
        initialValue: 30
        hover:
          thumbSrc: horizontal-hover-thumb
          barSrc: horizontal-hover-bar
          cursor: pointer
          payload:
            event: slider-hover
            sliderId: slider-horizontal-single-track-hover
            direction: horizontal
            variant: single-track
        change:
          payload:
            action: slider-change
            sliderId: slider-horizontal-single-track-hover
            direction: horizontal
            component: volume-control
            variant: single-track
      - id: slider-horizontal-split-hover
        type: slider
        direction: horizontal
        thumbSrc: horizontal-idle-thumb
        barSrc: slider-split-active-bar
        inactiveBarSrc: slider-split-inactive-bar
        width: 200
        height: 20
        x: 200
        "y": 166
        alpha: 1
        anchorX: 0
        anchorY: 0
        zIndex: 1
        min: 0
        max: 100
        step: 1
        initialValue: 65
        hover:
          thumbSrc: horizontal-hover-thumb
          barSrc: slider-split-active-hover-bar
          inactiveBarSrc: slider-split-inactive-hover-bar
          cursor: pointer
          payload:
            event: slider-hover
            sliderId: slider-horizontal-split-hover
            direction: horizontal
            variant: split
        change:
          payload:
            action: slider-change
            sliderId: slider-horizontal-split-hover
            direction: horizontal
            component: balance-control
            variant: split
      - id: slider-vertical-single-track-hover-label
