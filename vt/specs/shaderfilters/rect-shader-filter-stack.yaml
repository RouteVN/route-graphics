---
title: Rect Shader Filter Stack
description: Multiple element shader filters should run after built-in blur and in array order
specs:
  - the rect should be rendered through two stacked shader filters
  - the first filter should mix in a custom texture using its logical texture name
  - the second filter should darken scanlines, proving filter order is stable
---
states:
  - elements:
      - id: shader-rect
        type: rect
        x: 180
        "y": 120
        width: 720
        height: 420
        fill: "#D86B3A"
        blur:
          x: 2
          "y": 2
        filters:
          - id: texture-mix
            type: shader
            uniforms:
              amount: 0.45
              tint: [0.2, 0.78, 1, 1]
            textures:
              noise: mask-diagonal
            source:
              webgl:
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform sampler2D uNoiseTexture;
                  uniform float uAmount;
                  uniform vec4 uTint;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      float maskValue = texture(uNoiseTexture, vTextureCoord).r;
                      vec3 tinted = mix(color.rgb, uTint.rgb, maskValue * uAmount);
                      finalColor = vec4(tinted, color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                    uAmount: f32,
                    uTint: vec4<f32>,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;
                  @group(1) @binding(1) var uNoiseTexture: texture_2d<f32>;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                  {
                    return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    let maskValue = textureSample(uNoiseTexture, uSampler, uv).r;
                    let tinted = mix(color.rgb, shaderUniforms.uTint.rgb, maskValue * shaderUniforms.uAmount);
                    return vec4<f32>(tinted, color.a);
                  }
          - id: scanlines
            type: shader
            uniforms:
              strength: 0.24
            source:
              webgl:
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform vec2 uResolution;
                  uniform float uStrength;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      float stripe = step(0.5, fract(vTextureCoord.y * uResolution.y * 0.5));
                      float shade = mix(1.0, 1.0 - uStrength, stripe);
                      finalColor = vec4(color.rgb * shade, color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                    uStrength: f32,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                  {
                    return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    let stripe = step(0.5, fract(uv.y * shaderUniforms.uResolution.y * 0.5));
                    let shade = mix(1.0, 1.0 - shaderUniforms.uStrength, stripe);
                    return vec4<f32>(color.rgb * shade, color.a);
                  }
