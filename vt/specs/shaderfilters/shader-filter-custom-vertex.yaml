---
title: Shader Filter Custom Vertex
description: Element shader filters should support inline custom vertex source for WebGL and equivalent WGSL vertex logic.
specs:
  - the filter should render normally at uProgress 0
  - uProgress should drive a custom vertex shear that is visible with the v1 single-quad filter mesh
  - uResolution should remain available while a custom vertex shader is used
  - returning to the first state should reset uProgress and render the unwarped filter output
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: keypress
    key: b
  - action: screenshot
---
states:
  - elements:
      - id: custom-vertex-filter
        type: rect
        x: 200
        "y": 150
        width: 720
        height: 340
        fill: "#B64C70"
        filters:
          - id: vertex-wave
            type: shader
            uniforms:
              stripeColor: [0.1, 0.95, 1, 1]
            source:
              webgl:
                vertex: |
                  precision mediump float;

                  in vec2 aPosition;

                  out vec2 vTextureCoord;

                  uniform vec4 uInputSize;
                  uniform vec4 uOutputFrame;
                  uniform vec4 uOutputTexture;
                  uniform float uProgress;

                  vec4 filterVertexPosition(vec2 localPosition)
                  {
                      vec2 position = localPosition * uOutputFrame.zw + uOutputFrame.xy;
                      position.x = position.x * (2.0 / uOutputTexture.x) - 1.0;
                      position.y = position.y * (2.0 * uOutputTexture.z / uOutputTexture.y) - uOutputTexture.z;
                      return vec4(position, 0.0, 1.0);
                  }

                  void main(void)
                  {
                      vec2 warped = aPosition;
                      warped.x += (aPosition.y - 0.5) * 0.12 * uProgress;
                      warped.y += (aPosition.x - 0.5) * 0.32 * uProgress;
                      gl_Position = filterVertexPosition(warped);
                      vTextureCoord = aPosition * (uOutputFrame.zw * uInputSize.zw);
                  }
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform float uProgress;
                  uniform vec2 uResolution;
                  uniform vec4 uStripeColor;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      float stripe = step(0.55, fract((vTextureCoord.x + vTextureCoord.y) * uResolution.x / 36.0));
                      finalColor = vec4(mix(color.rgb, uStripeColor.rgb, stripe * (0.25 + 0.4 * uProgress)), color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                    uStripeColor: vec4<f32>,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(localPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = localPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    var warped = aPosition;
                    warped.x = warped.x + (aPosition.y - 0.5) * 0.12 * shaderUniforms.uProgress;
                    warped.y = warped.y + (aPosition.x - 0.5) * 0.32 * shaderUniforms.uProgress;
                    return VSOutput(filterVertexPosition(warped), aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    let stripe = step(0.55, fract((uv.x + uv.y) * shaderUniforms.uResolution.x / 36.0));
                    return vec4<f32>(mix(color.rgb, shaderUniforms.uStripeColor.rgb, stripe * (0.25 + 0.4 * shaderUniforms.uProgress)), color.a);
                  }
