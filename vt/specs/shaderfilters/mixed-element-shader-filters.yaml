---
title: Mixed Element Shader Filters
description: Shader filters should apply to different element plugin outputs, including container surfaces, sprites, and text.
specs:
  - a filtered container should tint its child rects, sprite, and text as one surface
  - a filtered sprite should use the sprite plugin filter path
  - a filtered text element should include text shadow before the shader pass
  - uResolution and vec4 uniforms should be available to element filters
---
states:
  - elements:
      - id: filtered-container
        type: container
        x: 70
        "y": 70
        width: 520
        height: 500
        filters:
          - id: container-grade
            type: shader
            uniforms:
              tintColor: [0.1, 0.85, 0.78, 1]
              tintStrength: 0.48
            source:
              webgl:
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform vec2 uResolution;
                  uniform vec4 uTintColor;
                  uniform float uTintStrength;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      float stripe = step(0.5, fract(vTextureCoord.y * uResolution.y / 22.0));
                      float vignette = 1.0 - smoothstep(0.35, 0.75, distance(vTextureCoord, vec2(0.5)));
                      vec3 tinted = mix(color.rgb, uTintColor.rgb, uTintStrength * vignette);
                      finalColor = vec4(tinted * mix(0.78, 1.0, stripe), color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                    uTintColor: vec4<f32>,
                    uTintStrength: f32,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                  {
                    return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    let stripe = step(0.5, fract(uv.y * shaderUniforms.uResolution.y / 22.0));
                    let vignette = 1.0 - smoothstep(0.35, 0.75, distance(uv, vec2<f32>(0.5, 0.5)));
                    let tinted = mix(color.rgb, shaderUniforms.uTintColor.rgb, shaderUniforms.uTintStrength * vignette);
                    return vec4<f32>(tinted * mix(0.78, 1.0, stripe), color.a);
                  }
        children:
          - id: nested-bg
            type: rect
            x: 0
            "y": 0
            width: 520
            height: 500
            fill: "#343434"
          - id: nested-panel
            type: rect
            x: 60
            "y": 70
            width: 310
            height: 180
            fill: "#C9543B"
          - id: nested-sprite
            type: sprite
            src: circle-blue
            x: 310
            "y": 250
            width: 140
            height: 140
          - id: nested-label
            type: text
            x: 70
            "y": 300
            content: Container Surface
            textStyle:
              fontFamily: Arial
              fontSize: 44
              fill: "#FFFFFF"
      - id: filtered-sprite
        type: sprite
        src: fighter-spritesheet
        x: 690
        "y": 90
        width: 260
        height: 260
        filters:
          - id: sprite-grade
            type: shader
            uniforms:
              tintColor: [1, 0.62, 0.18, 1]
              tintStrength: 0.55
            source:
              webgl:
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform vec4 uTintColor;
                  uniform float uTintStrength;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      float edge = smoothstep(0.05, 0.45, distance(vTextureCoord, vec2(0.5)));
                      finalColor = vec4(mix(color.rgb, uTintColor.rgb, edge * uTintStrength), color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                    uTintColor: vec4<f32>,
                    uTintStrength: f32,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                  {
                    return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    let edge = smoothstep(0.05, 0.45, distance(uv, vec2<f32>(0.5, 0.5)));
                    return vec4<f32>(mix(color.rgb, shaderUniforms.uTintColor.rgb, edge * shaderUniforms.uTintStrength), color.a);
                  }
      - id: filtered-text
        type: text
        x: 650
        "y": 405
        content: Shadow + Shader
        textStyle:
          fontFamily: Arial
          fontSize: 58
          fill: "#FFFFFF"
          shadow:
            color: "#101010"
            alpha: 0.8
            blur: 8
            offsetX: 8
            offsetY: 8
        filters:
          - id: text-grade
            type: shader
            uniforms:
              tintColor: [0.4, 0.9, 1, 1]
              tintStrength: 0.42
            source:
              webgl:
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform vec2 uResolution;
                  uniform vec4 uTintColor;
                  uniform float uTintStrength;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      float scan = step(0.45, fract(vTextureCoord.y * uResolution.y / 12.0));
                      vec3 tinted = mix(color.rgb, uTintColor.rgb, uTintStrength * color.a);
                      finalColor = vec4(tinted * mix(0.7, 1.0, scan), color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                    uTintColor: vec4<f32>,
                    uTintStrength: f32,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                  {
                    return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    let scan = step(0.45, fract(uv.y * shaderUniforms.uResolution.y / 12.0));
                    let tinted = mix(color.rgb, shaderUniforms.uTintColor.rgb, shaderUniforms.uTintStrength * color.a);
                    return vec4<f32>(tinted * mix(0.7, 1.0, scan), color.a);
                  }
