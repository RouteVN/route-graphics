---
title: Shader Filter Shared Progress Stack
description: A uProgress update tween should drive every shader filter in a target filter stack.
specs:
  - both shader filters should start with uProgress at zero
  - the first filter should use uProgress for brightness
  - the second filter should use the same uProgress for moving bands
  - non-monotonic keyframes should update both filters together
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
---
states:
  - elements:
      - id: shared-progress
        type: rect
        x: 180
        "y": 140
        width: 760
        height: 380
        fill: "#465269"
        filters:
          - id: progress-brightness
            type: shader
            source:
              webgl:
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform float uProgress;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      finalColor = vec4(color.rgb * mix(0.65, 1.45, uProgress), color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                  {
                    return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    return vec4<f32>(color.rgb * mix(0.65, 1.45, shaderUniforms.uProgress), color.a);
                  }
          - id: progress-bands
            type: shader
            uniforms:
              bandColor: [0.1, 0.95, 0.7, 1]
            source:
              webgl:
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform float uProgress;
                  uniform vec4 uBandColor;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      float band = smoothstep(0.0, 0.08, abs(fract(vTextureCoord.x * 5.0 + uProgress) - 0.5));
                      finalColor = vec4(mix(uBandColor.rgb, color.rgb, band), color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                    uBandColor: vec4<f32>,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                  {
                    return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    let band = smoothstep(0.0, 0.08, abs(fract(uv.x * 5.0 + shaderUniforms.uProgress) - 0.5));
                    return vec4<f32>(mix(shaderUniforms.uBandColor.rgb, color.rgb, band), color.a);
                  }
