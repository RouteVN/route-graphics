    animations:
      - id: shared-progress-tween
        targetId: shared-progress
        type: update
        tween:
          uProgress:
            initialValue: 0
            keyframes:
              - duration: 500
                value: 1
                easing: easeInOutCubic
              - duration: 500
                value: 0.2
                easing: linear
