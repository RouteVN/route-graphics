---
title: Rect Shader Filter Progress Animation
description: update tween uProgress should drive every shader filter on the target element
specs:
  - the shader filter should start from the unmodified rect color
  - at 500ms uProgress should partially shift the rect color
  - at 1000ms uProgress should reach the final shader color
  - returning to the first state should reset uProgress and render the original grey rect
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: keypress
    key: b
  - action: screenshot
---
states:
  - elements:
      - id: shader-progress-rect
        type: rect
        x: 180
        "y": 140
        width: 720
        height: 380
        fill: "#545454"
        filters:
          - id: progress-tint
            type: shader
            source:
              webgl:
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform float uProgress;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      vec3 target = vec3(0.15, 0.85, 0.46);
                      finalColor = vec4(mix(color.rgb, target, clamp(uProgress, 0.0, 1.0)), color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                  {
                    return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    let target = vec3<f32>(0.15, 0.85, 0.46);
                    return vec4<f32>(mix(color.rgb, target, clamp(shaderUniforms.uProgress, 0.0, 1.0)), color.a);
                  }
  - elements:
      - id: shader-progress-rect
        type: rect
        x: 180
        "y": 140
        width: 720
        height: 380
        fill: "#545454"
        filters:
          - id: progress-tint
            type: shader
            source:
              webgl:
                fragment: |
                  precision mediump float;

                  in vec2 vTextureCoord;
                  out vec4 finalColor;

                  uniform sampler2D uTexture;
                  uniform float uProgress;

                  void main(void)
                  {
                      vec4 color = texture(uTexture, vTextureCoord);
                      vec3 target = vec3(0.15, 0.85, 0.46);
                      finalColor = vec4(mix(color.rgb, target, clamp(uProgress, 0.0, 1.0)), color.a);
                  }
              webgpu:
                source: |
                  struct GlobalFilterUniforms {
                    uInputSize: vec4<f32>,
                    uInputPixel: vec4<f32>,
                    uInputClamp: vec4<f32>,
                    uOutputFrame: vec4<f32>,
                    uGlobalFrame: vec4<f32>,
                    uOutputTexture: vec4<f32>,
                  };

                  struct ShaderUniforms {
                    uProgress: f32,
                    uResolution: vec2<f32>,
                  };

                  @group(0) @binding(0) var<uniform> gfu: GlobalFilterUniforms;
                  @group(0) @binding(1) var uTexture: texture_2d<f32>;
                  @group(0) @binding(2) var uSampler: sampler;
                  @group(1) @binding(0) var<uniform> shaderUniforms: ShaderUniforms;

                  struct VSOutput {
                    @builtin(position) position: vec4<f32>,
                    @location(0) uv: vec2<f32>,
                  };

                  fn filterVertexPosition(aPosition: vec2<f32>) -> vec4<f32>
                  {
                    var position = aPosition * gfu.uOutputFrame.zw + gfu.uOutputFrame.xy;
                    position.x = position.x * (2.0 / gfu.uOutputTexture.x) - 1.0;
                    position.y = position.y * (2.0 * gfu.uOutputTexture.z / gfu.uOutputTexture.y) - gfu.uOutputTexture.z;
                    return vec4<f32>(position, 0.0, 1.0);
                  }

                  fn filterTextureCoord(aPosition: vec2<f32>) -> vec2<f32>
                  {
                    return aPosition * (gfu.uOutputFrame.zw * gfu.uInputSize.zw);
                  }

                  @vertex
                  fn mainVertex(@location(0) aPosition: vec2<f32>) -> VSOutput
                  {
                    return VSOutput(filterVertexPosition(aPosition), filterTextureCoord(aPosition));
                  }

                  @fragment
                  fn mainFragment(@location(0) uv: vec2<f32>) -> @location(0) vec4<f32>
                  {
                    let color = textureSample(uTexture, uSampler, uv);
                    let target = vec3<f32>(0.15, 0.85, 0.46);
                    return vec4<f32>(mix(color.rgb, target, clamp(shaderUniforms.uProgress, 0.0, 1.0)), color.a);
                  }
    animations:
      - id: progress-tween
        targetId: shader-progress-rect
        type: update
        tween:
          uProgress:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
