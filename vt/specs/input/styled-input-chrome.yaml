---
title: Styled Input Chrome
description: Test input fill, border, and focusRing rendering
specs:
  - inputs should render custom solid and gradient fills
  - inputs should render custom borders independently from the text layer
  - focused inputs should render custom focusRing chrome
steps:
  - action: screenshot
  - action: click
    x: 120
    "y": 108
  - action: wait
    ms: 100
  - action: screenshot
---
states:
  - elements:
      - id: scene-bg
        type: rect
        x: 0
        "y": 0
        width: 1280
        height: 720
        fill: "#0B1020"
      - id: solid-input
        type: input
        x: 80
        "y": 80
        width: 360
        height: 56
        value: Custom chrome
        fill: "#111827"
        border:
          width: 2
          color: "#64748B"
          alpha: 1
        focusRing:
          width: 4
          color: "#38BDF8"
          alpha: 1
        textStyle:
          fill: "#F8FAFC"
          fontSize: 22
        padding:
          top: 12
          right: 16
          bottom: 12
          left: 16
      - id: gradient-input
        type: input
        x: 80
        "y": 160
        width: 360
        height: 56
        value: Gradient fill
        fill:
          type: linear-gradient
          start: { x: 0, y: 0 }
          end: { x: 1, y: 0 }
          stops:
            - offset: 0
              color: "#1D4ED8"
            - offset: 1
              color: "#0F766E"
        border:
          width: 3
          color: "#ECFEFF"
          alpha: 0.9
        focusRing:
          width: 0
        textStyle:
          fill: "#FFFFFF"
          fontSize: 22
        padding: 14
      - id: transparent-input
        type: input
        x: 80
        "y": 240
        width: 360
        height: 56
        value: Transparent fill
        fill: transparent
        border:
          width: 3
          color: "#F59E0B"
          alpha: 1
        focusRing:
          width: 0
        textStyle:
          fill: "#FDE68A"
          fontSize: 22
        padding:
          top: 12
          right: 16
          bottom: 12
          left: 16
      - id: multiline-input
        type: input
        x: 500
        "y": 80
        width: 420
        height: 144
        multiline: true
        value: |-
          Multiline styled input
          keeps chrome separate
        fill: "#F8FAFC"
        border:
          width: 2
          color: "#0F172A"
          alpha: 1
        focusRing:
          width: 3
          color: "#14B8A6"
          alpha: 1
        textStyle:
          fill: "#111827"
          fontSize: 24
          lineHeight: 32
        padding:
          top: 16
          right: 18
          bottom: 16
          left: 18
