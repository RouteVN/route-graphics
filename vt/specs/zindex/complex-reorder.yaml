---
title: Z-Index Complex Reorder With Multiple Changes
description: Tests z-order with simultaneous add, remove, and reorder operations during animations; uses colored sprite assets intentionally to distinguish overlapping layers (guideline exception for asset-based tests).
specs:
  - multiple z-index changes should apply correctly in single transition
  - removed elements should not affect z-order of remaining elements
  - added elements should appear at correct z-index immediately
steps:
  - action: screenshot
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 200
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 300
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
---
states:
  - elements:
      - id: circle-red
        type: sprite
        src: circle-red
        x: 100
        "y": 100
        width: 120
        height: 120
        alpha: 1
        anchorX: 0
        anchorY: 0
        rotation: 0
      - id: circle-green
        type: sprite
        src: circle-green
        x: 140
        "y": 100
        width: 120
        height: 120
        alpha: 1
        anchorX: 0
        anchorY: 0
        rotation: 0
      - id: circle-blue
        type: sprite
        src: circle-blue
        x: 180
        "y": 100
        width: 120
        height: 120
        alpha: 1
        anchorX: 0
        anchorY: 0
        rotation: 0
  - elements:
      - id: circle-blue
        type: sprite
        src: circle-blue
        x: 100
        "y": 100
        width: 120
        height: 120
        alpha: 1
        anchorX: 0
        anchorY: 0
        rotation: 0
      - id: rect-yellow
        type: rect
        x: 140
        "y": 110
        width: 100
        height: 100
        fill: "#D9D9D9"
        alpha: 1
      - id: circle-red
        type: sprite
        src: circle-red
        x: 180
        "y": 100
        width: 120
        height: 120
        alpha: 1
        anchorX: 0
        anchorY: 0
        rotation: 0
    animations:
      - id: blue-move
        targetId: circle-blue
        type: update
        tween:
          x:
            initialValue: 180
            keyframes:
              - duration: 1000
                value: 100
                easing: linear
      - id: red-move
        targetId: circle-red
        type: update
        tween:
          x:
            initialValue: 100
            keyframes:
              - duration: 1000
                value: 180
                easing: linear
      - id: rect-fade-in
        targetId: rect-yellow
        type: transition
        next:
          tween:
            alpha:
              initialValue: 0
              keyframes:
                - duration: 1000
                  value: 1
                  easing: linear
      - id: green-fade-out
        targetId: circle-green
        type: transition
        prev:
          tween:
            alpha:
              initialValue: 1
              keyframes:
                - duration: 500
                  value: 0
                  easing: linear
