---
title: Sprite Update Mixed Auto Manual Transition
description: A sprite mixing auto and manual tween properties during update.
specs:
  - sprite x should use auto shorthand
  - sprite alpha should still use explicit keyframes
  - both properties should animate together over 1 second
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
---
states:
  - elements:
      - id: sprite1
        type: sprite
        src: circle-red
        x: 140
        "y": 220
        width: 140
        height: 140
        alpha: 1
  - elements:
      - id: sprite1
        type: sprite
        src: circle-red
        x: 520
        "y": 220
        width: 140
        height: 140
        alpha: 0.35
    animations:
      - id: sprite-mixed-auto-manual
        targetId: sprite1
        type: update
        tween:
          x:
            auto:
              duration: 1000
              easing: linear
          alpha:
            keyframes:
              - duration: 1000
                value: 0.35
                easing: linear
