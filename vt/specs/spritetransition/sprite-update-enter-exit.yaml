---
title: Sprite Update Enter Exit
description: A sprite using update animations when it is first added and before it is removed; uses a colored sprite texture intentionally to validate asset-backed alpha progression.
specs:
  - newly added sprite should fade in through an update animation
  - removed sprite should fade out through an update animation before being destroyed
  - final state should contain no sprite
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 500
  - action: screenshot
---
states:
  - id: empty
    elements: []
  - id: sprite-entered
    elements:
      - id: sprite1
        type: sprite
        src: circle-blue
        x: 360
        "y": 180
        width: 220
        height: 220
        alpha: 1
    animations:
      - id: sprite-update-enter
        targetId: sprite1
        type: update
        tween:
          alpha:
            initialValue: 0
            keyframes:
              - duration: 1000
                value: 1
                easing: linear
  - id: sprite-removed
    elements: []
    animations:
      - id: sprite-update-exit
        targetId: sprite1
        type: update
        tween:
          alpha:
            keyframes:
              - duration: 1000
                value: 0
                easing: linear
