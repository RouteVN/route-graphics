---
title: Text Render Abortion Test
description: Test abortion callback during text render with 3 keyframes
specs:
  - text should render with 3 keyframe animation
  - abortion callback should be testable during render
  - element props differ from animation final state
steps:
  - action: keypress
    key: 'n'
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 1200
  - action: screenshot
  - action: keypress
    key: 'n'
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 1200
  - action: screenshot
  - action: customEvent
    name: snapShotKeyFrame
    detail:
      deltaMS: 800
---
states:
  - elements: []
  - elements:
      - id: text-render-test
        type: text
        x: 100
        'y': 100
        content: Render Test
        textStyle:
          fontFamily: Arial
          fontSize: 32
          fill: '#FFFFFF'
        alpha: 1
    animations:
      - id: text-render-abortion
        targetId: text-render-test
        type: transition
        next:
          tween:
            translateX:
              initialValue: -0.0390625
              keyframes:
                - duration: 1000
                  value: 0.0390625
                  easing: linear
                - duration: 1000
                  value: 0.1171875
                  easing: linear
            translateY:
              initialValue: -0.06944444444444445
              keyframes:
                - duration: 1000
                  value: 0.027777777777777776
                  easing: linear
                - duration: 1000
                  value: 0.1388888888888889
                  easing: linear
  - elements:
      - id: text-render-test
        type: text
        x: 400
        'y': 300
        content: Continued Render
        textStyle:
          fontFamily: Arial
          fontSize: 48
          fill: '#FFFFFF'
        alpha: 1
    animations:
      - id: text-render-abortion-2
        targetId: text-render-test
        type: update
        tween:
          x:
            initialValue: 250
            keyframes:
              - duration: 1000
                value: 350
                easing: linear
              - duration: 1000
                value: 400
                easing: linear
          alpha:
            initialValue: 0.3
            keyframes:
              - duration: 1000
                value: 0.7
                easing: linear
              - duration: 1000
                value: 1
                easing: linear
