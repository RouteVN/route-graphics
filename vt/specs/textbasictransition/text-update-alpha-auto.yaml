---
title: Text Update Alpha Auto Transition
description: A text element fading during update using tween auto shorthand.
specs:
  - text should fade from full opacity to 30%
  - alpha should be derived from the next state
  - animation should take 600ms
steps:
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 300
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 300
  - action: screenshot
---
states:
  - elements:
      - id: text1
        type: text
        content: Fading Text Auto
        x: 260
        "y": 240
        alpha: 1
        textStyle:
          fontSize: 36
          fill: "#D9D9D9"
          fontFamily: Arial
  - elements:
      - id: text1
        type: text
        content: Fading Text Auto
        x: 260
        "y": 240
        alpha: 0.3
        textStyle:
          fontSize: 36
          fill: "#D9D9D9"
          fontFamily: Arial
    animations:
      - id: text-fade-auto
        targetId: text1
        type: update
        tween:
          alpha:
            auto:
              duration: 600
              easing: linear
