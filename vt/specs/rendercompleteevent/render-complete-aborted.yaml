---
title: Render Complete Event - Aborted
description: Visual smoke test for interrupted first render and stable second render
specs:
  - first animation is interrupted before completion
  - second state renders to a stable frame
steps:
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 250
  - action: customEvent
    name: "vtNextState"
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 1000
  - action: screenshot
---
states:
  - id: first-animation-state
    elements:
      - id: rect1
        type: rect
        x: 200
        "y": 150
        width: 400
        height: 300
        fill: "#FFFFFF"
        alpha: 1
    animations:
      - id: rect-fade-in
        targetId: rect1
        type: transition
        next:
          tween:
            alpha:
              initialValue: 0
              keyframes:
                - duration: 1000
                  value: 1
                  easing: linear
  - id: second-animation-state
    elements:
      - id: rect1
        type: rect
        x: 200
        "y": 150
        width: 400
        height: 300
        fill: "#A6A6A6"
        alpha: 1
    animations:
      - id: rect-slide
        targetId: rect1
        type: update
        tween:
          x:
            keyframes:
              - duration: 500
                value: 400
                easing: linear
