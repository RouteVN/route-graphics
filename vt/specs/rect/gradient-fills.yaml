---
title: Rect Gradient Fills
specs:
  - rect should render stable solid, local linear, global, and repeating gradient fills without text overlays
---
states:
  - elements:
      - id: solid-rect
        type: rect
        x: 60
        "y": 60
        width: 220
        height: 120
        border:
          width: 2
          color: "#ffffff"
          alpha: 1
        fill:
          type: solid
          color: "#f5f5f5"
      - id: linear-rect
        type: rect
        x: 320
        "y": 60
        width: 220
        height: 120
        border:
          width: 2
          color: "#ffffff"
          alpha: 1
        fill:
          type: linear-gradient
          start: { x: 0, y: 0 }
          end: { x: 1, y: 0 }
          stops:
            - offset: 0
              color: "#ffffff"
            - offset: 1
              color: "#3b82f6"
      - id: diagonal-rect
        type: rect
        x: 580
        "y": 60
        width: 220
        height: 120
        border:
          width: 2
          color: "#ffffff"
          alpha: 1
        fill:
          type: linear-gradient
          start: { x: 0, y: 0 }
          end: { x: 1, y: 1 }
          stops:
            - offset: 0
              color: "#ffffff"
            - offset: 0.45
              color: "#a9c2ff"
            - offset: 1
              color: "#1e3a8a"
      - id: global-left
        type: rect
        x: 60
        "y": 230
        width: 220
        height: 120
        border:
          width: 2
          color: "#ffffff"
          alpha: 1
        fill:
          type: linear-gradient
          start: { x: 60, y: 230 }
          end: { x: 540, y: 230 }
          coordinateSpace: global
          stops:
            - offset: 0
              color: "#ffffff"
            - offset: 1
              color: "#2563eb"
      - id: global-right
        type: rect
        x: 320
        "y": 230
        width: 220
        height: 120
        border:
          width: 2
          color: "#ffffff"
          alpha: 1
        fill:
          type: linear-gradient
          start: { x: 60, y: 230 }
          end: { x: 540, y: 230 }
          coordinateSpace: global
          stops:
            - offset: 0
              color: "#ffffff"
            - offset: 1
              color: "#2563eb"
      - id: repeat-rect
        type: rect
        x: 580
        "y": 230
        width: 220
        height: 120
        border:
          width: 2
          color: "#ffffff"
          alpha: 1
        fill:
          type: linear-gradient
          start: { x: 0, y: 0 }
          end: { x: 0.25, y: 0 }
          wrapMode: repeat
          stops:
            - offset: 0
              color: "#ffffff"
            - offset: 1
              color: "#64748b"
