---
title: Update Rectangle Position and Dimensions
specs:
  - rectangles should update position and dimensions between states
  - navigating back should restore the original rectangle geometry
steps:
  - action: keypress
    key: "n"
  - action: screenshot
  - action: keypress
    key: b
  - action: screenshot
---
states:
  - elements:
      - id: rect-1
        type: rect
        x: 50
        "y": 50
        width: 100
        height: 80
        fill: "#FFFFFF"
        zIndex: 1
  - elements:
      - id: rect-1
        type: rect
        x: 150
        "y": 200
        width: 150
        height: 120
        fill: "#FFFFFF"
        zIndex: 1
