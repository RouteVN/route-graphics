---
title: Rect Drag Events
description: Test drag events on rect elements
specs:
  - rect should send payload on drag.down
  - rect should send payload on drag.move
  - rect should send payload on drag.up
steps:
  - action: customEvent
    name: clearEvents
  - action: move
    x: 220
    "y": 160
  - action: mouseDown
  - action: screenshot
  - action: move
    x: 300
    "y": 200
  - action: screenshot
  - action: move
    x: 400
    "y": 300
  - action: mouseUp
  - action: screenshot
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - dragStart
    value:
      - _event:
          id: rect-draggable
        action: dragStart
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - dragMove
    value:
      - _event:
          id: rect-draggable
          x: 300
          "y": 200
        action: dragMove
      - _event:
          id: rect-draggable
          x: 400
          "y": 300
        action: dragMove
  - action: assert
    type: js
    fn: vtAssert.payloadDeepEquals
    args:
      - dragEnd
    value:
      - _event:
          id: rect-draggable
        action: dragEnd
---
states:
  - elements:
      - id: rect-draggable
        type: rect
        x: 200
        "y": 150
        width: 200
        height: 100
        fill: "#A6A6A6"
        cursor: pointer
        drag:
          start:
            payload:
              action: dragStart
          move:
            payload:
              action: dragMove
          end:
            payload:
              action: dragEnd
