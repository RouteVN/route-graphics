---
title: Structured water-drop, splash, and wave variations with custom texture aliases
specs:
  - custom water texture aliases should cover drips, splash crowns, fountain spray, and surface wave ripples
  - moving between water states should preserve deterministic seeded particle layouts per variation
  - each water variation should remain visually distinct in source shape, motion, and texture usage
skipInitialScreenshot: true
steps:
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 32
  - action: wait
    ms: 50
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 160
  - action: wait
    ms: 50
  - action: customEvent
    name: "primeVtScreenshot"
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 260
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "vtNextState"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 160
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 240
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "vtNextState"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 120
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 200
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "vtNextState"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 180
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 260
  - action: wait
    ms: 50
  - action: screenshot
