---
title: Update Particles Properties
specs:
  - the baseline structured particle field should render deterministically
  - particle alpha and emission capacity changes should alter the rendered field
  - navigating backward should restore the previous particle configuration
skipInitialScreenshot: true
useBrowserScreenshot: true
steps:
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 120
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "vtNextState"
  - action: wait
    ms: 100
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 160
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "vtPrevState"
  - action: wait
    ms: 100
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 120
  - action: wait
    ms: 50
  - action: screenshot
---
states:
  - elements:
      - id: stage-bg
        type: rect
        x: 0
        y: 0
        width: 1280
        height: 720
        fill: "#000000"
      - id: snow-effect
        type: particles
        width: 1280
        height: 720
        alpha: 1
        seed: 12345
        modules:
          emission:
            mode: continuous
            rate: 180
            maxActive: 180
            duration: infinite
            particleLifetime:
              min: 3
              max: 5
            source:
              kind: rect
              data:
                x: 0
                "y": 0
                width: 1280
                height: 24
          movement:
            velocity:
              kind: directional
              direction: 90
              speed:
                min: 90
                max: 180
          appearance:
            texture:
              shape: circle
              radius: 5
              color: "#ffffff"
            scale:
              mode: range
              min: 0.8
              max: 1.4
            alpha:
              mode: curve
              keys:
                - value: 0
                  time: 0
                - value: 0.8
                  time: 0.1
                - value: 0.8
                  time: 0.8
                - value: 0
                  time: 1
            rotation:
              mode: spin
              start:
                min: 0
                max: 360
              speed:
                min: -45
                max: 45
          bounds:
            mode: recycle
            source: area
            padding: 50
