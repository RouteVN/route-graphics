---
title: Custom sparkle/twinkle effect (Level 3 - Full Custom)
specs:
  - structured particle modules should render deterministic sparkle frames
  - weighted texture selection should remain stable under a seed
  - snapshot keyframe events should capture stable intermediate particle states
skipInitialScreenshot: true
steps:
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 32
  - action: wait
    ms: 50
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 200
  - action: wait
    ms: 50
  - action: customEvent
    name: "primeVtScreenshot"
  - action: wait
    ms: 50
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 200
  - action: wait
    ms: 50
  - action: screenshot
---
states:
  - elements:
      - id: stage-bg
        type: rect
        x: 0
        y: 0
        width: 1280
        height: 720
        fill: "#000000"
      - id: sparkles
        type: particles
        width: 1280
        height: 720
        seed: 12345
        modules:
          emission:
            mode: continuous
            rate: 20
            maxActive: 30
            duration: infinite
            particleLifetime:
              min: 0.3
              max: 0.8
            source:
              kind: rect
              data:
                x: 100
                "y": 100
                width: 1080
                height: 520
          appearance:
            texture:
              mode: random
              pick: perParticle
              items:
                - src: snowflake
                  weight: 3
                - shape: circle
                  radius: 2
                  color: "#D9D9D9"
                  weight: 1
            scale:
              mode: curve
              keys:
                - value: 0
                  time: 0
                - value: 1.5
                  time: 0.3
                - value: 1.5
                  time: 0.7
                - value: 0
                  time: 1
            alpha:
              mode: curve
              keys:
                - value: 0
                  time: 0
                - value: 1
                  time: 0.2
                - value: 1
                  time: 0.8
                - value: 0
                  time: 1
            rotation:
              mode: spin
              start:
                min: 0
                max: 360
              speed:
                min: 45
                max: 90
