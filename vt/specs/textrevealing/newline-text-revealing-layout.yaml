---
title: Text Revealing Newline Layout
description: |
  Tests escaped \n handling for text-revealing content. Visible text is intentional because
  reveal chunking, computed dimensions, and runtime line construction are the behavior under test.
specs:
  - text-revealing content should split escaped \n into separate reveal lines
  - computed chunks should preserve explicit newline boundaries without rendering the newline glyph
  - computed width, height, and anchor-adjusted coordinates should use the multiline reveal layout
  - revealEffect none should render the separated runtime line containers immediately
steps:
