---
title: Text Revealing - Speed Scale
description: Compares typewriter reveal progress across low, mid, high, and instant speed settings on the curved text-reveal scale.
specs:
  - lower speeds should reveal fewer characters after the same elapsed time
  - upper-range speeds should progress much faster than the low half of the scale
  - speed 100 should render complete text immediately without any reveal animation
steps:
  - action: screenshot
  - action: keypress
    key: "n"
  - action: wait
    ms: 450
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 16
  - action: screenshot
  - action: wait
    ms: 1150
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 16
  - action: screenshot
---
