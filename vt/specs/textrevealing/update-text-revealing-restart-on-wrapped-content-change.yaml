---
title: Update Text Revealing Restarts On Wrapped Content Change
description: |
  Same text-revealing element id should restart reveal progress when long wrapped content changes.
specs:
  - First wrapped state should be mid-reveal
  - Updating to new wrapped content on the same id should restart reveal from the beginning
  - Repeated wrapped-content changes should keep restarting from the beginning
  - A same-content move should also restart from the beginning
