---
title: Text Revealing - Spritesheet Indicator
description: Exercises text-revealing indicators backed by spritesheet animation; fighter-sheet colors are intentional asset-based visual cues.
specs:
  - revealing indicator should render a configured spritesheet frame at the live reveal cursor
  - complete indicator should be able to swap from a static image to a spritesheet visual
  - both indicator visuals should use the same atlas/playback vocabulary as spritesheet-animation
  - softWipe revealing indicators should also support spritesheet animation
skipInitialScreenshot: true
steps:
  - action: keypress
    key: "n"
  - action: wait
    ms: 120
  - action: customEvent
    name: "snapShotAnimatedSpriteFrame"
    detail:
      elementId: "animated-revealing-indicator"
      frameIndex: 1
  - action: customEvent
    name: "snapShotAnimatedSpriteFrame"
    detail:
      elementId: "animated-complete-indicator"
      frameIndex: 1
  - action: customEvent
    name: "snapShotAnimatedSpriteFrame"
    detail:
      elementId: "animated-soft-wipe-indicator"
      frameIndex: 1
  - action: wait
    ms: 50
  - action: screenshot
---
states:
  - id: empty
    elements: []
  - id: spritesheet-indicator
