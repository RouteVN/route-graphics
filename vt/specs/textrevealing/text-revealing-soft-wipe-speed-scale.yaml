---
title: Text Revealing - Soft Wipe Speed Scale
description: Compares softWipe reveal progress across low, mid, high, and instant speed settings on the shared text-reveal speed scale.
specs:
  - lower speeds should leave more of the line masked after the same animation time
  - upper-range speeds should expose much more of the line than the lower half of the scale
  - speed 100 should bypass the wipe and render the full line immediately
steps:
  - action: screenshot
  - action: keypress
    key: "n"
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 450
  - action: screenshot
  - action: customEvent
    name: "snapShotKeyFrame"
    detail:
      deltaMS: 800
  - action: screenshot
---
