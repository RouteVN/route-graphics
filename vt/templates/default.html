<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100vh;
        color: #f2f4f8;
        font-family: "Noto Sans", sans-serif;
        background: #999 !important;
      }

      body {
        height: auto !important;
        padding-bottom: 20px;
      }

      .vt-state-pager {
        position: relative;
        z-index: 10;
        width: fit-content;
        align-self: flex-start;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        max-width: calc(100vw - 40px);
        margin: 20px 0 0 20px;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background:
          linear-gradient(
            180deg,
            rgba(24, 28, 33, 0.92),
            rgba(11, 14, 18, 0.92)
          ),
          rgba(8, 10, 12, 0.92);
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      }

      .vt-state-pager[hidden] {
        display: none;
      }

      .vt-state-nav {
        appearance: none;
        border: 0;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(242, 244, 248, 0.96);
        min-width: 42px;
        height: 36px;
        padding: 0 12px;
        font-size: 16px;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        transition:
          background 120ms ease,
          color 120ms ease,
          transform 120ms ease,
          opacity 120ms ease;
      }

      .vt-state-nav:hover:not(:disabled),
      .vt-state-index:hover {
        background: rgba(255, 255, 255, 0.14);
        transform: translateY(-1px);
      }

      .vt-state-nav:not(:disabled) {
        background: rgba(255, 255, 255, 0.14);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .vt-state-nav:disabled {
        color: rgba(242, 244, 248, 0.62);
        background: rgba(255, 255, 255, 0.08);
        opacity: 0.7;
        cursor: not-allowed;
      }

      .vt-state-center {
        min-width: 0;
        flex: 0 1 auto;
        display: flex;
        align-items: center;
      }

      .vt-state-list {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        gap: 8px;
        max-width: min(100%, 70vw);
      }

      .vt-state-index {
        appearance: none;
        min-width: 36px;
        height: 36px;
        padding: 0 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(242, 244, 248, 0.88);
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          color 120ms ease,
          transform 120ms ease;
      }

      .vt-state-index.is-active {
        background: #f2f4f8;
        border-color: #f2f4f8;
        color: #111418;
        font-weight: 700;
      }

      @media (max-width: 900px) {
        body {
          padding-bottom: 12px;
        }

        .vt-state-pager {
          max-width: calc(100vw - 24px);
          margin: 12px 0 0 12px;
          padding: 10px 12px;
        }

        .vt-state-nav {
          min-width: 36px;
          height: 36px;
        }

        .vt-state-index {
          min-width: 32px;
          height: 32px;
          padding: 0 10px;
        }
      }
    </style>
    <script id="vt-state" type="text/plain">
      {{ content }}
    </script>
    <script type="module">
      import createRouteGraphics, {
        Assets,
        AudioAsset,
        textPlugin,
        rectPlugin,
        spritePlugin,
        videoPlugin,
        sliderPlugin,
        inputPlugin,
        containerPlugin,
        textRevealingPlugin,
        animatedSpritePlugin,
        tweenPlugin,
        soundPlugin,
        particlesPlugin,
        createAssetBufferManager,
      } from "/RouteGraphics.js";
      import { parseAllDocuments } from "https://cdn.jsdelivr.net/npm/yaml@2.7.1/+esm";

      const assetsObject = {
        "background-1": {
          url: "/public/background-1-1.png",
          type: "image/png",

        },

        "horizontal-idle-bar": {

        "slider-split-inactive-bar": {

        "horizontal-idle-thumb": {

        "slider-split-vertical-active-bar": {

        },
        "slider-split-vertical-inactive-bar": {

        },
        "slider-split-vertical-active-hover-bar": {

        },
        "slider-split-vertical-inactive-hover-bar": {
          url: "/public/slider_split_vertical_inactive_hover_bar.png",
          type: "image/png",
        },
        "vertical-idle-thumb": {
          url: "/public/vertical_idle_thumb.png",
          type: "image/png",
        },
        "vertical-hover-thumb": {
          url: "/public/vertical_hover_thumb.png",
          type: "image/png",
        },
        "fighter-spritesheet": {
          url: "/public/fighter.png",
          type: "image/png",
        },
        "mask-diagonal": {
          url: "/public/mask_diagonal.png",
          type: "image/png",
        },
        "mask-left-band": {
          url: "/public/mask_left_band.png",
          type: "image/png",
        },
        "mask-center-band": {
          url: "/public/mask_center_band.png",
          type: "image/png",
        },
        "mask-right-band": {
          url: "/public/mask_right_band.png",
          type: "image/png",
        },
        "mask-rgba-channels": {
          url: "/public/mask_rgba_channels.png",
          type: "image/png",
        },
        "mask-clockwipe": {
          url: "/public/mask_clockwipe.png",
          type: "image/png",
        },
        "mask-composite-diagonal-down": {
          url: "/public/mask_composite_diagonal_down.png",
          type: "image/png",
        },
        "mask-composite-diagonal-up": {
          url: "/public/mask_composite_diagonal_up.png",
          type: "image/png",
        },
        "sfx-1": { url: "/public/sfx-1.mp3", type: "audio/mpeg" },
        "sfx-2": { url: "/public/sfx-2.wav", type: "audio/wav" },
      };

      const shouldLoadOptionalMedia =
        !window?.RTGL_VT_DEBUG &&
        (window?.RTGL_VT_INCLUDE_MEDIA === true ||
          new URLSearchParams(window.location.search).get("media") === "1");

      // Keep video/audio opt-in for manual browser runs so pages that do not
      // use media do not block on video preload.
      if (shouldLoadOptionalMedia) {
        Object.assign(assetsObject, {
          "bgm-1": { url: "/public/bgm-1.mp3", type: "audio/mpeg" },
          "bgm-2": { url: "/public/bgm-2.mp3", type: "audio/mpeg" },
          "bgm-3": { url: "/public/bgm-3.mp3", type: "audio/mpeg" },
          "video-sample": {
            url: "/public/video_sample.mp4",
            type: "video/mp4",
          },
          "video-sample-2": {
            url: "/public/video_sample_2.mp4",
            type: "video/mp4",
          },
        });
      }

      const assetBufferManager = createAssetBufferManager();
      await assetBufferManager.load(assetsObject);

      const app = createRouteGraphics();
      window.__VT_ROUTE_GRAPHICS__ = app;
      const plugins = {
        elements: [
          textPlugin,
          rectPlugin,
          spritePlugin,
          videoPlugin,
          sliderPlugin,
          inputPlugin,
          containerPlugin,
          textRevealingPlugin,
          animatedSpritePlugin,
          particlesPlugin,
        ],
        animations: [tweenPlugin],
        audio: [soundPlugin],
      };
      let index = 0;
      let advanceToNextStateOnRenderComplete = false;
      const vtStateSource =
        document.getElementById("vt-state")?.textContent?.trim() ?? "";
      const vtDocuments = parseAllDocuments(vtStateSource).map(
        (doc) => doc.toJSON() ?? {},
      );
      const vtState = Object.assign({}, ...vtDocuments);
      const states = vtState.states ?? [];
      const useBrowserScreenshot = vtState.useBrowserScreenshot === true;
      if (!useBrowserScreenshot) {
        let vtScreenshotHookPrimed = false;
        const waitForStableScreenshotFrame = async () => {
          await new Promise((resolve) => {
            requestAnimationFrame(() => {
              requestAnimationFrame(resolve);
            });
          });
        };
        window.takeVtScreenshotBase64 = async () => {
          await waitForStableScreenshotFrame();

          // Pixi extraction can return an empty first frame immediately after mount.
          // Warm the hook once and return the second capture for the first caller.
          if (!vtScreenshotHookPrimed) {
            vtScreenshotHookPrimed = true;
            try {
              await app.extractBase64();
            } catch {}
            await waitForStableScreenshotFrame();
          }

          return await app.extractBase64();
        };
      } else {
        document.documentElement.classList.add("vt-browser-screenshot");
      }
      window.__VT_STATE_DATA__ = vtState;
      window.__VT_STATES__ = states;
      const pager = document.createElement("nav");
      pager.className = "vt-state-pager";
      pager.setAttribute("aria-label", "State navigation");
      const prevButton = document.createElement("button");
      prevButton.className = "vt-state-nav";
      prevButton.type = "button";
      prevButton.setAttribute("aria-label", "Previous state");
      prevButton.textContent = "←";
      const stateCenter = document.createElement("div");
      stateCenter.className = "vt-state-center";
      const stateList = document.createElement("div");
      stateList.className = "vt-state-list";
      const nextButton = document.createElement("button");
      nextButton.className = "vt-state-nav";
      nextButton.type = "button";
      nextButton.setAttribute("aria-label", "Next state");
      nextButton.textContent = "→";

      stateCenter.append(stateList);
      pager.append(prevButton, stateCenter, nextButton);

      window.__VT_EVENTS__ = [];
      window.__VT_ALL_EVENTS__ = [];
      const shouldLogEvents = true;

      const getEventStore = (scope) => {
        if (scope === "all") return window.__VT_ALL_EVENTS__;
        return window.__VT_EVENTS__;
      };

      const clearEvents = () => {
        window.__VT_EVENTS__ = [];
        window.__VT_ALL_EVENTS__ = [];
      };

      window.getVtEvents = (scope = "default") => {
        const store = getEventStore(scope);
        return store.map((event) => ({
          name: event.name,
          payload: event.payload,
        }));
      };

      window.vtAssert = {
        payloadDeepEquals: (eventName, scope = "default") =>
          window
            .getVtEvents(scope)
            .filter((event) => event.name === eventName)
            .map((event) => event.payload),
      };

      const normalizeTextNewlines = (value) =>
        String(value ?? "")
          .replace(/\r\n/g, "\n")
          .replace(/\r/g, "\n");

      const findRawElementById = (elements, targetId) => {
        for (const element of elements ?? []) {
          if (element?.id === targetId) {
            return element;
          }

          const childMatch = findRawElementById(element?.children, targetId);

          if (childMatch) {
            return childMatch;
          }
        }

        return null;
      };

      const getCurrentRawElement = (id) =>
        findRawElementById(states[index]?.elements, id);

      const getParserPluginsForAssert = () =>
        plugins.elements
          .filter((plugin) => typeof plugin?.parse === "function")
          .map((plugin) => ({
            type: plugin.type,
            parse: plugin.parse,
          }));

      const getComputedElementForAssert = (id) => {
        const rawElement = getCurrentRawElement(id);

        if (!rawElement) {
          throw new Error(`VT assert element '${id}' was not found.`);
        }

        const plugin = plugins.elements.find(
          (candidate) => candidate.type === rawElement.type,
        );

        if (typeof plugin?.parse !== "function") {
          throw new Error(
            `VT assert element '${id}' has no parser for type '${rawElement.type}'.`,
          );
        }

        return {
          rawElement,
          computedElement: plugin.parse({
            state: rawElement,
            parserPlugins: getParserPluginsForAssert(),
          }),
        };
      };

      const getTextLineCount = (value) =>
        normalizeTextNewlines(value).split("\n").length;

      const roundedNumber = (value) =>
        typeof value === "number" && Number.isFinite(value)
          ? Math.round(value)
          : value;

      const pickTextNewlineComputedLayout = (id) => {
        const { rawElement, computedElement } = getComputedElementForAssert(id);
        const lineCount = getTextLineCount(computedElement.content);
        const lineHeight = computedElement.textStyle?.lineHeight ?? 0;

        return {
          content: computedElement.content,
          lineCount,
          hasExplicitNewline: normalizeTextNewlines(
            computedElement.content,
          ).includes("\n"),
          width: computedElement.width,
          height: computedElement.height,
          measuredWidth: computedElement.measuredWidth,
          x: computedElement.x,
          y: computedElement.y,
          originX: computedElement.originX,
          originY: computedElement.originY,
          lineHeight,
          anchorResolvesX:
            Math.abs(
              computedElement.x + computedElement.originX - rawElement.x,
            ) <= 1,
          anchorResolvesY:
            Math.abs(
              computedElement.y + computedElement.originY - rawElement.y,
            ) <= 1,
          measuredWidthMatchesLayoutWidth:
            typeof rawElement.width === "number"
              ? computedElement.width === Math.round(rawElement.width)
              : computedElement.width === computedElement.measuredWidth,
          heightCoversExplicitLines:
            lineHeight > 0 && computedElement.height >= lineHeight * lineCount,
        };
      };

      const pickTextNewlineRuntimeLayout = (id) => {
        const { computedElement } = getComputedElementForAssert(id);
        const displayObject = app.findElementByLabel(id);

        if (!displayObject) {
          throw new Error(`VT assert display object '${id}' was not found.`);
        }

        return {
          text: displayObject.text,
          lineCount: getTextLineCount(displayObject.text),
          xMatchesComputed:
            roundedNumber(displayObject.x) === computedElement.x,
          yMatchesComputed:
            roundedNumber(displayObject.y) === computedElement.y,
          widthMatchesComputedMeasuredWidth:
            roundedNumber(displayObject.width) ===
            computedElement.measuredWidth,
          heightMatchesComputed:
            roundedNumber(displayObject.height) === computedElement.height,
        };
      };

      const flattenTextRevealingLineTexts = (computedElement) =>
        (computedElement.content ?? []).map((chunk) =>
          (chunk.lineParts ?? []).map((part) => part.text ?? "").join(""),
        );

      const pickTextRevealingNewlineComputedLayout = (id) => {
        const { rawElement, computedElement } = getComputedElementForAssert(id);
        const lineTexts = flattenTextRevealingLineTexts(computedElement);
        const chunkYs = (computedElement.content ?? []).map((chunk) => chunk.y);
        const chunkHeights = (computedElement.content ?? []).map(
          (chunk) => chunk.lineMaxHeight,
        );
        const normalizedSource = normalizeTextNewlines(
          (rawElement.content ?? []).map((item) => item?.text ?? "").join(""),
        );

        return {
          lineTexts,
          lineCount: lineTexts.length,
          hasExplicitNewline: normalizedSource.includes("\n"),
          width: computedElement.width,
          height: computedElement.height,
          x: computedElement.x,
          y: computedElement.y,
          originX: computedElement.originX,
          originY: computedElement.originY,
          chunkYs,
          chunkHeights,
          anchorResolvesX:
            Math.abs(
              computedElement.x + computedElement.originX - rawElement.x,
            ) <= 1,
          anchorResolvesY:
            Math.abs(
              computedElement.y + computedElement.originY - rawElement.y,
            ) <= 1,
          heightCoversChunks:
            computedElement.height >=
            chunkHeights.reduce((total, height) => total + height, 0),
          chunksAdvanceDownward: chunkYs.every(
            (chunkY, chunkIndex) =>
              chunkIndex === 0 || chunkY > chunkYs[chunkIndex - 1],
          ),
        };
      };

      const pickTextRevealingNewlineRuntimeLayout = (id) => {
        const { computedElement } = getComputedElementForAssert(id);
        const container = app.findElementByLabel(id);
        const contentContainer = app.findElementByLabel(`${id}-content`);

        if (!container || !contentContainer) {
          throw new Error(
            `VT assert text-revealing object '${id}' was not found.`,
          );
        }

        const runtimeLineTexts = contentContainer.children
          .filter((child) =>
            String(child.label ?? "").startsWith(`${id}-line-`),
          )
          .map((lineContainer) =>
            lineContainer.children
              .filter((child) => typeof child.text === "string")
              .map((child) => child.text)
              .join(""),
          );

        return {
          lineTexts: runtimeLineTexts,
          lineCount: runtimeLineTexts.length,
          xMatchesComputed: roundedNumber(container.x) === computedElement.x,
          yMatchesComputed: roundedNumber(container.y) === computedElement.y,
        };
      };

      Object.assign(window.vtAssert, {
        textComputedNewlineLayout: pickTextNewlineComputedLayout,
        textRuntimeNewlineLayout: pickTextNewlineRuntimeLayout,
        textRevealingComputedNewlineLayout:
          pickTextRevealingNewlineComputedLayout,
        textRevealingRuntimeNewlineLayout:
          pickTextRevealingNewlineRuntimeLayout,
      });
      let vtReadySignaled = false;
      const signalVtReady = async () => {
        if (vtReadySignaled) {
          return;
        }

        vtReadySignaled = true;
        requestAnimationFrame(() => {
          setTimeout(() => {
            window.dispatchEvent(new CustomEvent("vt:ready"));
          }, 0);
        });
      };

      const updatePager = () => {
        const hasMultipleStates = states.length > 1;
        pager.hidden = useBrowserScreenshot || !hasMultipleStates;
        if (!hasMultipleStates) {
          return;
        }

        prevButton.disabled = index <= 0;
        nextButton.disabled = index >= states.length - 1;
        stateList.replaceChildren();

        states.forEach((state, stateIndex) => {
          const stateButton = document.createElement("button");
          stateButton.type = "button";
          stateButton.className = "vt-state-index";
          if (stateIndex === index) {
            stateButton.classList.add("is-active");
            stateButton.setAttribute("aria-current", "true");
          }
          stateButton.textContent = String(stateIndex + 1);
          stateButton.title = state?.id
            ? `State ${stateIndex + 1}: ${state.id}`
            : `State ${stateIndex + 1}`;
          stateButton.addEventListener("click", () => {
            renderState(stateIndex);
          });
          stateList.appendChild(stateButton);
        });
      };

      const renderState = (nextIndex, { doubleRender = false } = {}) => {
        if (nextIndex < 0 || nextIndex >= states.length) {
          return;
        }

        index = nextIndex;
        const state = states[index] ?? {};
        const nextRenderState = {
          id: state.id ?? `state-${index}`,
          elements: state.elements ?? [],
          animations: state.animations ?? [],
          audio: state.audio ?? [],
          global: state.global ?? {},
        };

        app.render(nextRenderState);
        if (doubleRender) {
          app.render(nextRenderState);
        }
        updatePager();
      };

      await app.init({
        width: 1280,
        height: 720,
        plugins,
        eventHandler: (eventName, payload) => {
          const eventData = {
            name: eventName,
            payload,
          };
          if (shouldLogEvents) {
            console.log("[VT event]", eventName, payload);
          }
          window.__VT_ALL_EVENTS__.push(eventData);
          if (eventName === "renderComplete") {
            if (
              advanceToNextStateOnRenderComplete &&
              payload?.aborted !== true
            ) {
              advanceToNextStateOnRenderComplete = false;
              renderState(index + 1);
            }
            return;
          }
          window.__VT_EVENTS__.push(eventData);
        },
        onFirstRender: () => {
          void signalVtReady();
        },
        debug: window?.RTGL_VT_DEBUG ?? false,
      });
      window.__VT_ROUTE_GRAPHICS__ = app;
      await app.loadAssets(assetBufferManager.getBufferMap());
      document.body.appendChild(app.canvas);
      document.body.appendChild(pager);
      if (states.length > 0) {
        renderState(index, { doubleRender: true });
      } else {
        updatePager();
        signalVtReady();
      }

      prevButton.addEventListener("click", () => {
        renderState(index - 1);
      });

      nextButton.addEventListener("click", () => {
        renderState(index + 1);
      });

      const listenEvents = () => {
        const dispatchVtKeyboardEvent = (type, options) => {
          document.dispatchEvent(
            new KeyboardEvent(type, {
              bubbles: true,
              cancelable: true,
              ...options,
            }),
          );
        };

        document.addEventListener("keydown", async (e) => {
          if (e.shiftKey && e.key !== "Shift") {
            if (states.length > index + 1) {
              renderState(index + 1, { doubleRender: true });
            }
          } else if (e.key === "n" || e.key === "ArrowRight") {
            if (states.length > index + 1) {
              renderState(index + 1);
            }
          } else if (e.key === "b" || e.key === "ArrowLeft") {
            if (index - 1 >= 0) {
              renderState(index - 1);
            }
          }
        });

        window.addEventListener("clearEvents", () => {
          clearEvents();
        });

        window.addEventListener("vtKeyboardShiftCReleaseShiftFirst", () => {
          dispatchVtKeyboardEvent("keydown", {
            key: "Shift",
            code: "ShiftLeft",
            keyCode: 16,
            which: 16,
            shiftKey: true,
          });
          dispatchVtKeyboardEvent("keydown", {
            key: "c",
            code: "KeyC",
            keyCode: 67,
            which: 67,
            shiftKey: true,
          });
          dispatchVtKeyboardEvent("keyup", {
            key: "Shift",
            code: "ShiftLeft",
            keyCode: 16,
            which: 16,
          });
          dispatchVtKeyboardEvent("keyup", {
            key: "c",
            code: "KeyC",
            keyCode: 67,
            which: 67,
          });
        });

        window.addEventListener("vtKeyboardNumpad0", () => {
          dispatchVtKeyboardEvent("keydown", {
            key: "0",
            code: "Numpad0",
            keyCode: 96,
            which: 96,
          });
          dispatchVtKeyboardEvent("keyup", {
            key: "0",
            code: "Numpad0",
            keyCode: 96,
            which: 96,
          });
        });

        window.addEventListener("primeVtScreenshot", async () => {
          if (typeof window.takeVtScreenshotBase64 !== "function") {
            return;
          }
          try {
            await window.takeVtScreenshotBase64();
          } catch {}
        });

        window.addEventListener("vtNextState", () => {
          if (states.length > index + 1) {
            renderState(index + 1);
          }
        });

        window.addEventListener("vtNextStateOnRenderComplete", () => {
          advanceToNextStateOnRenderComplete = true;
        });

        window.addEventListener("vtPrevState", () => {
          if (index - 1 >= 0) {
            renderState(index - 1);
          }
        });
      };
      listenEvents();
    </script>
    <link rel="stylesheet" href="/public/theme.css" />
  </head>
  <body></body>
</html>
