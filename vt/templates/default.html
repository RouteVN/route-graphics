<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100vh;
        color: #f2f4f8;
        font-family: "Noto Sans", sans-serif;
        background: #999 !important;
      }

      body {
        height: auto !important;
        padding-bottom: 20px;
      }

      .vt-state-pager {
        position: relative;
        z-index: 10;
        width: fit-content;
        align-self: flex-start;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        max-width: calc(100vw - 40px);
        margin: 20px 0 0 20px;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(24, 28, 33, 0.92), rgba(11, 14, 18, 0.92)),
          rgba(8, 10, 12, 0.92);
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      }

      .vt-state-pager[hidden] {
        display: none;
      }

      .vt-state-nav {
        appearance: none;
        border: 0;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(242, 244, 248, 0.96);
        min-width: 42px;
        height: 36px;
        padding: 0 12px;
        font-size: 16px;
        font-weight: 700;
        line-height: 1;
        cursor: pointer;
        transition:
          background 120ms ease,
          color 120ms ease,
          transform 120ms ease,
          opacity 120ms ease;
      }

      .vt-state-nav:hover:not(:disabled),
      .vt-state-index:hover {
        background: rgba(255, 255, 255, 0.14);
        transform: translateY(-1px);
      }

      .vt-state-nav:not(:disabled) {
        background: rgba(255, 255, 255, 0.14);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .vt-state-nav:disabled {
        color: rgba(242, 244, 248, 0.62);
        background: rgba(255, 255, 255, 0.08);
        opacity: 0.7;
        cursor: not-allowed;
      }

      .vt-state-center {
        min-width: 0;
        flex: 0 1 auto;
        display: flex;
        align-items: center;
      }

      .vt-state-list {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        gap: 8px;
        max-width: min(100%, 70vw);
      }

      .vt-state-index {
        appearance: none;
        min-width: 36px;
        height: 36px;
        padding: 0 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(242, 244, 248, 0.88);
        font: inherit;
        font-size: 14px;
        cursor: pointer;
        transition:
          background 120ms ease,
          border-color 120ms ease,
          color 120ms ease,
          transform 120ms ease;
      }

      .vt-state-index.is-active {
        background: #f2f4f8;
        border-color: #f2f4f8;
        color: #111418;
        font-weight: 700;
      }

      @media (max-width: 900px) {
        body {
          padding-bottom: 12px;
        }

        .vt-state-pager {
          max-width: calc(100vw - 24px);
          margin: 12px 0 0 12px;
          padding: 10px 12px;
        }

        .vt-state-nav {
          min-width: 36px;
          height: 36px;
        }

        .vt-state-index {
          min-width: 32px;
          height: 32px;
          padding: 0 10px;
        }
      }
    </style>
    <script id="vt-state" type="text/plain">{{ content }}</script>
    <script type="module">
      import createRouteGraphics, {
        Assets,
        AudioAsset,
        textPlugin,
        rectPlugin,
        spritePlugin,
        videoPlugin,
        sliderPlugin,
        containerPlugin,
        textRevealingPlugin,
        animatedSpritePlugin,
        tweenPlugin,
        soundPlugin,
        particlesPlugin,
        createAssetBufferManager,
      } from "/RouteGraphics.js";
      import { parseAllDocuments } from "https://cdn.jsdelivr.net/npm/yaml@2.7.1/+esm";

      const assetsObject = {
        "background-1": {
          url: "/public/background-1-1.png",
          type: "image/png",
        },
        "circle-blue": { url: "/public/circle-blue.png", type: "image/png" },
        "circle-red": { url: "/public/circle-red.png", type: "image/png" },
        "circle-green": { url: "/public/circle-green.png", type: "image/png" },
        slider: { url: "/public/slider.png", type: "image/png" },
        "horizontal-idle-bar": {
          url: "/public/horizontal_idle_bar.png",
          type: "image/png",
        },
        "horizontal-hover-bar": {
          url: "/public/horizontal_hover_bar.png",
          type: "image/png",
        },
        "horizontal-idle-thumb": {
          url: "/public/horizontal_idle_thumb.png",
          type: "image/png",
        },
        "horizontal-hover-thumb": {
          url: "/public/horizontal_hover_thumb.png",
          type: "image/png",
        },
        "vertical-idle-bar": {
          url: "/public/vertical_idle_bar.png",
          type: "image/png",
        },
        "vertical-hover-bar": {
          url: "/public/vertical_hover_bar.png",
          type: "image/png",
        },
        "vertical-idle-thumb": {
          url: "/public/vertical_idle_thumb.png",
          type: "image/png",
        },
        "vertical-hover-thumb": {
          url: "/public/vertical_hover_thumb.png",
          type: "image/png",
        },
        "fighter-spritesheet": {
          url: "/public/fighter.png",
          type: "image/png",
        },
        "mask-diagonal": {
          url: "/public/mask_diagonal.png",
          type: "image/png",
        },
        "mask-left-band": {
          url: "/public/mask_left_band.png",
          type: "image/png",
        },
        "mask-center-band": {
          url: "/public/mask_center_band.png",
          type: "image/png",
        },
        "mask-right-band": {
          url: "/public/mask_right_band.png",
          type: "image/png",
        },
        "mask-rgba-channels": {
          url: "/public/mask_rgba_channels.png",
          type: "image/png",
        },
        "mask-clockwipe": {
          url: "/public/mask_clockwipe.png",
          type: "image/png",
        },
        "mask-composite-diagonal-down": {
          url: "/public/mask_composite_diagonal_down.png",
          type: "image/png",
        },
        "mask-composite-diagonal-up": {
          url: "/public/mask_composite_diagonal_up.png",
          type: "image/png",
        },
        "sfx-1": { url: "/public/sfx-1.mp3", type: "audio/mpeg" },
        "sfx-2": { url: "/public/sfx-2.wav", type: "audio/wav" },
      };

      // Keep video/audio opt-in for non-debug/manual browser runs.
      if (!window?.RTGL_VT_DEBUG) {
        Object.assign(assetsObject, {
          "bgm-1": { url: "/public/bgm-1.mp3", type: "audio/mpeg" },
          "bgm-2": { url: "/public/bgm-2.mp3", type: "audio/mpeg" },
          "bgm-3": { url: "/public/bgm-3.mp3", type: "audio/mpeg" },
          "video-sample": {
            url: "/public/video_sample.mp4",
            type: "video/mp4",
          },
          "video-sample-2": {
            url: "/public/video_sample_2.mp4",
            type: "video/mp4",
          },
        });
      }

      const assetBufferManager = createAssetBufferManager();
      await assetBufferManager.load(assetsObject);

      const app = createRouteGraphics();
      window.takeVtScreenshotBase64 = async () => await app.extractBase64();
      const plugins = {
        elements: [
          textPlugin,
          rectPlugin,
          spritePlugin,
          videoPlugin,
          sliderPlugin,
          containerPlugin,
          textRevealingPlugin,
          animatedSpritePlugin,
          particlesPlugin,
        ],
        animations: [tweenPlugin],
        audio: [soundPlugin],
      };
      let index = 0;
      const vtStateSource =
        document.getElementById("vt-state")?.textContent ?? "";
      const vtDocuments = parseAllDocuments(vtStateSource).map(
        (doc) => doc.toJSON() ?? {},
      );
      const vtState = Object.assign({}, ...vtDocuments);
      const states = vtState.states ?? [];
      const pager = document.createElement("nav");
      pager.className = "vt-state-pager";
      pager.setAttribute("aria-label", "State navigation");
      const prevButton = document.createElement("button");
      prevButton.className = "vt-state-nav";
      prevButton.type = "button";
      prevButton.setAttribute("aria-label", "Previous state");
      prevButton.textContent = "←";
      const stateCenter = document.createElement("div");
      stateCenter.className = "vt-state-center";
      const stateList = document.createElement("div");
      stateList.className = "vt-state-list";
      const nextButton = document.createElement("button");
      nextButton.className = "vt-state-nav";
      nextButton.type = "button";
      nextButton.setAttribute("aria-label", "Next state");
      nextButton.textContent = "→";

      stateCenter.append(stateList);
      pager.append(prevButton, stateCenter, nextButton);

      window.__VT_EVENTS__ = [];
      window.__VT_ALL_EVENTS__ = [];
      const shouldLogEvents = true;

      const getEventStore = (scope) => {
        if (scope === "all") return window.__VT_ALL_EVENTS__;
        return window.__VT_EVENTS__;
      };

      const clearEvents = () => {
        window.__VT_EVENTS__ = [];
        window.__VT_ALL_EVENTS__ = [];
      };

      window.getVtEvents = (scope = "default") => {
        const store = getEventStore(scope);
        return store.map((event) => ({
          name: event.name,
          payload: event.payload,
        }));
      };

      window.vtAssert = {
        payloadDeepEquals: (eventName, scope = "default") =>
          window
            .getVtEvents(scope)
            .filter((event) => event.name === eventName)
            .map((event) => event.payload),
      };

      const updatePager = () => {
        const hasMultipleStates = states.length > 1;
        pager.hidden = !hasMultipleStates;
        if (!hasMultipleStates) {
          return;
        }

        prevButton.disabled = index <= 0;
        nextButton.disabled = index >= states.length - 1;
        stateList.replaceChildren();

        states.forEach((state, stateIndex) => {
          const stateButton = document.createElement("button");
          stateButton.type = "button";
          stateButton.className = "vt-state-index";
          if (stateIndex === index) {
            stateButton.classList.add("is-active");
            stateButton.setAttribute("aria-current", "true");
          }
          stateButton.textContent = String(stateIndex + 1);
          stateButton.title = state?.id
            ? `State ${stateIndex + 1}: ${state.id}`
            : `State ${stateIndex + 1}`;
          stateButton.addEventListener("click", () => {
            renderState(stateIndex);
          });
          stateList.appendChild(stateButton);
        });
      };

      const renderState = (nextIndex, { doubleRender = false } = {}) => {
        if (nextIndex < 0 || nextIndex >= states.length) {
          return;
        }

        index = nextIndex;
        const state = states[index] ?? {};
        const nextRenderState = {
          id: state.id ?? `state-${index}`,
          elements: state.elements ?? [],
          animations: state.animations ?? [],
          audio: state.audio ?? [],
          global: state.global ?? {},
        };

        app.render(nextRenderState);
        if (doubleRender) {
          app.render(nextRenderState);
        }
        updatePager();
      };

      await app.init({
        width: 1280,
        height: 720,
        plugins,
        eventHandler: (eventName, payload) => {
          const eventData = {
            name: eventName,
            payload,
          };
          if (shouldLogEvents) {
            console.log("[VT event]", eventName, payload);
          }
          window.__VT_ALL_EVENTS__.push(eventData);
          if (eventName === "renderComplete") {
            return;
          }
          window.__VT_EVENTS__.push(eventData);
        },
        onFirstRender: () => {
          window.dispatchEvent(new CustomEvent("vt:ready"));
        },
        debug: window?.RTGL_VT_DEBUG ?? false,
      });
      await app.loadAssets(assetBufferManager.getBufferMap());
      document.body.appendChild(app.canvas);
      document.body.appendChild(pager);
      if (states.length > 0) {
        renderState(index);
      } else {
        updatePager();
      }

      prevButton.addEventListener("click", () => {
        renderState(index - 1);
      });

      nextButton.addEventListener("click", () => {
        renderState(index + 1);
      });

      const listenEvents = () => {
        document.addEventListener("keydown", async (e) => {
          if (e.shiftKey && e.key !== "Shift") {
            if (states.length > index + 1) {
              renderState(index + 1, { doubleRender: true });
            }
          } else if (e.key === "n" || e.key === "ArrowRight") {
            if (states.length > index + 1) {
              renderState(index + 1);
            }
          } else if (e.key === "b" || e.key === "ArrowLeft") {
            if (index - 1 >= 0) {
              renderState(index - 1);
            }
          }
        });

        window.addEventListener("clearEvents", () => {
          clearEvents();
        });
      };
      listenEvents();
    </script>
    <link rel="stylesheet" href="/public/theme.css" />
  </head>
  <body></body>
</html>
