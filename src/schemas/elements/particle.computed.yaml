$schema: http://json-schema.org/draft-07/schema#
title: Particles Computed Node
description: Schema for compiled particles node after parsing
type: object
required:
  - id
  - type
  - texture
  - behaviors
  - emitter
  - width
  - height
properties:
  id:
    type: string

  type:
    const: particles

  count:
    type: number
    description: Maximum active particles
    default: 100

  texture:
    oneOf:
      - type: string
      - $ref: "#/definitions/textureShape"
      - $ref: "#/definitions/textureSelector"

  behaviors:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - type
      properties:
        type:
          type: string
        config:
          type: object

  emitter:
    type: object
    properties:
      lifetime:
        $ref: "#/definitions/rangeValue"
      frequency:
        type: number
      particlesPerWave:
        type: number
      maxParticles:
        type: number
      emitterLifetime:
        type: number
      spawnBounds:
        type: object
        properties:
          x:
            type: number
          y:
            type: number
          width:
            type: number
          height:
            type: number
      recycleOnBounds:
        type: boolean
      seed:
        type: number

  x:
    type: number
    default: 0

  y:
    type: number
    default: 0

  width:
    type: number

  height:
    type: number

  alpha:
    type: number
    minimum: 0
    maximum: 1
    default: 1

definitions:
  distribution:
    type: object
    required:
      - kind
    properties:
      kind:
        type: string
        enum: [uniform, normal, bias]
      toward:
        type: string
        enum: [min, max, center]
      strength:
        type: number
      mean:
        type: number
      deviation:
        type: number

  rangeValue:
    type: object
    required:
      - min
    properties:
      min:
        type: number
      max:
        type: number
      distribution:
        $ref: "#/definitions/distribution"

  textureShape:
    type: object
    required:
      - shape
    properties:
      shape:
        type: string
        enum: [circle, ellipse, rect]
      radius:
        type: number
      width:
        type: number
      height:
        type: number
      color:
        oneOf:
          - type: string
          - type: number

  textureItem:
    type: object
    properties:
      src:
        type: string
      shape:
        type: string
        enum: [circle, ellipse, rect]
      radius:
        type: number
      width:
        type: number
      height:
        type: number
      color:
        oneOf:
          - type: string
          - type: number
      weight:
        type: number

  textureSelector:
    type: object
    required:
      - mode
      - items
    properties:
      mode:
        type: string
        enum: [single, random, cycle]
      pick:
        type: string
        enum: [perParticle, perWave]
      items:
        type: array
        minItems: 1
        items:
          $ref: "#/definitions/textureItem"
