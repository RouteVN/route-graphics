$schema: http://json-schema.org/draft-07/schema#
title: Container Element
description: Schema for container element raw input
type: object
required:
  - id
  - type
  - x
  - y
properties:
  id:
    type: string
    description: Unique identifier for the container element
  type:
    const: container
    description: Element type, must be 'container'
  width:
    type: number
    description: Width of the container in pixels. If not set, will be calculated from children.
  height:
    type: number
    description: Height of the container in pixels. If not set, will be calculated from children.
  x:
    type: number
    description: X position of the container
  y:
    type: number
    description: Y position of the container
  anchorX:
    type: number
    description: Horizontal anchor point where 0 is left edge, 1 is right edge (100% width). For containers, must be 0, 0.5, or 1.
    default: 0
  anchorY:
    type: number
    description: Vertical anchor point where 0 is top edge, 1 is bottom edge (100% height). For containers, must be 0, 0.5, or 1.
    default: 0
  alpha:
    type: number
    description: Opacity/transparency of the container (0-1)
    minimum: 0
    maximum: 1
    default: 1
  blur:
    type: object
    description: Optional directional Gaussian blur applied to the whole container subtree.
    required:
      - x
      - y
    properties:
      x:
        type: number
        description: Horizontal blur strength in pixels.
        minimum: 0
      y:
        type: number
        description: Vertical blur strength in pixels.
        minimum: 0
      quality:
        type: number
        description: Number of blur passes. Higher values are smoother but slower.
        minimum: 1
        default: 4
      kernelSize:
        type: number
        enum: [5, 7, 9, 11, 13, 15]
        description: Blur kernel size.
        default: 5
      repeatEdgePixels:
        type: boolean
        description: Clamp edge pixels instead of padding the blur bounds.
        default: false
  children:
    type: array
    description: Child elements contained within this container
    items:
      oneOf:
        - $ref: "./sprite.element.yaml"
        - $ref: "./text.element.yaml"
        - $ref: "./rect.element.yaml"
        - $ref: "./container.element.yaml"
    default: []
  direction:
    type: string
    enum: [absolute, horizontal, vertical]
    description: Layout direction for children. Horizontal arranges left-to-right, vertical arranges top-to-bottom.
    default: absolute
  gapX:
    type: number
    description: Horizontal spacing between child elements in pixels, and between wrapped columns.
    default: 0
  gapY:
    type: number
    description: Vertical spacing between child elements in pixels, and between wrapped rows.
    default: 0
  rotation:
    type: number
    description: Rotation in degrees
    default: 0
  scroll:
    type: boolean
    description: Enable scrolling for overflow content. Scroll direction will follow direction property
    default: false
  anchorToBottom:
    type: boolean
    description: When true, automatically scrolls to show bottom/right content instead of top/left. Only applies when scroll is enabled.
    default: false
  scrollbar:
    type: object
    description: Optional custom scrollbar chrome. Currently supports a vertical scrollbar for scroll-enabled containers with vertical overflow.
    properties:
      vertical:
        type: object
        required:
          - thickness
          - track
          - thumb
        properties:
          thickness:
            type: number
            description: Width of the vertical scrollbar lane in pixels.
            minimum: 0
          track:
            type: object
            required:
              - src
            properties:
              src:
                type: string
                description: Source of the base track image.
              hoverSrc:
                type: string
                description: Source of the track image when hovered.
              pressSrc:
                type: string
                description: Source of the track image while pressed.
          thumb:
            type: object
            required:
              - src
            properties:
              src:
                type: string
                description: Source of the base thumb image.
              hoverSrc:
                type: string
                description: Source of the thumb image when hovered.
              pressSrc:
                type: string
                description: Source of the thumb image while pressed or dragged.
              length:
                type: number
                description: Fixed thumb height in pixels. When omitted, the thumb height is computed from viewport/content ratio.
                minimum: 0
          startButton:
            type: object
            required:
              - src
            properties:
              src:
                type: string
                description: Source of the top arrow/button image.
              hoverSrc:
                type: string
                description: Source of the top arrow/button image when hovered.
              pressSrc:
                type: string
                description: Source of the top arrow/button image while pressed.
              size:
                type: number
                description: Height of the top arrow/button in pixels.
                minimum: 0
              step:
                type: number
                description: Scroll step applied when the top arrow/button is pressed.
                minimum: 0
          endButton:
            type: object
            required:
              - src
            properties:
              src:
                type: string
                description: Source of the bottom arrow/button image.
              hoverSrc:
                type: string
                description: Source of the bottom arrow/button image when hovered.
              pressSrc:
                type: string
                description: Source of the bottom arrow/button image while pressed.
              size:
                type: number
                description: Height of the bottom arrow/button in pixels.
                minimum: 0
              step:
                type: number
                description: Scroll step applied when the bottom arrow/button is pressed.
                minimum: 0
  hover:
    type: object
    properties:
      inheritToChildren:
        type: boolean
        description: When true, descendants with hover visuals inherit the container hover state.
        default: false
      soundSrc:
        type: string
        description: source of sound to be played when hovering over the container
      cursor:
        type: string
        description: CSS cursor style when hovering over the container
      payload:
        type: object
        description: Payload for hover action event
  click:
    type: object
    properties:
      inheritToChildren:
        type: boolean
        description: When true, descendants with click visuals inherit the container pressed state.
        default: false
      soundSrc:
        type: string
        description: source of sound to be played when the container is clicked
      soundVolume:
        type: number
        description: Volume. 0 means muted. 100 means original full volume.
        minimum: 0
        maximum: 100
        default: 100
      payload:
        type: object
        description: Payload for click action event
  rightClick:
    type: object
    properties:
      inheritToChildren:
        type: boolean
        description: When true, descendants with right-click visuals inherit the container right-pressed state.
        default: false
      soundSrc:
        type: string
        description: source of sound to be played when the container is right-clicked
      payload:
        type: object
        description: Payload for right-click action event
