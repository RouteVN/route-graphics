$schema: http://json-schema.org/draft-07/schema#
title: Input Element
description: Schema for input element raw input
type: object
$def:
  point:
    type: object
    additionalProperties: false
    required:
      - x
      - y
    properties:
      x:
        type: number
        description: X coordinate
      y:
        type: number
        description: Y coordinate
  stop:
    type: object
    additionalProperties: false
    required:
      - offset
      - color
    properties:
      offset:
        type: number
        minimum: 0
        maximum: 1
        description: Gradient stop offset from 0 to 1
      color:
        type: string
        description: Gradient stop color
  fill:
    oneOf:
      - type: string
        description: Solid fill color. Use "transparent" for a transparent fill.
      - type: object
        additionalProperties: false
        required:
          - type
          - color
        properties:
          type:
            const: solid
            description: Solid fill type
          color:
            type: string
            description: Solid fill color
      - type: object
        additionalProperties: false
        required:
          - type
          - stops
        properties:
          type:
            const: linear-gradient
            description: Linear gradient fill type
          start:
            "$ref": "#/$def/point"
            description: Gradient start point. Defaults to { x: 0, y: 0 } in local normalized coordinates.
          end:
            "$ref": "#/$def/point"
            description: Gradient end point. Defaults to { x: 0, y: 1 } in local normalized coordinates.
          stops:
            type: array
            minItems: 2
            items:
              "$ref": "#/$def/stop"
          coordinateSpace:
            type: string
            enum: [local, global]
            description: Whether gradient coordinates are relative to the input or the world
          textureSize:
            type: number
            description: Gradient texture resolution hint
          wrapMode:
            type: string
            enum: [clamp-to-edge, repeat]
            description: Gradient wrap mode
      - type: object
        additionalProperties: false
        required:
          - type
          - stops
        properties:
          type:
            const: radial-gradient
            description: Radial gradient fill type
          innerCenter:
            "$ref": "#/$def/point"
            description: Inner circle center. Defaults to { x: 0.5, y: 0.5 } in local normalized coordinates.
          innerRadius:
            type: number
            description: Inner circle radius. Defaults to 0.
          outerCenter:
            "$ref": "#/$def/point"
            description: Outer circle center. Defaults to the inner center in local normalized coordinates.
          outerRadius:
            type: number
            description: Outer circle radius. Defaults to 0.5.
          stops:
            type: array
            minItems: 2
            items:
              "$ref": "#/$def/stop"
          coordinateSpace:
            type: string
            enum: [local, global]
            description: Whether gradient coordinates are relative to the input or the world
          textureSize:
            type: number
            description: Gradient texture resolution hint
          wrapMode:
            type: string
            enum: [clamp-to-edge, repeat]
            description: Gradient wrap mode
          scale:
            type: number
            description: Radial gradient ellipse scale
          rotation:
            type: number
            description: Radial gradient rotation in radians
  stroke:
    type: object
    description: Stroke properties
    properties:
      width:
        type: number
        description: Stroke width in pixels
      color:
        type: string
        description: Stroke color
      alpha:
        type: number
        description: Stroke opacity (0-1)
        minimum: 0
        maximum: 1
required:
  - id
  - type
  - x
  - y
  - width
  - height
properties:
  id:
    type: string
    description: Unique identifier for the input element
  type:
    const: input
    description: Element type, must be 'input'
  x:
    type: number
    description: X position of the input
  y:
    type: number
    description: Y position of the input
  width:
    type: number
    description: Width of the input field
  height:
    type: number
    description: Height of the input field
  value:
    type: string
    description: Input value
    default: ""
  placeholder:
    type: string
    description: Placeholder text
    default: ""
  multiline:
    type: boolean
    description: Use a native textarea and render explicit line breaks
    default: false
  submitOnEnter:
    type: boolean
    description: Emit the input submit event when Enter is pressed; when false, Enter is consumed and will not insert multiline line breaks
    default: true
  disabled:
    type: boolean
    description: Disable focus and editing
    default: false
  maxLength:
    type: number
    description: Maximum number of characters
  fill:
    "$ref": "#/$def/fill"
    description: Input field fill. Supports solid colors and structured gradient fills. Defaults to white.
  border:
    "$ref": "#/$def/stroke"
    description: Input border. Uses the same width/color/alpha shape as rect border.
  focusRing:
    "$ref": "#/$def/stroke"
    description: Focus stroke drawn over the border while the input is focused.
  alpha:
    type: number
    description: Opacity/transparency of the input container (0-1)
    minimum: 0
    maximum: 1
    default: 1
  textStyle:
    type: object
    description: Text style for rendered value
  padding:
    description: Inner padding for the input content area
  change:
    type: object
    properties:
      payload:
        type: object
        description: Payload for change event
  submit:
    type: object
    properties:
      payload:
        type: object
        description: Payload for submit event
  focusEvent:
    type: object
    properties:
      payload:
        type: object
        description: Payload for focus event
  blurEvent:
    type: object
    properties:
      payload:
        type: object
        description: Payload for blur event
  selectionChange:
    type: object
    properties:
      payload:
        type: object
        description: Payload for selectionChange event
  compositionStart:
    type: object
    properties:
      payload:
        type: object
        description: Payload for compositionStart event
  compositionUpdate:
    type: object
    properties:
      payload:
        type: object
        description: Payload for compositionUpdate event
  compositionEnd:
    type: object
    properties:
      payload:
        type: object
        description: Payload for compositionEnd event
