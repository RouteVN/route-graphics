$schema: http://json-schema.org/draft-07/schema#
title: Text Element
description: Schema for text element raw input
type: object
required:
  - id
  - type
  - x
  - y
$def:
  textShadow:
    description: Optional text shadow. Use null in a segment style to remove a base shadow.
    oneOf:
      - type: "null"
      - type: object
        properties:
          color:
            type: string
            description: Shadow color
            default: black
          alpha:
            type: number
            description: Shadow opacity (0-1)
            minimum: 0
            maximum: 1
            default: 1
          blur:
            type: number
            description: Shadow blur radius in pixels
            minimum: 0
            default: 0
          offsetX:
            type: number
            description: Horizontal shadow offset in pixels
            default: 2
          offsetY:
            type: number
            description: Vertical shadow offset in pixels
            default: 2
  textStyle:
    type: object
    properties:
      fill:
        type: string
        description: Text color
        default: black
      fontFamily:
        description: Font family or ordered fallback list
        oneOf:
          - type: string
          - type: array
            items:
              type: string
      fontSize:
        type: number
        description: Font size in pixels
        default: 16
      align:
        type: string
        enum: [left, center, right]
        default: left
        description: Text alignment
      lineHeight:
        type: number
        description: Line height in pixels
        default: 1.2
      wordWrap:
        type: boolean
        description: Enable word wrapping
        default: true
      breakWords:
        type: boolean
        description: Allow breaking words when wrapping
        default: true
      strokeColor:
        type: string
        description: Text stroke/outline color
      strokeWidth:
        type: number
        description: Text stroke/outline width
      padding:
        type: number
        minimum: 0
        description: Extra texture padding around rendered glyphs, useful for fonts with overhanging glyph bounds.
      shadow:
        "$ref": "#/$def/textShadow"
  softWipe:
    type: object
    description: Parameters for the softWipe reveal effect.
    properties:
      softness:
        type: number
        minimum: 0
        description: Multiplier applied to line height to determine the feathered edge width.
        default: 1.25
      easing:
        type: string
        enum: [linear,easeOutCubic]
        description: Easing curve applied to each line wipe.
        default: linear
      lineOverlap:
        type: number
        minimum: 0
        maximum: 0.95
        description: Fraction of a line's duration that the next line may overlap.
        default: 0
      lineDelay:
        type: number
        minimum: 0
        description: Delay in milliseconds before the next line starts after overlap is applied.
        default: 0
  indicatorVisual:
    type: object
    description: Indicator visual. Use `kind: image` for a static texture or `kind: spritesheet` for frame animation.
    properties:
      kind:
        type: string
        enum: [image, spritesheet]
        default: image
        description: Visual kind. If omitted, image is used unless spritesheet fields are present.
      src:
        type: string
        description: Source alias or URL for the image or spritesheet texture
      width:
        type: number
        description: Display width of the indicator visual
        default: 12
      height:
        type: number
        description: Display height of the indicator visual
        default: 12
      offsetX:
        type: number
        description: Horizontal offset for this indicator visual. Falls back to indicator.offsetX, then 16.
      offsetY:
        type: number
        description: Vertical offset for this indicator visual. Falls back to indicator.offsetY, then 0.
      atlas:
        type: object
        description: Spritesheet atlas metadata when `kind` is `spritesheet`; uses the same shape as `spritesheet-animation.atlas`.
      clips:
        type: object
        description: Named frame sequences when `kind` is `spritesheet`.
        additionalProperties:
          type: array
          items:
            type: string
      playback:
        type: object
        description: Playback configuration when `kind` is `spritesheet`.
        properties:
          clip:
            type: string
            description: Named clip to play from `clips` or `atlas.animations`
          frames:
            type: array
            items:
              type: string
            description: Ordered frame names for playback
          fps:
            type: number
            minimum: 0.1
            default: 30
          loop:
            type: boolean
            default: true
          autoplay:
            type: boolean
            default: true
properties:
  id:
    type: string
    description: Unique identifier for the text element
  type:
    const: text-revealing
    description: Element type, must be 'text-revealing'
  content:
    type: array
    description: The text content to display. It is an array so we can support multiple rich text in different styles.
    items:
      type: object
      required:
        - text
      properties:
        text:
          type: string
        textStyle:
          # if not present, it will default to the root textStyle
          "$ref": "#/$def/textStyle"
        furigana:
          type: object
          properties:
            text:
              type: string
            textStyle:
              "$ref": "#/$def/textStyle"
            placement:
              type: string
              enum: [top, bottom]
              default: top
              description: Side of the base text where furigana is placed. Currently supports top and bottom; the side-based name leaves room for future left/right support without changing the spacing API.
            gap:
              type: number
              minimum: 0
              default: 0
              description: Additional distance in pixels between the furigana and base text along the placement axis. Positive values move furigana farther from the base text.
  width:
    type: number
    description: Width constraint for text wrapping. When set, enables word wrap.
  x:
    type: number
    description: X position of the text
  y:
    type: number
    description: Y position of the text
  anchorX:
    type: number
    description: Horizontal anchor point where 0 is left edge, 1 is right edge (100% width). Values can extend beyond 0-1 range.
    default: 0
  anchorY:
    type: number
    description: Vertical anchor point where 0 is top edge, 1 is bottom edge (100% height). Values can extend beyond 0-1 range.
    default: 0
  alpha:
    type: number
    description: Opacity/transparency of the text (0-1)
    minimum: 0
    maximum: 1
    default: 1
  indicator:
    type: object
    description: Settings for the text continuation indicator
    properties:
      revealing:
        "$ref": "#/$def/indicatorVisual"
      complete:
        "$ref": "#/$def/indicatorVisual"
      offsetX:
        type: number
        description: Default horizontal offset between the text and the indicator when a visual does not provide offsetX
        default: 16
      offsetY:
        type: number
        description: Default vertical adjustment from the indicator's automatic line placement when a visual does not provide offsetY; positive values move down
        default: 0
  speed:
    type: number
    description: Animation speed on a curved 0-100 scale; 100 renders instantly
    default: 50
  initialRevealedCharacters:
    type: number
    minimum: 0
    description: Number of leading text characters to render as already revealed before the reveal animation starts.
    default: 0
  revealEffect:
    type: string
    enum: [typewriter,softWipe,none]
    description: Text animation.
    default: typewriter
  softWipe:
    "$ref": "#/$def/softWipe"
  revealSound:
    type: object
    description: Sound to play while text is actively revealing.
    required:
      - src
    properties:
      src:
        type: string
        description: Source alias or URL for the reveal sound
      volume:
        type: number
        description: Volume. 0 means muted. 100 means original full volume.
        default: 100
        minimum: 0
        maximum: 100
      loop:
        type: boolean
        description: Whether the reveal sound loops until the reveal finishes
        default: true
      stopTiming:
        type: string
        enum: [loopEnd, immediate]
        description: When to stop the reveal sound after the text reveal completes. loopEnd finishes the active loop iteration; immediate interrupts playback. Abort, update, and deletion always stop immediately.
        default: loopEnd
  textStyle:
    "$ref": "#/$def/textStyle"
  complete:
    type: object
    properties:
      payload:
        type: object
        description: Payload for complete action event
