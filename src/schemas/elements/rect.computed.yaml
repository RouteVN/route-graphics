$schema: http://json-schema.org/draft-07/schema#
title: Rect Computed Node
description: Schema for rectangle computed node after parsing
type: object
$def:
  point:
    type: object
    additionalProperties: false
    required:
      - x
      - y
    properties:
      x:
        type: number
        description: X coordinate
      y:
        type: number
        description: Y coordinate
  stop:
    type: object
    additionalProperties: false
    required:
      - offset
      - color
    properties:
      offset:
        type: number
        minimum: 0
        maximum: 1
        description: Gradient stop offset from 0 to 1
      color:
        type: string
        description: Gradient stop color
  fill:
    oneOf:
      - type: string
        description: Solid fill color. Use "transparent" for a transparent fill.
      - type: object
        additionalProperties: false
        required:
          - type
          - color
        properties:
          type:
            const: solid
          color:
            type: string
      - type: object
        additionalProperties: false
        required:
          - type
          - stops
        properties:
          type:
            const: linear-gradient
          start:
            "$ref": "#/$def/point"
          end:
            "$ref": "#/$def/point"
          stops:
            type: array
            minItems: 2
            items:
              "$ref": "#/$def/stop"
          coordinateSpace:
            type: string
            enum: [local, global]
          textureSize:
            type: number
          wrapMode:
            type: string
            enum: [clamp-to-edge, repeat]
      - type: object
        additionalProperties: false
        required:
          - type
          - stops
        properties:
          type:
            const: radial-gradient
          innerCenter:
            "$ref": "#/$def/point"
          innerRadius:
            type: number
          outerCenter:
            "$ref": "#/$def/point"
          outerRadius:
            type: number
          stops:
            type: array
            minItems: 2
            items:
              "$ref": "#/$def/stop"
          coordinateSpace:
            type: string
            enum: [local, global]
          textureSize:
            type: number
          wrapMode:
            type: string
            enum: [clamp-to-edge, repeat]
          scale:
            type: number
          rotation:
            type: number
required:
  - id
  - type
  - width
  - height
  - x
  - y
  - originX
  - originY
properties:
  id:
    type: string
    description: Unique identifier for the rect element
  type:
    const: rect
    description: Element type, must be 'rect'
  width:
    type: number
    description: Width of the rectangle after scale is applied
  height:
    type: number
    description: Height of the rectangle after scale is applied
  x:
    type: number
    description: X position adjusted for anchor point
  y:
    type: number
    description: Y position adjusted for anchor point
  originX:
    type: number
    description: Calculated origin X coordinate based on anchor
  originY:
    type: number
    description: Calculated origin Y coordinate based on anchor
  fill:
    "$ref": "#/$def/fill"
    description: Optional fill of the rectangle. Supports solid colors and structured gradient fills. When omitted, the rect renders transparent.
  border:
    type: object
    description: Border properties
    properties:
      width:
        type: number
        description: Border width in pixels
      color:
        type: string
        description: Border color
      alpha:
        type: number
        description: Border opacity (0-1)
        minimum: 0
        maximum: 1
  rotation:
    type: number
    description: Rotation in degrees
    default: 0
  hover:
    type: object
    properties:
      soundSrc:
        type: string
        description: source of sound to be played when hovering over the sprite
      cursor:
        type: string
        description: CSS cursor style when hovering over the sprite
      payload:
        type: object
        description: Payload for hover action event
  click:
    type: object
    properties:
      soundSrc:
        type: string
        description: source of sound to be played when the sprite is clicked
      soundVolume:
        type: number
        description: Volume. 0 means muted. 1000 means original full volume.
        minimum: 0
        maximum: 1000
        default: 1000
      payload:
        type: object
        description: Payload for click action event
  drag:
    type: object
    properties:
      start:
        payload:
          type: object
          description: Payload for click action event
      end:
        payload:
          type: object
          description: Payload for click action event
      move:
        payload:
          type: object
          description: Payload for click action event
  rightClick:
    type: object
    properties:
      soundSrc:
        type: string
        description: source of sound to be played when the rect is right-clicked
      payload:
        type: object
        description: Payload for right-click action event
  scrollUp:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll up action event
  scrollDown:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll down action event
