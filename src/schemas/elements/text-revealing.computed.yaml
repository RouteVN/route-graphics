$schema: http://json-schema.org/draft-07/schema#
title: Text Revealing Computed Node
description: Schema for text revealing computed node after parsing
type: object
$def:
  textShadow:
    description: Optional text shadow. Null removes a base shadow in resolved segment styles.
    oneOf:
      - type: "null"
      - type: object
        properties:
          color:
            type: string
            description: Shadow color
            default: black
          alpha:
            type: number
            description: Shadow opacity (0-1)
            minimum: 0
            maximum: 1
            default: 1
          blur:
            type: number
            description: Shadow blur radius in pixels
            minimum: 0
            default: 0
          offsetX:
            type: number
            description: Horizontal shadow offset in pixels
            default: 2
          offsetY:
            type: number
            description: Vertical shadow offset in pixels
            default: 2
  textStyle:
    type: object
    properties:
      fill:
        type: string
        description: Text color
        default: black
      fontFamily:
        type: string
        description: Font family
      fontSize:
        type: number
        description: Font size in pixels
        default: 16
      align:
        type: string
        enum: [left, center, right]
        default: left
        description: Text alignment
      lineHeight:
        type: number
        description: Line height in pixels
        default: 1.2
      wordWrap:
        type: boolean
        description: Enable word wrapping
        default: true
      breakWords:
        type: boolean
        description: Allow breaking words when wrapping
        default: true
      strokeColor:
        type: string
        description: Text stroke/outline color
      strokeWidth:
        type: number
        description: Text stroke/outline width
      padding:
        type: number
        minimum: 0
        description: Extra texture padding around rendered glyphs, useful for fonts with overhanging glyph bounds.
      shadow:
        "$ref": "#/$def/textShadow"
  softWipe:
    type: object
    description: Parameters for the softWipe reveal effect.
    properties:
      softness:
        type: number
        minimum: 0
        description: Multiplier applied to line height to determine the feathered edge width.
        default: 1.25
      easing:
        type: string
        enum: [linear,easeOutCubic]
        description: Easing curve applied to each line wipe.
        default: linear
      lineOverlap:
        type: number
        minimum: 0
        maximum: 0.95
        description: Fraction of a line's duration that the next line may overlap.
        default: 0
      lineDelay:
        type: number
        minimum: 0
        description: Delay in milliseconds before the next line starts after overlap is applied.
        default: 0
  indicatorVisual:
    type: object
    description: Indicator visual. Use `kind: image` for a static texture or `kind: spritesheet` for frame animation.
    properties:
      kind:
        type: string
        enum: [image, spritesheet]
        default: image
        description: Visual kind. If omitted, image is used unless spritesheet fields are present.
      src:
        type: string
        description: Source alias or URL for the image or spritesheet texture
      width:
        type: number
        description: Display width of the indicator visual
        default: 12
      height:
        type: number
        description: Display height of the indicator visual
        default: 12
      offsetX:
        type: number
        description: Horizontal offset for this indicator visual. Falls back to indicator.offsetX, then 16.
      offsetY:
        type: number
        description: Vertical offset for this indicator visual. Falls back to indicator.offsetY, then 0.
      atlas:
        type: object
        description: Spritesheet atlas metadata when `kind` is `spritesheet`; uses the same shape as `spritesheet-animation.atlas`.
      clips:
        type: object
        description: Named frame sequences when `kind` is `spritesheet`.
        additionalProperties:
          type: array
          items:
            type: string
      playback:
        type: object
        description: Playback configuration when `kind` is `spritesheet`.
        properties:
          clip:
            type: string
            description: Named clip to play from `clips` or `atlas.animations`
          frames:
            type: array
            items:
              type: string
            description: Ordered frame names for playback
          fps:
            type: number
            minimum: 0.1
            default: 30
          loop:
            type: boolean
            default: true
          autoplay:
            type: boolean
            default: true
required:
  - id
  - type
  - content
  - x
  - y
  - originX
  - originY
  - alpha
  - textStyle
properties:
  id:
    type: string
    description: Unique identifier for the text element
  type:
    const: text-revealing
    description: Element type, must be 'text-revealing'
  content:
    type: array
    description: The text content to display. It is an array so we can support multiple rich text in different styles.
    items:
      type: object
      properties:
        y:
          type: number
          description: Y position of the line
        lineParts:
          type: array
          description: Array of text and furigana parts in this line
          items:
            type: object
            properties:
              text: 
                type: string
                description: The text content
              textStyle: 
                "$ref": "#/$def/textStyle"
              x:
                type: number
                description: Horizontal position
              y:
                type: number
                description: Vertical position
              furigana:
                type: object
                properties:
                  text:
                    type: string
                  textStyle:
                    "$ref": "#/$def/textStyle"
                  x:
                    type: number
                    description: Horizontal position relative to the parent text part
                  y:
                    type: number
                    description: Vertical position relative to the parent text part
        lineMaxHeight:
          type: number
          description: Maximum height of text in this line
  width:
    type: number
    description: Width constraint for text wrapping. When set, enables word wrap.
  x:
    type: number
    description: X position adjusted for anchor point
  y:
    type: number
    description: Y position adjusted for anchor point
  originX:
    type: number
    description: Calculated origin X coordinate based on anchor
  originY:
    type: number
    description: Calculated origin Y coordinate based on anchor
  alpha:
    type: number
    description: Opacity/transparency of the text (0-1)
    minimum: 0
    maximum: 1
  indicator:
    type: object
    description: Settings for the text continuation indicator
    properties:
      revealing:
        "$ref": "#/$def/indicatorVisual"
      complete:
        "$ref": "#/$def/indicatorVisual"
      offsetX:
        type: number
        description: Default horizontal offset between the text and the indicator when a visual does not provide offsetX
        default: 16
      offsetY:
        type: number
        description: Default vertical adjustment from the indicator's automatic line placement when a visual does not provide offsetY; positive values move down
        default: 0
  textStyle:
    "$ref": "#/$def/textStyle"
  speed:
    type: number
    description: Animation speed on a curved 0-100 scale; 100 renders instantly
    default: 50
  initialRevealedCharacters:
    type: number
    minimum: 0
    description: Number of leading text characters rendered as already revealed before the reveal animation starts.
    default: 0
  revealEffect:
    type: string
    enum: [typewriter,softWipe,none]
    description: Text animation.
    default: typewriter
  softWipe:
    "$ref": "#/$def/softWipe"
