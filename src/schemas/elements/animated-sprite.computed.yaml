$schema: http://json-schema.org/draft-07/schema#
title: Spritesheet Animation Computed Node
description: Schema for spritesheet animation computed node after parsing
type: object
required:
  - id
  - type
  - width
  - height
  - x
  - y
  - originX
  - originY
  - src
  - atlas
  - clips
  - playback
  - alpha
properties:
  id:
    type: string
    description: Unique identifier for the spritesheet animation element
  type:
    const: spritesheet-animation
    description: Element type, must be 'spritesheet-animation'
  width:
    type: number
    description: Width of the spritesheet animation after scale is applied
  height:
    type: number
    description: Height of the spritesheet animation after scale is applied
  x:
    type: number
    description: X position adjusted for anchor point
  y:
    type: number
    description: Y position adjusted for anchor point
  originX:
    type: number
    description: Calculated origin X coordinate based on anchor
  originY:
    type: number
    description: Calculated origin Y coordinate based on anchor
  src:
    type: string
    description: Alias or URL of the spritesheet image asset
  atlas:
    type: object
    description: Normalized atlas metadata used by the renderer
    properties:
      frames:
        type: object
        description: Frame definitions with normalized Pixi-compatible frame data
        additionalProperties:
          type: object
          properties:
            frame:
              type: object
              properties:
                x:
                  type: number
                y:
                  type: number
                w:
                  type: number
                h:
                  type: number
            rotated:
              type: boolean
            trimmed:
              type: boolean
            spriteSourceSize:
              type: object
              properties:
                x:
                  type: number
                y:
                  type: number
                w:
                  type: number
                h:
                  type: number
            sourceSize:
              type: object
              properties:
                w:
                  type: number
                h:
                  type: number
            anchor:
              type: object
              properties:
                x:
                  type: number
                y:
                  type: number
            borders:
              type: object
      animations:
        type: object
        description: Named clip data normalized from atlas JSON when present
        additionalProperties:
          type: array
          items:
            type: string
      meta:
        type: object
        properties:
          format:
            type: string
          size:
            type: object
            properties:
              w:
                type: number
              h:
                type: number
          scale:
            type: string
  clips:
    type: object
    description: Named frame sequences for playback
    additionalProperties:
      type: array
      items:
        type: string
  playback:
    type: object
    properties:
      clip:
        type: string
        description: Selected clip name when playback is clip-based
      frames:
        type: array
        items:
          type: string
        description: Ordered frame names for the playback sequence
      fps:
        type: number
        description: Playback rate in frames per second
      loop:
        type: boolean
        description: Whether the animation should loop
      autoplay:
        type: boolean
        description: Whether playback starts automatically when mounted
  alpha:
    type: number
    description: Opacity/transparency of the spritesheet animation (0-1)
    minimum: 0
    maximum: 1
