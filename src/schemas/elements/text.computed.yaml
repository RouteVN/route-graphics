$schema: http://json-schema.org/draft-07/schema#
title: Text Computed Node
description: Schema for text computed node after parsing
type: object
$def:
  textShadow:
    description: Optional text shadow. Null removes a base shadow in resolved interaction styles.
    oneOf:
      - type: "null"
      - type: object
        properties:
          color:
            type: string
            description: Shadow color
            default: black
          alpha:
            type: number
            description: Shadow opacity (0-1)
            minimum: 0
            maximum: 1
            default: 1
          blur:
            type: number
            description: Shadow blur radius in pixels
            minimum: 0
            default: 0
          offsetX:
            type: number
            description: Horizontal shadow offset in pixels
            default: 2
          offsetY:
            type: number
            description: Vertical shadow offset in pixels
            default: 2
  textStyle:
    type: object
    properties:
      fill:
        type: string
        description: Text color
        default: black
      fontFamily:
        description: Font family or ordered fallback list
        oneOf:
          - type: string
            minLength: 1
          - type: array
            minItems: 1
            uniqueItems: true
            items:
              type: string
              minLength: 1
      fontSize:
        type: number
        description: Font size in pixels
        default: 16
      align:
        type: string
        enum: [left, center, right]
        default: left
        description: Text alignment
      lineHeight:
        type: number
        description: Line height in pixels
        default: 1.2
      wordWrap:
        type: boolean
        description: Enable word wrapping
        default: true
      wordWrapWidth:
        type: number
        description: Word wrap width
      breakWords:
        type: boolean
        description: Allow breaking words when wrapping
        default: true
      strokeColor:
        type: string
        description: Text stroke/outline color
      strokeWidth:
        type: number
        description: Text stroke/outline width
      padding:
        type: number
        minimum: 0
        description: Extra texture padding around rendered glyphs, useful for fonts with overhanging glyph bounds.
      shadow:
        "$ref": "#/$def/textShadow"
  textChunk:
    type: object
    properties:
      y:
        type: number
        description: Y position of the line
      lineParts:
        type: array
        description: Array of rich text parts in this line
        items:
          type: object
          properties:
            text:
              type: string
              description: The text content
            textStyle:
              "$ref": "#/$def/textStyle"
            x:
              type: number
              description: Horizontal position
            y:
              type: number
              description: Vertical position
            furigana:
              type: object
              properties:
                text:
                  type: string
                textStyle:
                  "$ref": "#/$def/textStyle"
                x:
                  type: number
                  description: Horizontal position relative to the parent text part
                y:
                  type: number
                  description: Vertical position relative to the parent text part
      lineMaxHeight:
        type: number
        description: Maximum height of text in this line
required:
  - id
  - type
  - content
  - width
  - measuredWidth
  - height
  - x
  - y
  - originX
  - originY
  - textStyle
properties:
  id:
    type: string
    description: Unique identifier for the text element
  type:
    const: text
    description: Element type, must be 'text'
  content:
    oneOf:
      - type: string
      - type: array
        items:
          "$ref": "#/$def/textChunk"
    description: The text content to display. String content stays a single text object; array content is parsed into rich text lines.
  width:
    type: number
    description: Layout width of the text box. When input width is provided, this matches that fixed width.
  measuredWidth:
    type: number
    description: Rendered text width based on content and style before fixed-width layout is applied
  height:
    type: number
    description: Calculated height of the text based on content and style
  x:
    type: number
    description: X position adjusted for anchor point
  y:
    type: number
    description: Y position adjusted for anchor point
  alpha:
    type: number
    description: Opacity/transparency of the text (0-1)
    minimum: 0
    maximum: 1
    default: 1
  originX:
    type: number
    description: Calculated origin X coordinate based on anchor
  originY:
    type: number
    description: Calculated origin Y coordinate based on anchor
  textStyle:
    "$ref": "#/$def/textStyle"
  hover:
    type: object
    properties:
      textStyle:
        "$ref": "#/$def/textStyle"
      cursor:
        type: string
        description: CSS cursor style when hovering
      soundSrc:
        type: string
        description: URL to sound file to play on hover
      soundVolume:
        type: number
        description: Volume. 0 means muted. 100 means original full volume.
        minimum: 0
        maximum: 100
        default: 100
      payload:
        type: object
        description: Payload for hover action event
  click:
    type: object
    properties:
      textStyle:
        "$ref": "#/$def/textStyle"
      soundSrc:
        type: string
        description: URL to sound file to play on click
      soundVolume:
        type: number
        description: Volume. 0 means muted. 100 means original full volume.
        minimum: 0
        maximum: 100
        default: 100
      payload:
        type: object
        description: Payload for click action event
  rightClick:
    type: object
    properties:
      textStyle:
        "$ref": "#/$def/textStyle"
      soundSrc:
        type: string
        description: URL to sound file to play on right-click
      payload:
        type: object
        description: Payload for right-click action event
  scrollUp:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll up action event
  scrollDown:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll down action event
events:
  type: object
  description: Events emitted by this element
  properties:
    click:
      type: object
      description: This event type is called "click" and will be invoked when the pointer is released on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was clicked
    hover:
      type: object
      description: This event type is called "hover" and will be invoked when the pointer is hover on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was hovered
    rightClick:
      type: object
      description: This event type is called "rightClick" and will be invoked when the right mouse button is clicked on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was right-clicked
    scrollUp:
      type: object
      description: This event type is called "scrollUp" and will be invoked when scrolling up on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was scrolled up on
    scrollDown:
      type: object
      description: This event type is called "scrollDown" and will be invoked when scrolling down on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was scrolled down on
