$schema: http://json-schema.org/draft-07/schema#
title: Sprite Computed Node
description: Schema for sprite computed node after parsing
type: object
required:
  - id
  - type
  - width
  - height
  - x
  - y
  - originX
  - originY
  - src
  - alpha
properties:
  id:
    type: string
    description: Unique identifier for the sprite element
  type:
    const: sprite
    description: Element type, must be 'sprite'
  width:
    type: number
    description: Width of the sprite after scale is applied
  height:
    type: number
    description: Height of the sprite after scale is applied
  x:
    type: number
    description: X position adjusted for anchor point
  y:
    type: number
    description: Y position adjusted for anchor point
  originX:
    type: number
    description: Calculated origin X coordinate based on anchor
  originY:
    type: number
    description: Calculated origin Y coordinate based on anchor
  src:
    type: string
    description: URL of the sprite image
  alpha:
    type: number
    description: Opacity/transparency of the sprite (0-1)
    minimum: 0
    maximum: 1
  rotation:
    type: number
    description: Rotation in degrees
    default: 0
  blur:
    type: object
    description: Directional Gaussian blur configuration.
    required:
      - x
      - y
      - quality
      - kernelSize
      - repeatEdgePixels
    properties:
      x:
        type: number
        minimum: 0
      y:
        type: number
        minimum: 0
      quality:
        type: number
        minimum: 1
      kernelSize:
        type: number
        enum: [5, 7, 9, 11, 13, 15]
      repeatEdgePixels:
        type: boolean
  hover:
    type: object
    properties:
      src:
        type: string
        description: source of the sprite image when hovered
      soundSrc:
        type: string
        description: source of sound to be played when hovering over the sprite
      cursor:
        type: string
        description: CSS cursor style when hovering over the sprite
      payload:
        type: object
        description: Payload for hover action event
  click:
    type: object
    properties:
      src:
        type: string
        description: src of the sprite image when clicked
      soundSrc:
        type: string
        description: source of sound to be played when the sprite is clicked
      soundVolume:
        type: number
        description: Volume. 0 means muted. 100 means original full volume.
        minimum: 0
        maximum: 100
        default: 100
      payload:
        type: object
        description: Payload for click action event
  rightClick:
    type: object
    properties:
      src:
        type: string
        description: src of the sprite image when right-clicked
      soundSrc:
        type: string
        description: source of sound to be played when the sprite is right-clicked
      payload:
        type: object
        description: Payload for right-click action event
  scrollUp:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll up action event
  scrollDown:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll down action event
events:
  type: object
  description: Events emitted by this element
  properties:
    click:
      type: object
      description: This event type is called "click" and will be invoked when the pointer is released on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was clicked
    hover:
      type: object
      description: This event type is called "hover" and will be invoked when the pointer is hover on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was hovered
    rightClick:
      type: object
      description: This event type is called "rightClick" and will be invoked when the right mouse button is clicked on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was right-clicked
    scrollUp:
      type: object
      description: This event type is called "scrollUp" and will be invoked when scrolling up on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was scrolled up on
    scrollDown:
      type: object
      description: This event type is called "scrollDown" and will be invoked when scrolling down on an element.
      properties:
        _event:
          type: object
          properties:
            id:
              type: string
              description: The ID of the element that was scrolled down on
