$schema: http://json-schema.org/draft-07/schema#
title: Sprite Element
description: Schema for sprite element raw input
type: object
required:
  - id
  - type
  - x
  - y
  - width
  - height
properties:
  id:
    type: string
    description: Unique identifier for the sprite element
  type:
    type: string
    const: sprite
    description: Element type, must be 'sprite'
  x:
    type: number
    description: X position of the sprite
  y:
    type: number
    description: Y position of the sprite
  width:
    type: number
    description: Width of the sprite in pixels
  height:
    type: number
    description: Height of the sprite in pixels
  anchorX:
    type: number
    description: Horizontal anchor point where 0 is left edge, 1 is right edge (100% width). Values can extend beyond 0-1 range.
    default: 0
  anchorY:
    type: number
    description: Vertical anchor point where 0 is top edge, 1 is bottom edge (100% height). Values can extend beyond 0-1 range.
    default: 0
  src:
    type: string
    description: src of the sprite image. the alias of the pre loaded asset. can be empty
  alpha:
    type: number
    description: Opacity/transparency of the sprite (0-1)
    minimum: 0
    maximum: 1
    default: 1
  blur:
    type: object
    description: Optional directional Gaussian blur.
    required:
      - x
      - y
    properties:
      x:
        type: number
        description: Horizontal blur strength in pixels.
        minimum: 0
      y:
        type: number
        description: Vertical blur strength in pixels.
        minimum: 0
      quality:
        type: number
        description: Number of blur passes. Higher values are smoother but slower.
        minimum: 1
        default: 4
      kernelSize:
        type: number
        enum: [5, 7, 9, 11, 13, 15]
        description: Blur kernel size.
        default: 5
      repeatEdgePixels:
        type: boolean
        description: Clamp edge pixels instead of padding the blur bounds.
        default: false
  hover:
    type: object
    properties:
      src:
        type: string
        description: source of the sprite image when hovered
      soundSrc:
        type: string
        description: source of sound to be played when hovering over the sprite
      cursor:
        type: string
        description: CSS cursor style when hovering over the sprite
      payload:
        type: object
        description: Payload for hover action event
  click:
    type: object
    properties:
      src:
        type: string
        description: src of the sprite image when clicked
      soundSrc:
        type: string
        description: source of sound to be played when the sprite is clicked
      soundVolume:
        type: number
        description: Volume. 0 means muted. 100 means original full volume.
        minimum: 0
        maximum: 100
        default: 100
      payload:
        type: object
        description: Payload for click action event
  rightClick:
    type: object
    properties:
      src:
        type: string
        description: src of the sprite image when right-clicked
      soundSrc:
        type: string
        description: source of sound to be played when the sprite is right-clicked
      payload:
        type: object
        description: Payload for right-click action event
