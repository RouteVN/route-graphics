$schema: http://json-schema.org/draft-07/schema#
title: Container Computed Node
description: Schema for container computed node after parsing
type: object
required:
  - id
  - type
  - width
  - height
  - x
  - y
  - originX
  - originY
  - children
  - direction
  - gapX
  - gapY
  - scroll
  - rotation
properties:
  id:
    type: string
    description: Unique identifier for the container element
  type:
    const: container
    description: Element type, must be 'container'
  width:
    type: number
    description: Width of the container (calculated from children if not provided)
  height:
    type: number
    description: Height of the container (calculated from children if not provided)
  x:
    type: number
    description: X position adjusted for anchor point
  y:
    type: number
    description: Y position adjusted for anchor point
  originX:
    type: number
    description: Calculated origin X coordinate based on anchor
  originY:
    type: number
    description: Calculated origin Y coordinate based on anchor
  children:
    type: array
    description: Parsed child elements with positions adjusted based on direction, gapX, and gapY
    items:
      oneOf:
        - $ref: "./sprite.computed.yaml"
        - $ref: "./text.computed.yaml"
        - $ref: "./rect.computed.yaml"
        - $ref: "./container.computed.yaml"
  direction:
    type: string
    enum: [absolute, horizontal, vertical]
    description: Layout direction for children. Absolute preserves child x/y, horizontal arranges left-to-right, vertical arranges top-to-bottom.
    default: absolute
  alpha:
    type: number
    description: Opacity/transparency of the container (0-1)
    minimum: 0
    maximum: 1
    default: 1
  blur:
    type: object
    description: Directional Gaussian blur applied to the whole container subtree.
    required:
      - x
      - y
      - quality
      - kernelSize
      - repeatEdgePixels
    properties:
      x:
        type: number
        minimum: 0
      y:
        type: number
        minimum: 0
      quality:
        type: number
        minimum: 1
      kernelSize:
        type: number
        enum: [5, 7, 9, 11, 13, 15]
      repeatEdgePixels:
        type: boolean
  gapX:
    type: number
    description: Horizontal spacing between child elements in pixels, and between wrapped columns.
    default: 0
  gapY:
    type: number
    description: Vertical spacing between child elements in pixels, and between wrapped rows.
    default: 0
  scroll:
    type: boolean
    description: Enable scrolling for overflow content. Scroll direction will follow direction property
  anchorToBottom:
    type: boolean
    description: When true, automatically scrolls to show bottom/right content instead of top/left. Only applies when scroll is enabled.
  scrollbar:
    type: object
    description: Optional custom scrollbar chrome. Currently supports a vertical scrollbar for scroll-enabled containers with vertical overflow.
    properties:
      vertical:
        type: object
        properties:
          thickness:
            type: number
            description: Width of the vertical scrollbar lane in pixels.
          track:
            type: object
            properties:
              src:
                type: string
              hoverSrc:
                type: string
              pressSrc:
                type: string
          thumb:
            type: object
            properties:
              src:
                type: string
              hoverSrc:
                type: string
              pressSrc:
                type: string
              length:
                type: number
          startButton:
            type: object
            properties:
              src:
                type: string
              hoverSrc:
                type: string
              pressSrc:
                type: string
              size:
                type: number
              step:
                type: number
          endButton:
            type: object
            properties:
              src:
                type: string
              hoverSrc:
                type: string
              pressSrc:
                type: string
              size:
                type: number
              step:
                type: number
  rotation:
    type: number
    description: Rotation in degrees
  hover:
    type: object
    properties:
      inheritToChildren:
        type: boolean
        description: When true, descendants with hover visuals inherit the container hover state.
        default: false
      soundSrc:
        type: string
        description: source of sound to be played when hovering over the container
      cursor:
        type: string
        description: CSS cursor style when hovering over the container
      payload:
        type: object
        description: Payload for hover action event
  click:
    type: object
    properties:
      inheritToChildren:
        type: boolean
        description: When true, descendants with click visuals inherit the container pressed state.
        default: false
      soundSrc:
        type: string
        description: source of sound to be played when the container is clicked
      soundVolume:
        type: number
        description: Volume. 0 means muted. 100 means original full volume.
        minimum: 0
        maximum: 100
        default: 100
      payload:
        type: object
        description: Payload for click action event
  rightClick:
    type: object
    properties:
      inheritToChildren:
        type: boolean
        description: When true, descendants with right-click visuals inherit the container right-pressed state.
        default: false
      soundSrc:
        type: string
        description: source of sound to be played when the container is right-clicked
      payload:
        type: object
        description: Payload for right-click action event
