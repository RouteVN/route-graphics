$schema: http://json-schema.org/draft-07/schema#
title: Rect Element
description: Schema for rectangle element raw input
type: object
$def:
  point:
    type: object
    additionalProperties: false
    required:
      - x
      - y
    properties:
      x:
        type: number
        description: X coordinate
      y:
        type: number
        description: Y coordinate
  stop:
    type: object
    additionalProperties: false
    required:
      - offset
      - color
    properties:
      offset:
        type: number
        minimum: 0
        maximum: 1
        description: Gradient stop offset from 0 to 1
      color:
        type: string
        description: Gradient stop color
  fill:
    oneOf:
      - type: string
        description: Solid fill color. Use "transparent" for a transparent fill.
      - type: object
        additionalProperties: false
        required:
          - type
          - color
        properties:
          type:
            const: solid
            description: Solid fill type
          color:
            type: string
            description: Solid fill color
      - type: object
        additionalProperties: false
        required:
          - type
          - stops
        properties:
          type:
            const: linear-gradient
            description: Linear gradient fill type
          start:
            "$ref": "#/$def/point"
            description: Gradient start point. Defaults to { x: 0, y: 0 } in local normalized coordinates.
          end:
            "$ref": "#/$def/point"
            description: Gradient end point. Defaults to { x: 0, y: 1 } in local normalized coordinates.
          stops:
            type: array
            minItems: 2
            items:
              "$ref": "#/$def/stop"
          coordinateSpace:
            type: string
            enum: [local, global]
            description: Whether gradient coordinates are relative to the rect or the world
          textureSize:
            type: number
            description: Gradient texture resolution hint
          wrapMode:
            type: string
            enum: [clamp-to-edge, repeat]
            description: Gradient wrap mode
      - type: object
        additionalProperties: false
        required:
          - type
          - stops
        properties:
          type:
            const: radial-gradient
            description: Radial gradient fill type
          innerCenter:
            "$ref": "#/$def/point"
            description: Inner circle center. Defaults to { x: 0.5, y: 0.5 } in local normalized coordinates.
          innerRadius:
            type: number
            description: Inner circle radius. Defaults to 0.
          outerCenter:
            "$ref": "#/$def/point"
            description: Outer circle center. Defaults to the inner center in local normalized coordinates.
          outerRadius:
            type: number
            description: Outer circle radius. Defaults to 0.5.
          stops:
            type: array
            minItems: 2
            items:
              "$ref": "#/$def/stop"
          coordinateSpace:
            type: string
            enum: [local, global]
            description: Whether gradient coordinates are relative to the rect or the world
          textureSize:
            type: number
            description: Gradient texture resolution hint
          wrapMode:
            type: string
            enum: [clamp-to-edge, repeat]
            description: Gradient wrap mode
          scale:
            type: number
            description: Radial gradient ellipse scale
          rotation:
            type: number
            description: Radial gradient rotation in radians
required:
  - id
  - type
  - width
  - height
properties:
  id:
    type: string
    description: Unique identifier for the rect element
  type:
    const: rect
    description: Element type, must be 'rect'
  width:
    type: number
    description: Width of the rectangle in pixels
  height:
    type: number
    description: Height of the rectangle in pixels
  x:
    type: number
    description: X position of the rectangle
    default: 0
  y:
    type: number
    description: Y position of the rectangle
    default: 0
  anchorX:
    type: number
    description: Horizontal anchor point where 0 is left edge, 1 is right edge (100% width). Values can extend beyond 0-1 range.
  anchorY:
    type: number
    description: Vertical anchor point where 0 is top edge, 1 is bottom edge (100% height). Values can extend beyond 0-1 range.
  alpha:
    type: number
    description: Opacity/transparency of the rectangle (0-1)
    minimum: 0
    maximum: 1
    default: 1
  fill:
    "$ref": "#/$def/fill"
    description: Optional fill of the rectangle. Supports solid colors and structured gradient fills. When omitted, the rect renders transparent.
  border:
    type: object
    description: Border properties
    properties:
      width:
        type: number
        description: Border width in pixels
        default: 0
      color:
        type: string
        description: Border color
        default: black
      alpha:
        type: number
        description: Border opacity (0-1)
        minimum: 0
        maximum: 1
        default: 1
  rotation:
    type: number
    description: Rotation in degrees
    default: 0
  hover:
    type: object
    properties:
      soundSrc:
        type: string
        description: source of sound to be played when hovering over the sprite
      cursor:
        type: string
        description: CSS cursor style when hovering over the sprite
      payload:
        type: object
        description: Payload for hover action event
  click:
    type: object
    properties:
      soundSrc:
        type: string
        description: source of sound to be played when the sprite is clicked
      soundVolume:
        type: number
        description: Volume. 0 means muted. 1000 means original full volume.
        minimum: 0
        maximum: 1000
        default: 1000
      payload:
        type: object
        description: Payload for click action event
  drag:
    type: object
    properties:
      start:
        payload:
          type: object
          description: Payload for click action event
      end:
        payload:
          type: object
          description: Payload for click action event
      move:
        payload:
          type: object
          description: Payload for click action event
  rightClick:
    type: object
    properties:
      soundSrc:
        type: string
        description: source of sound to be played when the rect is right-clicked
      payload:
        type: object
        description: Payload for right-click action event
  scrollUp:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll up action event
  scrollDown:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll down action event
