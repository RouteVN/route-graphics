$schema: http://json-schema.org/draft-07/schema#
title: Text Element
description: Schema for text element raw input
type: object
required:
  - id
  - type
  - x
  - y
$def:
  textShadow:
    description: Optional text shadow. Use null in an interaction style to remove a base shadow.
    oneOf:
      - type: "null"
      - type: object
        properties:
          color:
            type: string
            description: Shadow color
            default: black
          alpha:
            type: number
            description: Shadow opacity (0-1)
            minimum: 0
            maximum: 1
            default: 1
          blur:
            type: number
            description: Shadow blur radius in pixels
            minimum: 0
            default: 0
          offsetX:
            type: number
            description: Horizontal shadow offset in pixels
            default: 2
          offsetY:
            type: number
            description: Vertical shadow offset in pixels
            default: 2
  textStyle:
    type: object
    properties:
      fill:
        type: string
        description: Text color
        default: black
      fontFamily:
        type: string
        description: Font family
        default:
      fontSize:
        type: number
        description: Font size in pixels
        default: 16
      align:
        type: string
        enum: [left, center, right]
        default: left
        description: Text alignment
      lineHeight:
        type: number
        description: Line height in pixels
        default: 1.2
      wordWrap:
        type: boolean
        description: Enable word wrapping
        default: true
      breakWords:
        type: boolean
        description: Allow breaking words when wrapping
        default: true
      strokeColor:
        type: string
        description: Text stroke/outline color
      strokeWidth:
        type: number
        description: Text stroke/outline width
      padding:
        type: number
        minimum: 0
        description: Extra texture padding around rendered glyphs, useful for fonts with overhanging glyph bounds.
      shadow:
        "$ref": "#/$def/textShadow"
  contentSegment:
    type: object
    required:
      - text
    properties:
      text:
        type: string
      textStyle:
        "$ref": "#/$def/textStyle"
      furigana:
        type: object
        properties:
          text:
            type: string
          textStyle:
            "$ref": "#/$def/textStyle"
          placement:
            type: string
            enum: [top, bottom]
            default: top
            description: Side of the base text where furigana is placed.
          gap:
            type: number
            minimum: 0
            default: 0
            description: Additional distance in pixels between the furigana and base text.
properties:
  id:
    type: string
    description: Unique identifier for the text element
  type:
    const: text
    description: Element type, must be 'text'
  content:
    oneOf:
      - type: string
      - type: array
        items:
          "$ref": "#/$def/contentSegment"
    description: The text content to display. Strings render as one Pixi text object; arrays render static rich text segments.
    default: ""
  width:
    type: number
    description: Width constraint for text wrapping. When set, enables word wrap.
  x:
    type: number
    description: X position of the text
  y:
    type: number
    description: Y position of the text
  anchorX:
    type: number
    description: Horizontal anchor point where 0 is left edge, 1 is right edge (100% width). Values can extend beyond 0-1 range.
    default: 0
  anchorY:
    type: number
    description: Vertical anchor point where 0 is top edge, 1 is bottom edge (100% height). Values can extend beyond 0-1 range.
    default: 0
  alpha:
    type: number
    description: Opacity/transparency of the text (0-1)
    minimum: 0
    maximum: 1
    default: 1
  textStyle:
    "$ref": "#/$def/textStyle"
  hover:
    type: object
    properties:
      textStyle:
        "$ref": "#/$def/textStyle"
      cursor:
        type: string
        description: CSS cursor style when hovering
      soundSrc:
        type: string
        description: URL to sound file to play on hover
      payload:
        type: object
        description: Payload for hover action event
  click:
    type: object
    properties:
      textStyle:
        "$ref": "#/$def/textStyle"
      soundSrc:
        type: string
        description: URL to sound file to play on click
      soundVolume:
        type: number
        description: Volume. 0 means muted. 100 means original full volume.
        minimum: 0
        maximum: 100
        default: 100
      payload:
        type: object
        description: Payload for click action event
  rightClick:
    type: object
    properties:
      textStyle:
        "$ref": "#/$def/textStyle"
      soundSrc:
        type: string
        description: URL to sound file to play on right-click
      payload:
        type: object
        description: Payload for right-click action event
  scrollUp:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll up action event
  scrollDown:
    type: object
    properties:
      payload:
        type: object
        description: Payload for scroll down action event
