$schema: http://json-schema.org/draft-07/schema#
title: Animation Events
description: Events emitted by animations
type: object
properties:
  complete:
    type: object
    description: Fired when an animation completes.
    properties:
      _event:
        type: object
        properties:
          id:
            type: string
            description: The ID of the animation that completed
          targetId:
            type: string
            description: The ID of the element targeted by the animation
          operation:
            type: string
            enum: [enter, update, exit, replace]
            description: The operation that completed
        additionalProperties: true
    additionalProperties: true
additionalProperties: false
