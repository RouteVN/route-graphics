$schema: http://json-schema.org/draft-07/schema#
title: Animation
description: Schema for Route Graphics animations
type: object
required:
  - id
  - targetId
  - type
$defs:
  keyframe:
    type: object
    required:
      - value
      - duration
    properties:
      value:
        type: number
        description: The target value for this keyframe.
      duration:
        type: number
        description: Duration to reach this value in milliseconds.
      easing:
        type: string
        description: Easing function to use.
        enum:
          - linear
          - easeInQuad
          - easeOutQuad
          - easeInOutQuad
          - easeInCubic
          - easeOutCubic
          - easeInOutCubic
          - easeInQuart
          - easeOutQuart
          - easeInOutQuart
          - easeInQuint
          - easeOutQuint
          - easeInOutQuint
          - easeInSine
          - easeOutSine
          - easeInOutSine
          - easeInExpo
          - easeOutExpo
          - easeInOutExpo
          - easeInCirc
          - easeOutCirc
          - easeInOutCirc
          - easeInBack
          - easeOutBack
          - easeInOutBack
          - easeInBounce
          - easeOutBounce
          - easeInOutBounce
          - easeInElastic
          - easeOutElastic
          - easeInOutElastic
      relative:
        type: boolean
        description: Whether the value is relative to the previous keyframe value.
        default: false
    additionalProperties: false
  tweenProperty:
    oneOf:
      - $ref: "#/$defs/manualTweenProperty"
      - $ref: "#/$defs/autoTweenProperty"
  manualTweenProperty:
    type: object
    properties:
      initialValue:
        type: number
        description: Optional initial value before the first keyframe.
      keyframes:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/keyframe"
    required:
      - keyframes
    additionalProperties: false
  autoTweenConfig:
    type: object
    properties:
      duration:
        type: number
        description: Duration in milliseconds for the generated tween.
      easing:
        type: string
        description: Easing function to use.
        enum:
          - linear
          - easeInQuad
          - easeOutQuad
          - easeInOutQuad
          - easeInCubic
          - easeOutCubic
          - easeInOutCubic
          - easeInQuart
          - easeOutQuart
          - easeInOutQuart
          - easeInQuint
          - easeOutQuint
          - easeInOutQuint
          - easeInSine
          - easeOutSine
          - easeInOutSine
          - easeInExpo
          - easeOutExpo
          - easeInOutExpo
          - easeInCirc
          - easeOutCirc
          - easeInOutCirc
          - easeInBack
          - easeOutBack
          - easeInOutBack
          - easeInBounce
          - easeOutBounce
          - easeInOutBounce
          - easeInElastic
          - easeOutElastic
          - easeInOutElastic
    required:
      - duration
    additionalProperties: false
  autoTweenProperty:
    type: object
    properties:
      auto:
        $ref: "#/$defs/autoTweenConfig"
    required:
      - auto
    additionalProperties: false
  updateTween:
    type: object
    properties:
      alpha:
        $ref: "#/$defs/tweenProperty"
      x:
        $ref: "#/$defs/tweenProperty"
      y:
        $ref: "#/$defs/tweenProperty"
      translateX:
        $ref: "#/$defs/tweenProperty"
      translateY:
        $ref: "#/$defs/tweenProperty"
      scaleX:
        $ref: "#/$defs/tweenProperty"
      scaleY:
        $ref: "#/$defs/tweenProperty"
      rotation:
        $ref: "#/$defs/tweenProperty"
      blurX:
        $ref: "#/$defs/tweenProperty"
      blurY:
        $ref: "#/$defs/tweenProperty"
    allOf:
      - not:
          required:
            - x
            - translateX
      - not:
          required:
            - y
            - translateY
    additionalProperties: false
    minProperties: 1
  transitionTween:
    type: object
    properties:
      x:
        $ref: "#/$defs/tweenProperty"
      y:
        $ref: "#/$defs/tweenProperty"
      translateX:
        $ref: "#/$defs/tweenProperty"
      translateY:
        $ref: "#/$defs/tweenProperty"
      alpha:
        $ref: "#/$defs/tweenProperty"
      scaleX:
        $ref: "#/$defs/tweenProperty"
      scaleY:
        $ref: "#/$defs/tweenProperty"
      rotation:
        $ref: "#/$defs/tweenProperty"
    allOf:
      - not:
          required:
            - x
            - translateX
      - not:
          required:
            - y
            - translateY
    additionalProperties: false
    minProperties: 1
  transitionSide:
    type: object
    required:
      - tween
    properties:
      tween:
        $ref: "#/$defs/transitionTween"
    additionalProperties: false
  maskProgress:
    $ref: "#/$defs/tweenProperty"
  sequenceMaskFrame:
    type: object
    required:
      - at
      - texture
    properties:
      at:
        type: number
        minimum: 0
        maximum: 1
        description: Normalized progress point where this sequence frame is sampled.
      texture:
        type: string
    additionalProperties: false
  mask:
    type: object
    required:
      - kind
    properties:
      kind:
        type: string
        enum: [single, sequence]
      texture:
        type: string
      frames:
        type: array
        minItems: 2
        items:
          $ref: "#/$defs/sequenceMaskFrame"
      channel:
        type: string
        enum: [red, green, blue, alpha]
      softness:
        type: number
      invert:
        type: boolean
      sample:
        type: string
        enum: [hold, linear]
      progress:
        $ref: "#/$defs/maskProgress"
    additionalProperties: false
    allOf:
      - if:
          properties:
            kind:
              const: single
        then:
          required:
            - texture
          not:
            anyOf:
              - required: [frames]
              - required: [sample]
      - if:
          properties:
            kind:
              const: sequence
        then:
          required:
            - frames
          not:
            anyOf:
              - required: [texture]
              - required: [softness]
  playback:
    type: object
    properties:
      continuity:
        type: string
        enum: [render, persistent]
        default: render
      speed:
        type: number
        exclusiveMinimum: 0
        description: Playback speed multiplier. 1 is authored speed, 2 is twice as fast, 0.5 is half speed.
    additionalProperties: false
properties:
  id:
    type: string
    description: Unique identifier for this animation.
  targetId:
    type: string
    description: Element id this animation applies to.
  type:
    type: string
    enum: [update, transition]
    description: Animation structure.
  complete:
    type: object
    properties:
      payload:
        type: object
    additionalProperties: true
  playback:
    $ref: "#/$defs/playback"
  tween:
    $ref: "#/$defs/updateTween"
  prev:
    $ref: "#/$defs/transitionSide"
  next:
    $ref: "#/$defs/transitionSide"
  mask:
    $ref: "#/$defs/mask"
allOf:
  - if:
      properties:
        type:
          const: update
    then:
      required:
        - tween
      not:
        anyOf:
          - required: [prev]
          - required: [next]
          - required: [mask]
  - if:
      properties:
        type:
          const: transition
    then:
      not:
        required: [tween]
      anyOf:
        - required: [prev]
        - required: [next]
        - required: [mask]
