$schema: http://json-schema.org/draft-07/schema#
title: Animation
description: Schema for Route Graphics animations
type: object
required:
  - id
  - targetId
  - operation
$defs:
  keyframe:
    type: object
    required:
      - value
      - duration
    properties:
      value:
        type: number
        description: The target value for this keyframe.
      duration:
        type: number
        description: Duration to reach this value in milliseconds.
      easing:
        type: string
        description: Easing function to use.
        enum: [linear, easeIn, easeOut, easeInOut]
      relative:
        type: boolean
        description: Whether the value is relative to the previous keyframe value.
        default: false
    additionalProperties: false
  property:
    type: object
    properties:
      initialValue:
        type: number
        description: Optional initial value before the first keyframe.
      keyframes:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/keyframe"
    required:
      - keyframes
    additionalProperties: false
  liveProperties:
    type: object
    properties:
      alpha:
        $ref: "#/$defs/property"
      x:
        $ref: "#/$defs/property"
      y:
        $ref: "#/$defs/property"
      scaleX:
        $ref: "#/$defs/property"
      scaleY:
        $ref: "#/$defs/property"
      rotation:
        $ref: "#/$defs/property"
    additionalProperties: false
    minProperties: 1
  subjectProperties:
    type: object
    properties:
      translateX:
        $ref: "#/$defs/property"
      translateY:
        $ref: "#/$defs/property"
      alpha:
        $ref: "#/$defs/property"
      scaleX:
        $ref: "#/$defs/property"
      scaleY:
        $ref: "#/$defs/property"
      rotation:
        $ref: "#/$defs/property"
    additionalProperties: false
    minProperties: 1
  replaceSubject:
    type: object
    properties:
      properties:
        $ref: "#/$defs/subjectProperties"
    additionalProperties: false
  maskProgress:
    $ref: "#/$defs/property"
  compositeMaskItem:
    type: object
    required:
      - texture
    properties:
      texture:
        type: string
      channel:
        type: string
        enum: [red, green, blue, alpha]
      invert:
        type: boolean
    additionalProperties: false
  mask:
    type: object
    required:
      - kind
    properties:
      kind:
        type: string
        enum: [single, sequence, composite]
      texture:
        type: string
      textures:
        type: array
        minItems: 1
        items:
          type: string
      items:
        type: array
        minItems: 1
        items:
          $ref: "#/$defs/compositeMaskItem"
      combine:
        type: string
        enum: [max, min, multiply, add]
      channel:
        type: string
        enum: [red, green, blue, alpha]
      softness:
        type: number
      invert:
        type: boolean
      sample:
        type: string
      progress:
        $ref: "#/$defs/maskProgress"
    additionalProperties: false
    allOf:
      - if:
          properties:
            kind:
              const: single
        then:
          required:
            - texture
      - if:
          properties:
            kind:
              const: sequence
        then:
          required:
            - textures
      - if:
          properties:
            kind:
              const: composite
        then:
          required:
            - items
properties:
  id:
    type: string
    description: Unique identifier for this animation.
  targetId:
    type: string
    description: Element id this animation applies to.
  operation:
    type: string
    enum: [enter, update, exit, replace]
    description: Lifecycle operation this animation is authored for.
  complete:
    type: object
    properties:
      actionPayload:
        type: object
    additionalProperties: true
  properties:
    $ref: "#/$defs/liveProperties"
  subjects:
    type: object
    properties:
      prev:
        $ref: "#/$defs/replaceSubject"
      next:
        $ref: "#/$defs/replaceSubject"
    additionalProperties: false
    minProperties: 1
  mask:
    $ref: "#/$defs/mask"
allOf:
  - if:
      properties:
        operation:
          enum: [enter, update, exit]
    then:
      required:
        - properties
      not:
        anyOf:
          - required: [subjects]
          - required: [mask]
  - if:
      properties:
        operation:
          const: replace
    then:
      not:
        required: [properties]
      anyOf:
        - required: [subjects]
        - required: [mask]
      allOf:
        - not:
            allOf:
              - required: [mask]
              - required: [subjects]
