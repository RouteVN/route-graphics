$schema: http://json-schema.org/draft-07/schema#
title: Audio Transition
description: Schema for audio property keyframe automation
type: object
required:
  - id
  - type
  - targetId
  - properties
properties:
  id:
    type: string
    description: Unique identifier
  type:
    const: audio-transition
    description: Audio transition
  targetId:
    type: string
    description: Audio node ID to automate
  properties:
    type: object
    description: Property automation map
    minProperties: 1
    properties:
      volume:
        $ref: "#/definitions/volumeLifecycle"
      pan:
        $ref: "#/definitions/panLifecycle"
      playbackRate:
        $ref: "#/definitions/playbackRateLifecycle"
    additionalProperties: false
definitions:
  easing:
    type: string
    enum:
      - linear
      - easeInQuad
      - easeOutQuad
      - easeInOutQuad
      - easeInCubic
      - easeOutCubic
      - easeInOutCubic
      - easeInQuart
      - easeOutQuart
      - easeInOutQuart
      - easeInQuint
      - easeOutQuint
      - easeInOutQuint
      - easeInSine
      - easeOutSine
      - easeInOutSine
      - easeInExpo
      - easeOutExpo
      - easeInOutExpo
      - easeInCirc
      - easeOutCirc
      - easeInOutCirc
      - easeInBack
      - easeOutBack
      - easeInOutBack
      - easeInBounce
      - easeOutBounce
      - easeInOutBounce
      - easeInElastic
      - easeOutElastic
      - easeInOutElastic
  keyframe:
    type: object
    required:
      - value
      - duration
    properties:
      value:
        type: number
        description: Absolute target value, or delta when relative is true
      duration:
        type: number
        minimum: 0
        description: Duration to reach this value in milliseconds
      easing:
        $ref: "#/definitions/easing"
      relative:
        type: boolean
        default: false
    additionalProperties: false
  volumeKeyframe:
    allOf:
      - $ref: "#/definitions/keyframe"
      - if:
          properties:
            relative:
              const: false
        then:
          properties:
            value:
              minimum: 0
              maximum: 100
  panKeyframe:
    allOf:
      - $ref: "#/definitions/keyframe"
      - if:
          properties:
            relative:
              const: false
        then:
          properties:
            value:
              minimum: -1
              maximum: 1
  playbackRateKeyframe:
    allOf:
      - $ref: "#/definitions/keyframe"
      - if:
          properties:
            relative:
              const: false
        then:
          properties:
            value:
              minimum: 0
  volumePhase:
    type: object
    required:
      - keyframes
    properties:
      initialValue:
        type: number
        minimum: 0
        maximum: 100
      keyframes:
        type: array
        minItems: 1
        items:
          $ref: "#/definitions/volumeKeyframe"
    additionalProperties: false
  panPhase:
    type: object
    required:
      - keyframes
    properties:
      initialValue:
        type: number
        minimum: -1
        maximum: 1
      keyframes:
        type: array
        minItems: 1
        items:
          $ref: "#/definitions/panKeyframe"
    additionalProperties: false
  playbackRatePhase:
    type: object
    required:
      - keyframes
    properties:
      initialValue:
        type: number
        minimum: 0
      keyframes:
        type: array
        minItems: 1
        items:
          $ref: "#/definitions/playbackRateKeyframe"
    additionalProperties: false
  volumeLifecycle:
    type: object
    minProperties: 1
    properties:
      enter:
        $ref: "#/definitions/volumePhase"
      update:
        $ref: "#/definitions/volumePhase"
      exit:
        $ref: "#/definitions/volumePhase"
    additionalProperties: false
  panLifecycle:
    type: object
    minProperties: 1
    properties:
      enter:
        $ref: "#/definitions/panPhase"
      update:
        $ref: "#/definitions/panPhase"
      exit:
        $ref: "#/definitions/panPhase"
    additionalProperties: false
  playbackRateLifecycle:
    type: object
    minProperties: 1
    properties:
      enter:
        $ref: "#/definitions/playbackRatePhase"
      update:
        $ref: "#/definitions/playbackRatePhase"
      exit:
        $ref: "#/definitions/playbackRatePhase"
    additionalProperties: false
