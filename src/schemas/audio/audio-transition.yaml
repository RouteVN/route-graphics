$schema: http://json-schema.org/draft-07/schema#
title: Audio Transition
description: Schema for audio property automation
type: object
required:
  - id
  - type
  - targetId
  - properties
properties:
  id:
    type: string
    description: Unique identifier
  type:
    const: audio-transition
    description: Audio transition
  targetId:
    type: string
    description: Audio node ID to automate
  properties:
    type: object
    description: Property automation map
    properties:
      volume:
        type: object
        properties:
          enter:
            $ref: "#/definitions/volumeEnterPhase"
          exit:
            $ref: "#/definitions/volumeExitPhase"
          update:
            $ref: "#/definitions/updatePhase"
        additionalProperties: false
      pan:
        type: object
        properties:
          enter:
            $ref: "#/definitions/panEnterPhase"
          exit:
            $ref: "#/definitions/panExitPhase"
          update:
            $ref: "#/definitions/updatePhase"
        additionalProperties: false
      playbackRate:
        type: object
        properties:
          enter:
            $ref: "#/definitions/playbackRateEnterPhase"
          exit:
            $ref: "#/definitions/playbackRateExitPhase"
          update:
            $ref: "#/definitions/updatePhase"
        additionalProperties: false
    additionalProperties: false
definitions:
  volumeEnterPhase:
    type: object
    required:
      - from
      - duration
      - easing
    properties:
      from:
        type: number
        minimum: 0
        maximum: 100
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
  volumeExitPhase:
    type: object
    required:
      - to
      - duration
      - easing
    properties:
      to:
        type: number
        minimum: 0
        maximum: 100
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
  panEnterPhase:
    type: object
    required:
      - from
      - duration
      - easing
    properties:
      from:
        type: number
        minimum: -1
        maximum: 1
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
  panExitPhase:
    type: object
    required:
      - to
      - duration
      - easing
    properties:
      to:
        type: number
        minimum: -1
        maximum: 1
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
  playbackRateEnterPhase:
    type: object
    required:
      - from
      - duration
      - easing
    properties:
      from:
        type: number
        minimum: 0
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
  playbackRateExitPhase:
    type: object
    required:
      - to
      - duration
      - easing
    properties:
      to:
        type: number
        minimum: 0
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
  updatePhase:
    type: object
    required:
      - duration
      - easing
    properties:
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
