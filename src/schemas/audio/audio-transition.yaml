$schema: http://json-schema.org/draft-07/schema#
title: Audio Transition
description: Schema for audio property automation
type: object
required:
  - id
  - type
  - targetId
  - properties
properties:
  id:
    type: string
    description: Unique identifier
  type:
    const: audioTransition
    description: Audio transition
  targetId:
    type: string
    description: Audio node ID to automate
  properties:
    type: object
    description: Property automation map
    properties:
      volume:
        type: object
        properties:
          enter:
            $ref: "#/definitions/enterPhase"
          exit:
            $ref: "#/definitions/exitPhase"
          update:
            $ref: "#/definitions/updatePhase"
        additionalProperties: false
    additionalProperties: false
definitions:
  enterPhase:
    type: object
    required:
      - from
      - duration
      - easing
    properties:
      from:
        type: number
        minimum: 0
        maximum: 100
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
  exitPhase:
    type: object
    required:
      - to
      - duration
      - easing
    properties:
      to:
        type: number
        minimum: 0
        maximum: 100
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
  updatePhase:
    type: object
    required:
      - duration
      - easing
    properties:
      duration:
        type: number
        minimum: 0
      easing:
        const: linear
    additionalProperties: false
