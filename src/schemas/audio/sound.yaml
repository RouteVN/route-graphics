$schema: http://json-schema.org/draft-07/schema#
title: Sound
description: Schema for sound
type: object
required:
  - id
  - type
  - src
properties:
  id:
    type: string
    description: Unique identifier
  type:
    const: sound
    description: Sound
  src:
    type: string
    description: Source of the sound
  volume:
    type: number
    description: Volume. 0 means muted. 100 means original full volume.
    default: 100
    minimum: 0
    maximum: 100
  muted:
    type: boolean
    description: Whether the sound is muted
    default: false
  pan:
    type: number
    description: Stereo pan. -1 means left. 1 means right.
    default: 0
    minimum: -1
    maximum: 1
  loop:
    type: boolean
    description: Loop
    default: false
  startDelayMs:
    type: number
    description: Delay in milliseconds before playing the sound
    default: 0
    minimum: 0
  playbackRate:
    type: number
    description: Playback speed multiplier
    default: 1
    minimum: 0
  startAt:
    type: number
    description: Start offset in seconds
    default: 0
    minimum: 0
  endAt:
    type:
      - number
      - "null"
    description: Optional end time in seconds
    default: null
    minimum: 0
