# Snow Effect Example
#
# Creates falling snowflakes that recycle at screen boundaries for a continuous effect.
# Snowflakes drift downward with gentle rotation and fade in and out over their lifetime.
#
# Customization tips:
# - Change width and height to match your scene dimensions
# - Update modules.emission.source.data.width to match width
# - Adjust modules.bounds.padding to control recycle buffer
# - Adjust modules.emission.maxActive for performance (100-300 recommended)
# - Modify movement velocity speed for faster or slower snowfall

elements:
  - id: snow-effect
    type: particles
    width: 1280
    height: 720
    seed: 12345
    modules:
      emission:
        mode: continuous
        rate: 40
        maxActive: 200
        duration: infinite
        particleLifetime:
          min: 4
          max: 8
        source:
          kind: rect
          data:
            x: 0
            y: -20
            width: 1280
            height: 10

      movement:
        velocity:
          kind: directional
          direction: 90
          speed:
            min: 50
            max: 150

      appearance:
        texture: snowflake
        scale:
          mode: range
          min: 0.3
          max: 1
        alpha:
          mode: curve
          keys:
            - { time: 0, value: 0 }
            - { time: 0.1, value: 0.8 }
            - { time: 0.8, value: 0.8 }
            - { time: 1, value: 0 }
        rotation:
          mode: spin
          start:
            min: 0
            max: 360
          speed:
            min: -45
            max: 45

      bounds:
        mode: recycle
        source: area
        padding: 50
