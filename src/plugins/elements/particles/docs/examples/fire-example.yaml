# Fire Effect Example
#
# Creates rising sparks with a warm color gradient.
# Particles spawn from a small base, move upward, accelerate as they rise,
# shrink over time, and fade out.
#
# Customization tips:
# - Change modules.emission.source.data.x and y to position the fire base
# - Adjust modules.emission.source.data.width for a wider or narrower flame
# - Modify modules.movement.acceleration.y for stronger upward pull
# - Adjust modules.emission.maxActive for denser or lighter fire
# - Customize the color gradient for blue or green fire variants

elements:
  - id: fire-effect
    type: particles
    width: 1280
    height: 720
    modules:
      emission:
        mode: continuous
        rate: 100
        maxActive: 100
        duration: infinite
        particleLifetime:
          min: 0.5
          max: 1.5
        source:
          kind: rect
          data:
            x: 200
            y: 200
            width: 40
            height: 10

      movement:
        velocity:
          kind: directional
          direction: -90
          speed:
            min: 50
            max: 150
        acceleration:
          x: 0
          y: -200

      appearance:
        texture: circle
        scale:
          mode: curve
          keys:
            - { time: 0, value: 1 }
            - { time: 1, value: 0.3 }
        alpha:
          mode: curve
          keys:
            - { time: 0, value: 1 }
            - { time: 1, value: 0 }
        color:
          mode: gradient
          keys:
            - { time: 0, value: "#ffff00" }
            - { time: 0.5, value: "#ff6600" }
            - { time: 1, value: "#ff0000" }
        rotation:
          mode: fixed
          value: -90
