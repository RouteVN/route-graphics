# Burst / Explosion Effect Example
#
# Creates a one-shot radial burst of particles.
# All particles spawn at once, shoot outward in random directions, then shrink and fade out.
#
# Customization tips:
# - Change modules.emission.source.data.x and y to position the burst center
# - Adjust modules.emission.burstCount for a larger or smaller burst
# - Modify movement velocity speed for a tighter or wider explosion
# - Increase particleLifetime for a longer-lasting burst

elements:
  - id: burst-effect
    type: particles
    width: 1280
    height: 720
    modules:
      emission:
        mode: burst
        burstCount: 50
        maxActive: 50
        duration: 0.1
        particleLifetime:
          min: 0.5
          max: 1
        source:
          kind: circle
          data:
            x: 200
            y: 200
            radius: 10

      movement:
        velocity:
          kind: radial
          speed:
            min: 200
            max: 400

      appearance:
        texture: circle
        scale:
          mode: curve
          keys:
            - { time: 0, value: 1 }
            - { time: 1, value: 0 }
        alpha:
          mode: curve
          keys:
            - { time: 0, value: 1 }
            - { time: 1, value: 0 }
