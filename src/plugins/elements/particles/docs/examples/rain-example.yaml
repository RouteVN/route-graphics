# Rain Effect Example
#
# Creates fast falling raindrops that recycle after leaving the visible region.
# Raindrops fall at a slight angle with a fixed streak rotation.
#
# Customization tips:
# - Change width and height to match your scene dimensions
# - Adjust modules.emission.rate for lighter or heavier rain
# - Modify movement velocity direction for wind
# - Adjust bounds.custom to control the recycle area

elements:
  - id: rain-effect
    type: particles
    width: 1280
    height: 720
    modules:
      emission:
        mode: continuous
        rate: 3000
        maxActive: 300
        duration: infinite
        particleLifetime:
          min: 0.8
          max: 1.5
        source:
          kind: rect
          data:
            x: -50
            y: -50
            width: 1280
            height: 10

      movement:
        velocity:
          kind: directional
          direction: 85
          speed:
            min: 640
            max: 960

      appearance:
        texture: raindrop
        scale:
          mode: range
          min: 0.8
          max: 1.2
        alpha:
          mode: curve
          keys:
            - { time: 0, value: 0 }
            - { time: 0.1, value: 0.6 }
            - { time: 0.8, value: 0.6 }
            - { time: 1, value: 0 }
        rotation:
          mode: fixed
          value: -5

      bounds:
        mode: recycle
        source: custom
        custom:
          x: -100
          y: -100
          width: 1280
          height: 720
